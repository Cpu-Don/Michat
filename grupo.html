<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sincro - Grupo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background:#e5ddd5; margin:0; font-family: sans-serif; height:100vh; display:flex; flex-direction:column; }
        .header { background:#075e54; color:white; padding:15px; display:flex; align-items:center; gap:10px; font-weight:bold; }
        .m-box { flex:1; padding:15px; overflow-y:auto; display:flex; flex-direction:column; gap:8px; }
        .msg { background:white; padding:8px 12px; border-radius:8px; max-width:80%; font-size:14px; box-shadow:0 1px 1px rgba(0,0,0,0.1); }
        .mio { background:#dcf8c6; align-self:flex-end; }
        .input-area { background:#f0f0f0; padding:10px; display:flex; gap:10px; }
        input { flex:1; padding:12px; border-radius:20px; border:none; outline:none; }
        button { background:#075e54; color:white; border:none; width:40px; height:40px; border-radius:50%; cursor:pointer; font-weight:bold; }
    </style>
</head>
<body>
    <div class="header">
        <span onclick="location.href='index.html'" style="cursor:pointer;">←</span>
        <span id="gn">Cargando grupo...</span>
    </div>
    <div id="m-box" class="m-box"></div>
    <div class="input-area">
        <input type="text" id="m" placeholder="Escribe..." onkeypress="if(event.key==='Enter') enviar()">
        <button onclick="enviar()">></button>
    </div>

    <script src='https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js'></script>
    <script src='https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js'></script>
    <script>
        const firebaseConfig = { databaseURL: "https://micanalmaestro-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const rdb = firebase.database();
        const gid = new URLSearchParams(window.location.search).get('g');
        const miUser = localStorage.getItem('g_user') || "Invitado";

        // Cargar Nombre
        rdb.ref('lista_grupos/'+gid).on('value', s => { if(s.exists()) document.getElementById('gn').innerText = s.val().nombre; });

        // Leer Mensajes
        rdb.ref('chats_grupos/'+gid).on('value', s => {
            const b = document.getElementById('m-box'); b.innerHTML = "";
            s.forEach(c => {
                const m = c.val();
                const d = document.createElement('div');
                d.className = "msg" + (m.u === miUser ? " mio" : "");
                d.innerHTML = `<small style="color:#075e54; font-weight:bold;">${m.u}</small><br>${m.t}`;
                b.appendChild(d);
            });
            b.scrollTop = b.scrollHeight;
        });

        function enviar() {
            const i = document.getElementById('m'), t = i.value.trim();
            if(t) { rdb.ref('chats_grupos/'+gid).push({ u: miUser, t: t }); i.value = ""; }
        }
    </script>
</body>
</html>
