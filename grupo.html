<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sincro - Chat Grupal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background:#f0f2f5; margin:0; font-family: sans-serif; display:flex; flex-direction:column; height:100vh; }
        #header { background:#075e54; color:white; padding:15px; display:flex; align-items:center; gap:10px; font-weight:bold; }
        #m-box { flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:8px; }
        .msg { background:white; padding:8px 12px; border-radius:8px; max-width:80%; box-shadow:0 1px 2px rgba(0,0,0,0.1); font-size:14px; position:relative; }
        .mio { align-self: flex-end; background: #dcf8c6; }
        .u { font-weight:bold; font-size:11px; color:#075e54; display:block; margin-bottom:2px; }
        #input-area { background:#f0f0f0; padding:10px; display:flex; gap:8px; align-items:center; }
        input { flex:1; padding:10px; border-radius:20px; border:1px solid #ddd; outline:none; }
        button { background:#075e54; color:white; border:none; padding:10px 15px; border-radius:50%; cursor:pointer; }
    </style>
</head>
<body>

<div id="header">
    <span onclick="location.href='index.html'" style="cursor:pointer;">←</span>
    <span id="titulo-grupo">Cargando grupo...</span>
</div>

<div id="m-box"></div>

<div id="input-area">
    <input type="text" id="msg" placeholder="Escribe un mensaje..." onkeypress="if(event.key==='Enter') enviar()">
    <button onclick="enviar()">➤</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // Usa la misma configuración que tienes en index.html
    const firebaseConfig = { databaseURL: "https://micanalmaestro-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const rdb = firebase.database();

    // Obtener el ID del grupo de la URL
    const urlParams = new URLSearchParams(window.location.search);
    const idGrupo = urlParams.get('g');
    const miUsuario = localStorage.getItem('g_user') || "Invitado";

    if(!idGrupo) {
        alert("Grupo no válido");
        location.href = "index.html";
    }

    // 1. Cargar nombre del grupo
    rdb.ref('lista_grupos/' + idGrupo).once('value', s => {
        if(s.exists()) {
            document.getElementById('titulo-grupo').innerText = s.val().nombre;
        } else {
            alert("El grupo no existe");
            location.href = "index.html";
        }
    });

    // 2. Escuchar mensajes en tiempo real
    rdb.ref('chats_grupos/' + idGrupo).on('value', snapshot => {
        const box = document.getElementById('m-box');
        box.innerHTML = "";
        snapshot.forEach(child => {
            const m = child.val();
            const esMio = m.u === miUsuario;
            const div = document.createElement('div');
            div.className = "msg" + (esMio ? " mio" : "");
            div.innerHTML = `<span class="u">${m.u}</span>${m.t}`;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    });

    // 3. Función para enviar
    function enviar() {
        const i = document.getElementById('msg');
        const t = i.value.trim();
        if(!t) return;

        rdb.ref('chats_grupos/' + idGrupo).push({
            u: miUsuario,
            t: t,
            f: Date.now()
        });
        i.value = "";
    }
</script>

</body>
</html>
