<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sincro Telegram Web</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { margin:0; font-family:system-ui; background:#0e1621; }

#app {
  display:flex;
  height:100vh;
}

/* SIDEBAR */
#sidebar {
  width:30%;
  background:#17212b;
  border-right:1px solid #222;
  display:flex;
  flex-direction:column;
}

#sidebar-header {
  padding:10px;
  color:white;
  font-weight:bold;
  border-bottom:1px solid #222;
}

#chat-list {
  flex:1;
  overflow-y:auto;
}

.chat-item {
  padding:10px;
  cursor:pointer;
  color:white;
  border-bottom:1px solid #222;
}

.chat-item:hover {
  background:#2a3a4a;
}

/* CHAT */
#chat {
  flex:1;
  display:flex;
  flex-direction:column;
  background:#0e1621;
}

#top {
  padding:10px;
  background:#17212b;
  color:white;
  border-bottom:1px solid #222;
}

#m-box {
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.msg {
  max-width:70%;
  padding:8px;
  border-radius:10px;
}

.yo { background:#2b5278; align-self:flex-end; color:white; }
.otro { background:#182533; align-self:flex-start; color:white; }

.nombre { font-size:11px; color:#6ab0f3; }

.hora { font-size:10px; color:#aaa; text-align:right; }

#input {
  display:flex;
  padding:10px;
  background:#17212b;
}

#msg {
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
  outline:none;
  background:#2a3a4a;
  color:white;
}

button {
  margin-left:5px;
  border:none;
  border-radius:50%;
  width:40px;
  height:40px;
  background:#2b5278;
  color:white;
}
</style>
</head>

<body>

<div id="app">

<!-- SIDEBAR -->
<div id="sidebar">
  <div id="sidebar-header">
    Chats 
    <button onclick="crearGrupo()">+</button>
  </div>
  <div id="chat-list"></div>
</div>

<!-- CHAT -->
<div id="chat">
  <div id="top">Selecciona un chat</div>
  <div id="m-box"></div>
  <div id="input">
    <input id="msg" placeholder="Mensaje..." onkeypress="if(event.key==='Enter')send()">
    <button onclick="send()">➤</button>
  </div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  databaseURL:"https://micanalmaestro-default-rtdb.firebaseio.com/"
};
firebase.initializeApp(firebaseConfig);
const rdb = firebase.database();

/* USER */
let user = localStorage.getItem("user") || prompt("Tu nombre");
localStorage.setItem("user", user);

let currentChat = "";

/* CREAR GRUPO */
function crearGrupo(){
  let nombre = prompt("Nombre del grupo");
  if(!nombre) return;

  let id = "g_" + Date.now();

  rdb.ref("grupos/"+id).set({
    nombre,
    creador:user
  });

  rdb.ref("grupos/"+id+"/miembros/"+user).set(true);
}

/* LISTA DE CHATS */
rdb.ref("grupos").on("value", snap=>{
  let list = document.getElementById("chat-list");
  list.innerHTML="";

  snap.forEach(g=>{
    let data = g.val();

    let div = document.createElement("div");
    div.className="chat-item";
    div.innerText = data.nombre;

    div.onclick = ()=>abrirChat(g.key);

    list.appendChild(div);
  });
});

/* ABRIR CHAT */
function abrirChat(id){
  currentChat = id;

  rdb.ref("grupos/"+id+"/nombre").on("value", s=>{
    document.getElementById("top").innerText = s.val();
  });

  rdb.ref("grupos/"+id+"/mensajes").on("value", snap=>{
    let box = document.getElementById("m-box");
    box.innerHTML="";

    snap.forEach(c=>{
      let m = c.val();

      let div = document.createElement("div");
      div.className="msg " + (m.u===user?"yo":"otro");

      let html="";

      if(m.u!==user){
        html += `<div class="nombre">${m.u}</div>`;
      }

      html += m.t;
      html += `<div class="hora">${m.h}</div>`;

      div.innerHTML = html;
      box.appendChild(div);
    });

    box.scrollTop = box.scrollHeight;
  });
}

/* SEND */
function send(){
  if(!currentChat) return;

  let t = document.getElementById("msg").value.trim();
  if(!t) return;

  let h = new Date().getHours()+":"+("0"+new Date().getMinutes()).slice(-2);

  rdb.ref("grupos/"+currentChat+"/mensajes").push({
    u:user,
    t:t.replace(/</g,"&lt;"),
    h:h
  });

  document.getElementById("msg").value="";
}
</script>

</body>
</html>
