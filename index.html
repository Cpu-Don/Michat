<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sincro - Red Social</title>
    <meta content="width=device-width,initial-scale=1" name="viewport"/>
    <style>
        /* MANTENGO TUS ESTILOS EXACTOS */
        body { background: #f0f2f5; margin: 0; padding: 0; font-family: Segoe UI, Helvetica, Arial, sans-serif; transition: 0.3s; }
        :root { --bg-body: #f0f2f5; --bg-card: white; --text-main: #1c1e21; --border: #ddd; }
        body.tema-oscuro { --bg-body: #18191a; --bg-card: #242526; --text-main: #e4e6eb; --border: #3e4042; }
        body.tema-azul { --bg-body: #0a192f; --bg-card: #112240; --text-main: #ccd6f6; --border: #233554; }
        body { background: var(--bg-body) !important; color: var(--text-main) !important; }
        .card { background: var(--bg-card) !important; border: 1px solid var(--border) !important; border-radius: 10px; padding: 15px; margin-bottom: 20px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); position: relative; }
        .header { position: fixed; top: 0; left: 0; width: 100%; box-sizing: border-box; background: #075e54; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .header h1 { margin: 0; font-size: 24px; cursor: pointer; letter-spacing: 1px; }
        .nav-icons { display: flex; gap: 20px; align-items: center; }
        .dm-icon { background: #054d44; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 14px; position: relative; }
        .user-avatar { width: 35px; height: 35px; background: #25d366; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; cursor: pointer; border: 2px solid white; position: relative; background-size: cover; background-position: center; }
        #notif-badge { position: absolute; top: -5px; right: -5px; background: #ff4d4d; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; display: none; border: 1px solid white; }
        .profile-menu { display: none; position: absolute; top: 45px; right: 0; background: var(--bg-card); color: var(--text-main); min-width: 180px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); border-radius: 8px; overflow: hidden; z-index: 2000; border: 1px solid var(--border); }
        .profile-menu div { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid var(--border); font-size: 14px; }
        #acceso { background: white; padding: 40px; border-radius: 15px; text-align: center; width: 320px; margin: 100px auto; color: black; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn-main { background: #075e54; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .tabs { display: flex; background: white; border-radius: 10px; padding: 5px; margin-bottom: 20px; border: 1px solid var(--border); }
        .tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; border-radius: 8px; transition: 0.3s; color: #65676b; }
        .tab.active { color: #075e54; background: #e6f2f1; font-weight: bold; }
        .show { display: block !important; }

        /* NUEVOS ESTILOS PARA CHAT Y DIVISIONES */
        .seccion-dm-titulo { font-size: 12px; font-weight: bold; color: #075e54; margin: 15px 0 5px 0; text-transform: uppercase; }
        .bubble { padding: 8px 12px; border-radius: 15px; margin-bottom: 5px; max-width: 80%; word-wrap: break-word; }
        .bubble.me { background: #dcf8c6; align-self: flex-end; margin-left: auto; }
        .bubble.other { background: white; align-self: flex-start; }
        .admin-media-scroll { display: flex; flex-direction: column; gap: 10px; max-height: 300px; overflow-y: auto; padding: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div id="app">
    <div id="acceso">
        <h1 style="color:#075e54;">Sincro</h1>
        <input id="usr" placeholder="Usuario" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:5px; box-sizing: border-box;">
        <input id="clv" type="password" placeholder="Clave" style="width:100%; padding:12px; margin-bottom:20px; border:1px solid #ddd; border-radius:5px; box-sizing: border-box;">
        <button onclick="entrar()" class="btn-main" style="width:100%;">ENTRAR</button>
    </div>

    <div id="main-layout" style="display:none; max-width: 600px; margin: auto; padding: 20px; margin-top: 60px;">
        <div class="header">
            <h1 onclick="cerrarPerfil()">Sincro</h1>
            <div class="nav-icons">
                <div class="dm-icon" onclick="abrirDM()">
                    DM ✉ <span id="spam-badge" style="background:red; color:white; border-radius:50%; padding:1px 5px; font-size:9px; display:none;">0</span>
                </div>
                <div class="user-avatar" id="avatar-global" onclick="toggleMenu(event)">
                    <span id="avatar-letra">U</span>
                    <div id="notif-badge">0</div>
                    <div id="menuPerfil" class="profile-menu">
                        <div onclick="verPerfil()">👤 Mi Perfil</div>
                        <div onclick="verSolicitudes()">📩 Solicitudes <span id="solic-count-text"></span></div>
                        <div id="btn-admin-panel" style="display:none; color:blue; font-weight:bold;" onclick="abrirAdmin()">📂 Panel Maestro</div>
                        <div onclick="abrirConfig()">⚙️ Configuración</div>
                        <div style="font-weight:bold; background:rgba(0,0,0,0.05); padding:5px 12px; font-size:11px;">FONDO:</div>
                        <div onclick="cambiarFondo('blanco')">⚪ Blanco</div>
                        <div onclick="cambiarFondo('oscuro')">⚫ Oscuro</div>
                        <div onclick="cambiarFondo('azul')">🔵 Azulejo</div>
                        <div onclick="location.reload()" style="color:red; border-top:1px solid #eee;">🚪 Salir</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="contenido-principal">
            <div class="tabs">
                <div id="tab-publico" class="tab active" onclick="cambiarSeccion('publico')">Noticias</div>
                <div id="tab-amigos" class="tab" onclick="cambiarSeccion('amigos')">Amigos</div>
            </div>

            <div class="search-container">
                <input type="text" class="search-box" id="user-search" placeholder="🔍 Buscar personas para agregar..." onkeyup="buscarUsuarios(this.value)">
                <div id="resultados-busqueda"></div>
            </div>

            <div id="post-box-container">
                <div class="card">
                    <textarea id="post-text" placeholder="¿Qué quieres compartir?" style="width:100%; border:none; outline:none; resize:none; background:transparent; color:inherit; font-size:16px; min-height: 60px;"></textarea>
                    <hr style="border:0; border-top:1px solid var(--border); margin:10px 0;">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div style="display:flex; gap:10px; align-items:center;">
                            <button onclick="document.getElementById('file-post').click()" style="background:#f0f2f5; border:none; padding:8px 12px; border-radius:5px; cursor:pointer; font-size:13px; color: black;">📷 Galería</button>
                            <select id="post-privacy" style="padding: 5px; border-radius: 5px; border: 1px solid #ddd;">
                                <option value="publico">🌍 Público</option>
                                <option value="amigos">👥 Amigos</option>
                            </select>
                        </div>
                        <button class="btn-main" id="btn-publicar" onclick="publicarPost()">Publicar</button>
                    </div>
                    <input type="file" id="file-post" style="display:none" accept="image/*,video/*">
                </div>
            </div>
            <div id="muro-dinamico"></div>
        </div>
    </div>

    <div id="panel-solicitudes" style="display:none; background:var(--bg-body); position:fixed; top:60px; left:0; width:100%; height:100%; z-index:960; padding:20px; box-sizing:border-box; overflow-y:auto;">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid #ddd; padding-bottom: 10px; margin-bottom:20px;">
            <h2 style="margin:0; color:#075e54;">Solicitudes de Amistad</h2>
            <button onclick="document.getElementById('panel-solicitudes').style.display='none'" style="background:#ddd; border:none; padding:5px 15px; border-radius:5px; cursor:pointer;">Cerrar</button>
        </div>
        <div id="lista-solicitudes"></div>
    </div>

    <div id="dm-section" style="display:none; background:var(--bg-body); position:fixed; top:60px; left:0; width:100%; height:100%; z-index:900; padding:20px; box-sizing:border-box; overflow-y:auto;">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid #ddd; padding-bottom: 10px;">
            <h2 style="margin:0; color:#075e54;">Mensajes Directos</h2>
            <button onclick="cerrarDM()" style="background:#ddd; border:none; padding:5px 15px; border-radius:5px; cursor:pointer;">Volver</button>
        </div>
        <div id="lista-dm-completa">
            <div class="seccion-dm-titulo">Mis Amigos</div>
            <div id="lista-contactos-dm"></div>
            <div class="seccion-dm-titulo">Mis Grupos</div>
            <div id="lista-grupos-dm"></div>
            <div style="text-align:center; margin-top:20px;">
                <span onclick="crearGrupo()" style="color:#075e54; font-weight:bold; cursor:pointer; text-decoration:underline;">+ Crear grupo</span>
            </div>
        </div>
        <div id="ventana-chat-abierta" style="display:none; height:80%; display:flex; flex-direction:column; margin-top:10px;">
             <div style="display:flex; justify-content:space-between; align-items:center; background:#eee; padding:10px; border-radius:10px;">
                 <span id="chat-titulo-nombre" style="font-weight:bold;">Chat</span>
                 <span id="engranaje-chat" style="cursor:pointer; font-size:18px;">⚙️</span>
             </div>
             <div id="mensajes-flujo" style="flex:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; background:rgba(0,0,0,0.02); margin:10px 0; border-radius:10px;"></div>
             <div style="display:flex; gap:5px;">
                 <input id="input-msj" style="flex:1; padding:10px; border-radius:20px; border:1px solid #ddd;" placeholder="Escribe un mensaje...">
                 <button id="btn-enviar-msj" class="btn-main" style="border-radius:50%; width:40px; height:40px; padding:0;">➔</button>
             </div>
        </div>
    </div>

    <div id="panel-admin" style="display:none; background:var(--bg-body); position:fixed; top:60px; left:0; width:100%; height:100%; z-index:999; padding:20px; box-sizing:border-box; overflow-y:auto;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="color:blue;">Panel Maestro (Carpetas)</h2>
            <button onclick="document.getElementById('panel-admin').style.display='none'" class="btn-main">Cerrar</button>
        </div>
        <div id="carpetas-admin"></div>
    </div>

    <div id="perfil-usuario" style="display:none; background:var(--bg-body); position:fixed; top:60px; left:0; width:100%; height:100%; z-index:950; overflow-y:auto; padding-bottom:100px;">
        <div id="portada-v" style="width:100%; height:200px; background:#075e54; position:relative; background-size:cover; background-position:center;">
            <button id="btn-edit-portada" onclick="document.getElementById('f-portada').click()" style="display:none; position:absolute; bottom:15px; right:15px; background:rgba(0,0,0,0.6); color:white; border:none; padding:8px 12px; border-radius:5px; cursor:pointer; font-size:12px;">Cambiar Portada</button>
        </div>
        <div style="text-align:center; padding: 0 20px;">
            <div class="profile-pic-container">
                <div id="foto-perfil-v" class="profile-pic-circle">U</div>
                <div id="btn-edit-foto" class="edit-btn-small" style="display:none;" onclick="document.getElementById('f-perfil').click()">+</div>
            </div>
            <h2 id="nom-perfil" style="margin:5px 0; font-size: 24px;">@Usuario</h2>
            <div id="area-botones-perfil" style="margin-bottom: 20px; display:flex; justify-content:center; gap:10px;"></div>
        </div>
        <div id="muro-perfil-container" style="max-width:600px; margin:20px auto; padding:0 20px;">
            <div id="post-box-perfil"></div>
            <div id="muro-perfil"></div>
        </div>
        <input type="file" id="f-perfil" style="display:none" accept="image/*" onchange="subirImagen('foto')">
        <input type="file" id="f-portada" style="display:none" accept="image/*" onchange="subirImagen('portada')">
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = { databaseURL: "https://micanalmaestro-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const rdb = firebase.database();

    const CLOUD_NAME = "dhtyepcjg"; 
    const UPLOAD_PRESET = "Historial";

    let miUsuario = "";
    let misAmigos = [];
    let chatAbierto = "";

    // --- ACCESO ---
    function entrar() {
        const u = document.getElementById('usr').value.trim().toLowerCase();
        const p = document.getElementById('clv').value.trim();
        if(!u || !p) return alert("Ingresa datos");

        rdb.ref('usuarios/' + u).once('value', s => {
            if(s.exists() && s.val().toString() === p) {
                miUsuario = u;
                iniciarApp();
            } else if(!s.exists()) {
                rdb.ref('usuarios/' + u).set(p).then(() => { miUsuario = u; iniciarApp(); });
            } else { alert("Error de clave"); }
        });
    }

    function iniciarApp() {
        document.getElementById('acceso').style.display = 'none';
        document.getElementById('main-layout').style.display = 'block';
        
        if(miUsuario === 'chat') document.getElementById('btn-admin-panel').style.display = 'block';

        rdb.ref('amigos/' + miUsuario).on('value', s => {
            misAmigos = s.val() ? Object.keys(s.val()) : [];
            escucharPosts();
        });

        rdb.ref('solicitudes/' + miUsuario).on('value', s => {
            const count = s.numChildren();
            document.getElementById('notif-badge').innerText = count;
            document.getElementById('notif-badge').style.display = count > 0 ? 'block' : 'none';
        });

        actualizarAvatarUI();
    }

    // --- DM Y GRUPOS ---
    function abrirDM() {
        document.getElementById('dm-section').style.display = 'block';
        document.getElementById('lista-dm-completa').style.display = 'block';
        document.getElementById('ventana-chat-abierta').style.display = 'none';

        const lAmigos = document.getElementById('lista-contactos-dm');
        lAmigos.innerHTML = misAmigos.length ? "" : "<p>No tienes amigos agregados.</p>";
        misAmigos.forEach(a => {
            lAmigos.innerHTML += `<div class="card" onclick="abrirConversacion('${a}', false)" style="padding:10px; cursor:pointer;">👤 @${a}</div>`;
        });

        const lGrupos = document.getElementById('lista-grupos-dm');
        lGrupos.innerHTML = "";
        rdb.ref('grupos').on('value', s => {
            s.forEach(g => {
                if(g.child('miembros').hasChild(miUsuario)) {
                    lGrupos.innerHTML += `<div class="card" onclick="abrirConversacion('${g.key}', true)" style="padding:10px; cursor:pointer;">👥 ${g.val().nombre}</div>`;
                }
            });
        });
    }

    function abrirConversacion(id, esGrupo) {
        chatAbierto = id;
        document.getElementById('lista-dm-completa').style.display = 'none';
        document.getElementById('ventana-chat-abierta').style.display = 'flex';
        
        if(esGrupo) {
            rdb.ref('grupos/'+id).once('value', s => { document.getElementById('chat-titulo-nombre').innerText = s.val().nombre; });
        } else {
            document.getElementById('chat-titulo-nombre').innerText = "@" + id;
        }

        const path = esGrupo ? 'msg_grupos/'+id : 'msg_privados/'+ (miUsuario < id ? miUsuario+'_'+id : id+'_'+miUsuario);
        
        rdb.ref(path).on('value', s => {
            const div = document.getElementById('mensajes-flujo');
            div.innerHTML = "";
            s.forEach(m => {
                const d = m.val();
                const clase = d.user === miUsuario ? 'me' : 'other';
                div.innerHTML += `<div class="bubble ${clase}"><b>${d.user}:</b><br>${d.text}</div>`;
            });
            div.scrollTop = div.scrollHeight;
        });

        document.getElementById('btn-enviar-msj').onclick = () => {
            const t = document.getElementById('input-msj').value;
            if(!t) return;
            rdb.ref(path).push({ user: miUsuario, text: t, time: Date.now() });
            document.getElementById('input-msj').value = "";
        };

        document.getElementById('engranaje-chat').onclick = () => {
            if(confirm("OPCIONES:\n1. Multimedia\n2. Borrar Chat\n¿Deseas realizar alguna acción?")) {
                alert("Acción procesada");
            }
        };
    }

    async function crearGrupo() {
        const nom = prompt("Nombre del grupo:");
        if(!nom) return;
        const idG = "grupo_" + Date.now();
        await rdb.ref('grupos/' + idG).set({ nombre: nom, creador: miUsuario, miembros: {[miUsuario]: true} });
        alert("Grupo creado!");
        abrirConversacion(idG, true);
    }

    // --- ADMIN PANEL ---
    function abrirAdmin() {
        document.getElementById('panel-admin').style.display = 'block';
        const div = document.getElementById('carpetas-admin');
        div.innerHTML = "Cargando carpetas...";
        rdb.ref().once('value', s => {
            div.innerHTML = "";
            s.forEach(seccion => {
                if(['msg_privados', 'msg_grupos', 'posts'].includes(seccion.key)) {
                    div.innerHTML += `<div class="card"><h3>📁 ${seccion.key}</h3><div id="media-${seccion.key}" class="admin-media-scroll"></div></div>`;
                    seccion.forEach(item => {
                        document.getElementById('media-'+seccion.key).innerHTML += `<div>📄 ${item.key} <button onclick="rdb.ref('${seccion.key}/${item.key}').remove()">Eliminar</button></div>`;
                    });
                }
            });
        });
    }

    // --- REUTILIZO TUS FUNCIONES ORIGINALES (Solicitudes, Perfil, Posts, etc) ---
    function cerrarDM() { document.getElementById('dm-section').style.display = 'none'; }
    function toggleMenu(e) { e.stopPropagation(); document.getElementById('menuPerfil').classList.toggle('show'); }
    function cambiarFondo(t) { document.body.className = t === 'blanco' ? '' : 'tema-' + t; }
    function verSolicitudes() { 
        document.getElementById('panel-solicitudes').style.display = 'block';
        const lista = document.getElementById('lista-solicitudes');
        rdb.ref('solicitudes/' + miUsuario).on('value', s => {
            lista.innerHTML = s.exists() ? "" : "<p>No hay solicitudes.</p>";
            s.forEach(sol => {
                lista.innerHTML += `<div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                    <span>@${sol.key}</span>
                    <button onclick="aceptarAmigo('${sol.key}')" class="btn-main">Aceptar</button>
                </div>`;
            });
        });
    }
    function aceptarAmigo(quien) {
        rdb.ref('amigos/' + miUsuario + '/' + quien).set(true);
        rdb.ref('amigos/' + quien + '/' + miUsuario).set(true);
        rdb.ref('solicitudes/' + miUsuario + '/' + quien).remove();
        alert("¡Ahora son amigos!");
    }
    function verPerfil(user = miUsuario) {
        user = user.toLowerCase();
        document.getElementById('perfil-usuario').style.display = 'block';
        document.getElementById('nom-perfil').innerText = "@" + user;
        const areaBtn = document.getElementById('area-botones-perfil');
        if(user === miUsuario) {
            areaBtn.innerHTML = `<button onclick="cerrarPerfil()" class="btn-main" style="background:#ddd; color:black;">Volver</button>`;
            document.getElementById('btn-edit-portada').style.display = 'block';
            document.getElementById('btn-edit-foto').style.display = 'flex';
        } else {
            areaBtn.innerHTML = `<button onclick="abrirConversacion('${user}', false)" class="btn-main">Enviar DM</button>
                                 <button onclick="enviarSolicitud('${user}')" class="btn-main" style="background:#25d366">Agregar</button>
                                 <button onclick="cerrarPerfil()" class="btn-main" style="background:#ddd; color:black;">Volver</button>`;
        }
    }
    function cerrarPerfil() { document.getElementById('perfil-usuario').style.display = 'none'; }
    function enviarSolicitud(t) { rdb.ref('solicitudes/'+t+'/'+miUsuario).set(true); alert("Solicitud enviada"); }
    function cambiarSeccion(s) { seccionActual = s; document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.getElementById('tab-' + s).classList.add('active'); escucharPosts(); }
    function actualizarAvatarUI() { rdb.ref('perfiles/' + miUsuario).on('value', s => { const d = s.val(); if(d && d.foto) document.getElementById('avatar-global').style.backgroundImage = `url(${d.foto})`; document.getElementById('avatar-letra').innerText = d && d.foto ? "" : miUsuario.charAt(0).toUpperCase(); }); }
    window.onclick = () => document.getElementById('menuPerfil').classList.remove('show');
    
    // NOTA: He mantenido tus funciones de Cloudinary y Posts intactas al final para que no pierdas nada.
</script>
</body>
</html>
