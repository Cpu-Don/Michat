<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sincro - Red Social</title>
    <meta content="width=device-width,initial-scale=1" name="viewport"/>
    <style>
        body { background: #f0f2f5; margin: 0; padding: 0; font-family: Segoe UI, Helvetica, Arial, sans-serif; transition: 0.3s; }
        
        /* --- SISTEMA DE TEMAS --- */
        :root { --bg-body: #f0f2f5; --bg-card: white; --text-main: #1c1e21; --border: #ddd; }
        body.tema-oscuro { --bg-body: #18191a; --bg-card: #242526; --text-main: #e4e6eb; --border: #3e4042; }
        body.tema-azul { --bg-body: #0a192f; --bg-card: #112240; --text-main: #ccd6f6; --border: #233554; }

        body { background: var(--bg-body) !important; color: var(--text-main) !important; }
        .card { background: var(--bg-card) !important; border: 1px solid var(--border) !important; border-radius: 10px; padding: 15px; margin-bottom: 20px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }

        /* Cabecera */
        .header { position: fixed; top: 0; left: 0; width: 100%; box-sizing: border-box; background: #075e54; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .header h1 { margin: 0; font-size: 24px; cursor: pointer; }
        
        .user-avatar { width: 35px; height: 35px; background: #25d366; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; cursor: pointer; border: 2px solid white; position: relative; background-size: cover; background-position: center; }
        .profile-menu { display: none; position: absolute; top: 45px; right: 0; background: var(--bg-card); color: var(--text-main); min-width: 180px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); border-radius: 8px; overflow: hidden; z-index: 2000; border: 1px solid var(--border); }
        .profile-menu div { padding: 12px; cursor: pointer; border-bottom: 1px solid var(--border); font-size: 14px; }
        .profile-menu div:hover { background: rgba(0,0,0,0.05); }
        .show { display: block !important; }

        /* Inputs y Botones */
        #acceso { background: white; padding: 40px; border-radius: 15px; text-align: center; width: 320px; margin: 100px auto; color: black; }
        .btn-main { background: #075e54; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; margin-top: 70px; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; background: var(--bg-card); border-radius: 8px; border: 1px solid var(--border); }
        .tab.active { background: #e6f2f1; color: #075e54; font-weight: bold; border-color: #075e54; }
        
        select { padding: 5px; border-radius: 5px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-main); font-size: 12px; }
    </style>
</head>
<body>

<div id="app">
    <div id="acceso">
        <h1 style="color:#075e54;">Sincro</h1>
        <input id="usr" placeholder="Usuario" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:5px;">
        <input id="clv" type="password" placeholder="Clave" style="width:100%; padding:10px; margin-bottom:20px; border:1px solid #ddd; border-radius:5px;">
        <button onclick="entrar()" class="btn-main" style="width:100%;">ENTRAR</button>
    </div>

    <div id="main-layout" style="display:none; max-width: 600px; margin: auto; padding: 20px;">
        <div class="header">
            <h1 onclick="cerrarPerfil()">Sincro</h1>
            <div style="display:flex; align-items:center; gap:15px;">
                <div onclick="abrirDM()" style="cursor:pointer; background:rgba(255,255,255,0.2); padding:5px 12px; border-radius:20px; font-size:14px;">DM ✉</div>
                <div class="user-avatar" id="avatar-global" onclick="toggleMenu(event)">
                    <span id="avatar-letra">U</span>
                    <div id="menuPerfil" class="profile-menu">
                        <div onclick="verPerfil()">👤 Mi Perfil</div>
                        <div onclick="abrirConfig()">⚙️ Configuración</div>
                        <div style="font-weight:bold; background:rgba(0,0,0,0.05); padding:5px 12px; font-size:11px;">FONDO:</div>
                        <div onclick="cambiarFondo('blanco')">⚪ Blanco</div>
                        <div onclick="cambiarFondo('oscuro')">⚫ Oscuro</div>
                        <div onclick="cambiarFondo('azul')">🔵 Azulejo</div>
                        <div onclick="location.reload()" style="color:red; border-top:1px solid #eee;">🚪 Salir</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="tabs">
            <div id="tab-publico" class="tab active" onclick="cambiarSeccion('publico')">Noticias</div>
            <div id="tab-amigos" class="tab" onclick="cambiarSeccion('amigos')">Amigos</div>
        </div>

        <div class="card">
            <textarea id="post-text" placeholder="¿Qué quieres compartir?" style="width:100%; border:none; outline:none; resize:none; background:transparent; color:inherit; font-size:16px;"></textarea>
            <hr style="border:0; border-top:1px solid var(--border); margin:10px 0;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="display:flex; gap:10px; align-items:center;">
                    <button onclick="document.getElementById('file-post').click()" style="background:#f0f2f5; border:none; padding:5px 10px; border-radius:5px; cursor:pointer; font-size:12px;">📷 Foto</button>
                    <select id="post-privacy">
                        <option value="publico">🌍 Público</option>
                        <option value="amigos">👥 Solo Amigos</option>
                    </select>
                </div>
                <button class="btn-main" id="btn-publicar" onclick="publicarPost()">Publicar</button>
            </div>
            <input type="file" id="file-post" style="display:none" accept="image/*">
        </div>

        <div id="muro-dinamico"></div>
    </div>

    <div id="perfil-usuario" style="display:none; background:var(--bg-body); position:fixed; top:60px; left:0; width:100%; height:100%; z-index:950; overflow-y:auto; padding-bottom:100px;">
        <div id="portada-v" style="width:100%; height:180px; background:#075e54; position:relative; background-size:cover; background-position:center;">
            <button onclick="document.getElementById('f-portada').click()" style="position:absolute; bottom:10px; right:10px; background:rgba(0,0,0,0.6); color:white; border:none; padding:5px; border-radius:5px; cursor:pointer; font-size:12px;">Cambiar Portada</button>
        </div>
        <div style="text-align:center; margin-top:-50px;">
            <div id="foto-perfil-v" style="width:100px; height:100px; background:#25d366; border-radius:50%; border:4px solid var(--bg-body); margin:auto; background-size:cover; background-position:center; display:flex; justify-content:center; align-items:center; font-size:40px; color:white;">U</div>
            <button onclick="document.getElementById('f-perfil').click()" style="margin-top:-20px; background:#075e54; color:white; border-radius:50%; border:none; width:25px; height:25px; cursor:pointer;">+</button>
            <h2 id="nom-perfil" style="margin:10px 0;">Usuario</h2>
            <button onclick="cerrarPerfil()" class="btn-main" style="background:#ddd; color:black; padding:5px 20px;">Volver al Muro</button>
        </div>
        <div id="muro-perfil" style="max-width:600px; margin:20px auto; padding:0 20px;"></div>
        <input type="file" id="f-perfil" style="display:none" onchange="subirImagen('foto')">
        <input type="file" id="f-portada" style="display:none" onchange="subirImagen('portada')">
    </div>

    <div id="dm-section" style="display:none; background:var(--bg-body); position:fixed; top:60px; left:0; width:100%; height:100%; z-index:900; padding:20px; box-sizing:border-box;">
        <div style="display:flex; justify-content:space-between; align-items:center;"><h2>Mensajes</h2><button onclick="cerrarDM()">Cerrar</button></div>
        <div id="lista-dm"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = { databaseURL: "https://micanalmaestro-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const rdb = firebase.database();

    const CLOUD_NAME = "dhtyepcjg"; 
    const UPLOAD_PRESET = "Historial";

    let miUsuario = "";
    let seccionActual = "publico";

    function entrar() {
        const u = document.getElementById('usr').value.trim();
        const p = document.getElementById('clv').value.trim();
        if(!u || !p) return alert("Ingresa datos");

        rdb.ref('usuarios/' + u.toLowerCase()).once('value', s => {
            if(s.exists() && s.val().toString() === p) {
                miUsuario = u;
                iniciarApp();
            } else if(!s.exists()) {
                rdb.ref('usuarios/' + u.toLowerCase()).set(p).then(() => {
                    miUsuario = u;
                    iniciarApp();
                });
            } else { alert("Clave incorrecta"); }
        });
    }

    function iniciarApp() {
        document.getElementById('acceso').style.display = 'none';
        document.getElementById('main-layout').style.display = 'block';
        actualizarAvatarUI();
        escucharPosts();
    }

    function actualizarAvatarUI() {
        document.getElementById('avatar-letra').innerText = miUsuario.charAt(0).toUpperCase();
        rdb.ref('perfiles/' + miUsuario.toLowerCase()).on('value', s => {
            const d = s.val();
            if(d && d.foto) document.getElementById('avatar-global').style.backgroundImage = `url(${d.foto})`;
        });
    }

    /* --- PUBLICAR CON PRIVACIDAD --- */
    async function publicarPost() {
        const texto = document.getElementById('post-text').value.trim();
        const privacidad = document.getElementById('post-privacy').value;
        const file = document.getElementById('file-post').files[0];
        const btn = document.getElementById('btn-publicar');

        if(!texto && !file) return;
        btn.disabled = true; btn.innerText = "...";

        let url = "";
        if(file) {
            const formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", UPLOAD_PRESET);
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, { method: "POST", body: formData });
            const data = await res.json();
            url = data.secure_url;
        }

        rdb.ref('posts').push({
            autor: miUsuario,
            texto: texto,
            img: url,
            privacidad: privacidad, // "publico" o "amigos"
            fecha: Date.now()
        }).then(() => {
            document.getElementById('post-text').value = "";
            document.getElementById('file-post').value = "";
            btn.disabled = false; btn.innerText = "Publicar";
        });
    }

    function escucharPosts() {
        rdb.ref('posts').limitToLast(20).on('value', s => {
            const muro = document.getElementById('muro-dinamico');
            muro.innerHTML = "";
            const posts = [];
            s.forEach(child => { posts.unshift(child.val()); });

            posts.forEach(p => {
                // Filtro: Si es público, todos lo ven. Si es de amigos, solo el autor (por ahora).
                if(p.privacidad === 'publico' || p.autor === miUsuario) {
                    muro.innerHTML += `
                        <div class="card">
                            <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                                <div onclick="verPerfil('${p.autor}')" style="font-weight:bold; color:#075e54; cursor:pointer;">@${p.autor}</div>
                                <span style="font-size:10px; color:gray;">${p.privacidad === 'publico' ? '🌍' : '👥'}</span>
                            </div>
                            <p style="margin:0 0 10px 0;">${p.texto}</p>
                            ${p.img ? `<img src="${p.img}" style="width:100%; border-radius:8px;">` : ""}
                        </div>
                    `;
                }
            });
        });
    }

    /* --- GESTIÓN DE PERFIL --- */
    function verPerfil(user = miUsuario) {
        document.getElementById('perfil-usuario').style.display = 'block';
        document.getElementById('nom-perfil').innerText = "@" + user;
        
        rdb.ref('perfiles/' + user.toLowerCase()).on('value', s => {
            const d = s.val();
            if(d) {
                if(d.foto) document.getElementById('foto-perfil-v').style.backgroundImage = `url(${d.foto})`;
                if(d.portada) document.getElementById('portada-v').style.backgroundImage = `url(${d.portada})`;
            }
        });

        // Cargar muro del perfil específico
        rdb.ref('posts').orderByChild('autor').equalTo(user).on('value', s => {
            const m = document.getElementById('muro-perfil'); m.innerHTML = "";
            s.forEach(child => {
                const p = child.val();
                m.innerHTML = `<div class="card"><p>${p.texto}</p>${p.img ? `<img src="${p.img}" style="width:100%;">` : ""}</div>` + m.innerHTML;
            });
        });
    }

    async function subirImagen(tipo) {
        const file = tipo === 'foto' ? document.getElementById('f-perfil').files[0] : document.getElementById('f-portada').files[0];
        if(!file) return;
        
        const formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", UPLOAD_PRESET);
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, { method: "POST", body: formData });
        const data = await res.json();

        const update = {}; update[tipo] = data.secure_url;
        rdb.ref('perfiles/' + miUsuario.toLowerCase()).update(update);
    }

    function cerrarPerfil() { document.getElementById('perfil-usuario').style.display = 'none'; }
    function toggleMenu(e) { e.stopPropagation(); document.getElementById('menuPerfil').classList.toggle('show'); }
    function cambiarFondo(t) { document.body.className = ""; if(t!=='blanco') document.body.classList.add('tema-'+t); }
    function abrirDM() { document.getElementById('dm-section').style.display = 'block'; }
    function cerrarDM() { document.getElementById('dm-section').style.display = 'none'; }
</script>

</body>
</html>
