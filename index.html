<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sincro - Red Social</title>
    <meta content="width=device-width,initial-scale=1" name="viewport"/>
    <style>
        body { background: #f0f2f5; margin: 0; padding: 0; font-family: Segoe UI, Helvetica, Arial, sans-serif; transition: 0.3s; }
        
        /* --- SISTEMA DE TEMAS --- */
        :root { --bg-body: #f0f2f5; --bg-card: white; --text-main: #1c1e21; --border: #ddd; }
        body.tema-oscuro { --bg-body: #18191a; --bg-card: #242526; --text-main: #e4e6eb; --border: #3e4042; }
        body.tema-azul { --bg-body: #0a192f; --bg-card: #112240; --text-main: #ccd6f6; --border: #233554; }

        body { background: var(--bg-body) !important; color: var(--text-main) !important; }
        .card { background: var(--bg-card) !important; border: 1px solid var(--border) !important; border-radius: 10px; padding: 15px; margin-bottom: 20px; }

        /* Cabecera */
        .header { position: fixed; top: 0; left: 0; width: 100%; box-sizing: border-box; background: #075e54; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .header h1 { margin: 0; font-size: 24px; }
        
        /* Avatar y Menú */
        .user-avatar { width: 35px; height: 35px; background: #25d366; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; cursor: pointer; border: 2px solid white; position: relative; }
        .profile-menu { display: none; position: absolute; top: 45px; right: 0; background: var(--bg-card); color: var(--text-main); min-width: 180px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); border-radius: 8px; overflow: hidden; z-index: 2000; border: 1px solid var(--border); }
        .profile-menu div { padding: 12px; cursor: pointer; border-bottom: 1px solid var(--border); font-size: 14px; }
        .profile-menu div:hover { background: rgba(0,0,0,0.05); }
        .show { display: block !important; }

        /* Otros Estilos */
        #acceso { background: white; padding: 40px; border-radius: 15px; text-align: center; width: 320px; margin: 100px auto; }
        .btn-main { background: #075e54; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; width: 100%; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; margin-top: 70px; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; background: white; border-radius: 8px; }
        .tab.active { background: #e6f2f1; color: #075e54; font-weight: bold; }
    </style>
</head>
<body>

<div id="app">
    <div id="acceso">
        <h1 style="color:#075e54;">Sincro</h1>
        <input id="usr" placeholder="Usuario" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:5px;">
        <input id="clv" type="password" placeholder="Clave" style="width:100%; padding:10px; margin-bottom:20px; border:1px solid #ddd; border-radius:5px;">
        <button onclick="entrar()" class="btn-main">ENTRAR</button>
    </div>

    <div id="main-layout" style="display:none; max-width: 600px; margin: auto; padding: 20px;">
        <div class="header">
            <h1>Sincro</h1>
            <div style="display:flex; align-items:center; gap:15px;">
                <div onclick="abrirDM()" style="cursor:pointer; background:rgba(255,255,255,0.2); padding:5px 12px; border-radius:20px;">DM ✉</div>
                
                <div class="user-avatar" onclick="toggleMenu(event)">
                    <span id="avatar-letra">U</span>
                    <div id="menuPerfil" class="profile-menu">
                        <div onclick="alert('Tu perfil')">👤 Ver perfil</div>
                        <div onclick="abrirConfig()">⚙️ Configuración</div>
                        <div style="font-weight:bold; background:rgba(0,0,0,0.05); padding:5px 12px; font-size:12px;">TEMAS:</div>
                        <div onclick="cambiarFondo('blanco')">⚪ Blanco</div>
                        <div onclick="cambiarFondo('oscuro')">⚫ Oscuro</div>
                        <div onclick="cambiarFondo('azul')">🔵 Azulejo</div>
                        <div onclick="location.reload()" style="color:red; border-top:1px solid #eee;">🚪 Salir</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="tabs">
            <div id="tab-publico" class="tab active" onclick="cambiarSeccion('publico')">Noticias</div>
            <div id="tab-amigos" class="tab" onclick="cambiarSeccion('amigos')">Amigos</div>
        </div>

        <div class="card">
            <textarea id="post-text" placeholder="¿Qué quieres compartir?" style="width:100%; border:none; outline:none; resize:none;"></textarea>
            <button class="btn-main" onclick="publicarPost()" style="margin-top:10px;">Publicar</button>
        </div>

        <div id="muro-dinamico"></div>
    </div>

    <div id="dm-section" style="display:none; background:var(--bg-body); position:fixed; top:60px; left:0; width:100%; height:100%; z-index:900; padding:20px; box-sizing:border-box;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="color:#075e54;">Mensajes Directos</h2>
            <button onclick="cerrarDM()" style="padding:5px 15px; border-radius:5px; border:none; cursor:pointer;">Volver</button>
        </div>
        <div id="lista-contactos-dm" style="text-align:center; color:gray; margin-top:50px;">Aquí aparecerán tus amigos.</div>
    </div>

    <div id="config-section" style="display:none; background:white; padding:20px; border-radius:15px; box-shadow:0 10px 25px rgba(0,0,0,0.2); width:280px; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:3000; color: black;">
        <h3 style="margin-top:0; color:#075e54;">Configuración</h3>
        <input type="password" id="nueva-clv" placeholder="Nueva contraseña" style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ddd; border-radius:5px;">
        <button onclick="guardarConfig()" class="btn-main">Guardar</button>
        <button onclick="cerrarConfig()" style="width:100%; margin-top:10px; background:#ddd; border:none; padding:10px; border-radius:5px; cursor:pointer;">Cancelar</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // Configuración Firebase (Reemplaza con tus datos reales)
    const firebaseConfig = { databaseURL: "https://micanalmaestro-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const rdb = firebase.database();

    let miUsuario = "";

    function entrar() {
        const u = document.getElementById('usr').value.trim();
        const p = document.getElementById('clv').value.trim();
        if(!u || !p) return alert("Ingresa datos");

        rdb.ref('usuarios/' + u.toLowerCase()).once('value', s => {
            if(s.exists() && s.val().toString() === p) {
                miUsuario = u;
                iniciarApp();
            } else if(!s.exists()) {
                rdb.ref('usuarios/' + u.toLowerCase()).set(p).then(() => {
                    miUsuario = u;
                    iniciarApp();
                });
            } else {
                alert("Error de clave");
            }
        });
    }

    function iniciarApp() {
        document.getElementById('acceso').style.display = 'none';
        document.getElementById('main-layout').style.display = 'block';
        document.getElementById('avatar-letra').innerText = miUsuario.charAt(0).toUpperCase();
    }

    /* --- LÓGICA DEL MENÚ --- */
    function toggleMenu(e) {
        e.stopPropagation();
        document.getElementById('menuPerfil').classList.toggle('show');
    }

    window.onclick = () => document.getElementById('menuPerfil').classList.remove('show');

    function cambiarFondo(tipo) {
        document.body.className = "";
        if(tipo === 'oscuro') document.body.classList.add('tema-oscuro');
        if(tipo === 'azul') document.body.classList.add('tema-azul');
    }

    function abrirDM() { document.getElementById('dm-section').style.display = 'block'; }
    function cerrarDM() { document.getElementById('dm-section').style.display = 'none'; }
    function abrirConfig() { document.getElementById('config-section').style.display = 'block'; }
    function cerrarConfig() { document.getElementById('config-section').style.display = 'none'; }

    function guardarConfig() {
        const nc = document.getElementById('nueva-clv').value.trim();
        if(!nc) return alert("Escribe una clave");
        rdb.ref('usuarios/' + miUsuario.toLowerCase()).set(nc).then(() => {
            alert("Clave actualizada");
            cerrarConfig();
        });
    }
</script>

</body>
</html>
