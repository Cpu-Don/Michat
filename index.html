<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat FUNCIONAL</title>
<style>
body{margin:0;background:#111;color:white;font-family:sans-serif}
#chat{height:100vh;display:flex;flex-direction:column}
#msgs{flex:1;overflow:auto;padding:10px}
.msg{margin:5px;padding:8px;border-radius:8px;background:#222}
#input{display:flex}
input{flex:1;padding:10px}
button{padding:10px}
</style>
</head>

<body>

<div id="chat">
<div id="msgs"></div>
<div id="input">
<input id="txt" placeholder="Mensaje">
<button onclick="send()">Enviar</button>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
firebase.initializeApp({
 databaseURL:"https://micanalmaestro-default-rtdb.firebaseio.com/"
});

let user = "user_" + Math.floor(Math.random()*1000);
let db = firebase.database();

db.ref("test").on("value", snap=>{
 let box = document.getElementById("msgs");
 box.innerHTML="";
 snap.forEach(c=>{
  let m=c.val();
  let d=document.createElement("div");
  d.className="msg";
  d.innerText = m.u + ": " + m.t;
  box.appendChild(d);
 });
});

function send(){
 let t=document.getElementById("txt").value;
 if(!t) return;

 db.ref("test").push({
  u:user,
  t:t
 });

 document.getElementById("txt").value="";
}
</script>

</body>
</html>
