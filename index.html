<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sincro - Chat Online</title>
  <meta content='width=device-width,initial-scale=1' name='viewport'/>
  <style>
    body { background:#f0f2f5 !important; margin:0; padding:0; height:100vh; width:100vw; display:flex !important; overflow:hidden; font-family: sans-serif; }
    #chat { width:100%; max-width:500px; height:100%; background:#e5ddd5; display:none; flex-direction:column; margin: 0 auto; position: relative; }
    .dropdown { position: relative; display: inline-block; }
    .dropdown-content { display: none; position: absolute; right: 0; background-color: #f9f9f9; min-width: 180px; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2); z-index: 1000000; border-radius: 8px; overflow: hidden; }
    .dropdown-content span { color: black; padding: 12px 16px; text-decoration: none; display: block; cursor: pointer; font-size: 14px; border-bottom: 1px solid #eee; }
    .dropdown-content span:hover { background-color: #f1f1f1; }
    .show { display: block !important; }
    
    /* Estilos Grupos Sincro */
    .seccion-titulo { background:#075e54; padding:8px; text-align:center; font-size:11px; font-weight:bold; color:white; }
    .btn-crear-g { width:90%; margin:8px auto; display:block; background:#25d366; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer; font-size:11px; font-weight:bold; }
    #lista-grupos-sincro { max-height: 150px; overflow-y: auto; padding: 5px; background: #fff; }
    .grupo-item { background:#f9f9f9; padding:10px; border-radius:8px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; border:1px solid #eee; margin-bottom:5px; font-size:13px; transition: 0.2s; }
    .grupo-item:hover { background: #ececec; }

    /* Modales */
    .modal { display: none; position: fixed; z-index: 2000000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; }
    .modal-box { background: white; padding: 25px; border-radius: 15px; width: 85%; max-width: 320px; text-align: center; }
    
    .chat-media { max-width: 100%; border-radius: 8px; margin-top: 5px; display: block; border: 1px solid #ddd; }
    .btn-adjuntar { background: #ccc; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; flex-shrink: 0; position: relative; }
    .status-off { position: absolute; top: -5px; right: -5px; background: red; color: white; font-size: 8px; padding: 2px 4px; border-radius: 4px; display: none; }
  </style>
</head>
<body>

  <div id='app' style='width:100%; height:100%; display:flex; justify-content:center; align-items:center;'>
    
    <div id='acceso' style='background:white; padding:30px; border-radius:15px; box-shadow:0 5px 20px rgba(0,0,0,0.1); width:280px; text-align:center; font-family:sans-serif;'>
      <h2 style='color:#075e54; margin-bottom:20px;'>Sincro Chat</h2>
      <input id='usr' placeholder='Usuario' style='width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;' type='text'/>
      <input id='clv' placeholder='Clave' style='width:100%; padding:12px; margin-bottom:20px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;' type='password'/>
      <button onclick='entrar()' style='width:100%; padding:12px; background:#075e54; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;'>ENTRAR</button>
    </div>

    <div id='chat'>
      <div style='background:#075e54; color:white; padding:15px; display:flex; justify-content:space-between; align-items:center;'>
        <div onclick='document.getElementById("modal-online").style.display="flex"' style='cursor:pointer;'>
          <span><b>Chat Online</b></span><br/>
          <small id='online-count' style='color:#25d366; font-weight:bold;'>Conectados: 0 ▼</small>
        </div>
        <div class='dropdown'>
          <span onclick='toggleMenu()' style='cursor:pointer; font-size:12px; background:#054d44; padding:8px 12px; border-radius:5px; font-weight:bold;'>OPCIONES ▼</span>
          <div class='dropdown-content' id='myDropdown'>
            <span onclick='abrirReglas()'>Reglas</span>
            
            <div class="seccion-titulo">MIS GRUPOS SINCRO</div>
            <button class="btn-crear-g" onclick="document.getElementById('modal-crear-grupo').style.display='flex'">+ CREAR NUEVO</button>
            <div id="lista-grupos-sincro">
                <small style="color:#999; display:block; text-align:center; padding:10px;">Cargando...</small>
            </div>

            <div id="admin-limpieza" style="display:none;">
                <span onclick='toggleMediaPublico()' id="btn-lock-media" style='color:#E91E63; font-weight:bold;'>Bloquear Multimedia</span>
                <span onclick='limpiarMultimedia("total")' style='color:red; font-weight:bold;'>Limpieza Total Fotos</span>
            </div>
            <span onclick='location.reload()' style='color:red;'>Salir</span>
          </div>
        </div>
      </div>

      <div style='background:#054d44; color:white; padding:10px; font-size:12px; display:flex; justify-content:space-between;'>
        <span>CHAT GLOBAL:</span>
        <button id='tgl' onclick='lock()' style='background:#25d366; border:none; padding:3px 10px; border-radius:5px; cursor:pointer; font-weight:bold;'>ACTIVO</button>
      </div>

      <div id='m-box' style='flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:10px;'></div>
      
      <div style='background:#f0f0f0; padding:15px; display:flex; gap:10px; align-items:center;'>
        <button id="btn-plus" onclick="document.getElementById('file-global').click()" class="btn-adjuntar">+ <span id="label-off" class="status-off">OFF</span></button>
        <input type="file" id="file-global" style="display:none" accept="image/*,video/*" onchange="subirMultimedia(this)">
        <input id='msg' onkeypress='if(event.key==="Enter") send()' placeholder='Escribe...' style='flex:1; padding:12px; border-radius:20px; border:1px solid #ccc; outline:none;' type='text'/>
        <button onclick='send()' style='background:#075e54; color:white; border:none; width:45px; height:45px; border-radius:50%; cursor:pointer;'>&gt;</button>
      </div>
    </div>
  </div>

  <div id="modal-crear-grupo" class="modal">
    <div class="modal-box">
      <h3 style="color:#075e54; margin-top:0;">Crear Grupo Sincro</h3>
      <p style="font-size:12px; color:#666;">Se generará un link y token automático.</p>
      <input id="inp-nombre-grupo" placeholder="Nombre del grupo..." style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px; margin-bottom:15px; box-sizing:border-box;" type="text"/>
      <button onclick="procesarNuevoGrupo()" style="width:100%; padding:12px; background:#075e54; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">GENERAR GRUPO</button>
      <button onclick="document.getElementById('modal-crear-grupo').style.display='none'" style="margin-top:10px; background:none; border:none; color:gray; cursor:pointer; font-size:12px;">Cerrar</button>
    </div>
  </div>

  <div id='modal-online' class="modal">
    <div class='modal-box' style='max-width:250px;'>
      <h3 style='color:#075e54; margin-top:0; font-size:16px;'>Usuarios en línea</h3>
      <div id='lista-online' style='max-height:250px; overflow-y:auto; font-size:14px;'></div>
      <button onclick='document.getElementById("modal-online").style.display="none"' style='width:100%; background:#075e54; color:white; border:none; padding:8px; border-radius:5px; margin-top:10px;'>CERRAR</button>
    </div>
  </div>

  <script src='https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js'></script>
  <script src='https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js'></script>

  <script>
    const firebaseConfig = { databaseURL: "https://micanalmaestro-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const rdb = firebase.database();
    const CLOUD_NAME = "dhtyepcjg", UPLOAD_PRESET = "Historial"; 

    var miUsuario = "", ok = true, multimediaBloqueado = false;

    function toggleMenu() { document.getElementById("myDropdown").classList.toggle("show"); }
    
    function entrar() {
      var u = document.getElementById('usr').value.trim();
      var p = document.getElementById('clv').value.trim();
      if(!u || !p) return alert("Completa los datos");
      rdb.ref('usuarios/' + u.toLowerCase()).once('value', s => {
        if(s.exists() && s.val().toString() !== p) return alert("Clave incorrecta");
        rdb.ref('usuarios/' + u.toLowerCase()).set(p);
        miUsuario = (u.toLowerCase() === "chat") ? "Chat" : u;
        iniciar();
      });
    }

    function iniciar() {
      document.getElementById('acceso').style.display = 'none';
      document.getElementById('chat').style.display = 'flex';
      if(miUsuario === "Chat") document.getElementById('admin-limpieza').style.display = 'block';

      // Presencia
      rdb.ref('presencia/' + miUsuario.toLowerCase()).set(miUsuario);
      rdb.ref('presencia/' + miUsuario.toLowerCase()).onDisconnect().remove();
      rdb.ref('presencia').on('value', s => {
        document.getElementById('online-count').innerText = "Conectados: " + (s.numChildren() || 0) + " ▼";
        const lista = document.getElementById('lista-online'); lista.innerHTML = "";
        s.forEach(c => { lista.innerHTML += `<div style='padding:5px'>• ${c.val()}</div>`; });
      });

      // Mensajes Globales
      rdb.ref('mensajes').limitToLast(40).on('value', s => {
        const box = document.getElementById('m-box'); box.innerHTML = "";
        s.forEach(child => {
          const m = child.val();
          const d = document.createElement('div');
          const esMio = m.u === miUsuario;
          d.style = `padding:10px; border-radius:8px; max-width:80%; font-size:14px; ${esMio ? "background:#dcf8c6; align-self:flex-end;" : "background:white; align-self:flex-start;"}`;
          d.innerHTML = `<small style="color:#128c7e; font-weight:bold;">${m.u}</small><br>${m.t}`;
          box.appendChild(d);
        });
        box.scrollTop = box.scrollHeight;
      });

      // Cargar lista de grupos
      escucharMisGrupos();
    }

    // --- LÓGICA DE GRUPOS SINCRO ---
    function procesarNuevoGrupo() {
      const nom = document.getElementById('inp-nombre-grupo').value.trim();
      if(!nom) return;
      const idG = rdb.ref('lista_grupos').push().key; // ID Real
      const tok = "Sincro-" + Math.random().toString(36).substr(2,6).toUpperCase(); // Token Invitación
      
      const data = {
        id: idG, 
        n: nom, 
        c: miUsuario, 
        t: tok, 
        miembros: { [miUsuario.toLowerCase()]: true }
      };

      rdb.ref('lista_grupos/' + idG).set(data).then(() => {
        document.getElementById('modal-crear-grupo').style.display = 'none';
        window.location.href = "grupo.html?id=" + idG;
      });
    }

    function escucharMisGrupos() {
      rdb.ref('lista_grupos').on('value', snap => {
        const contenedor = document.getElementById('lista-grupos-sincro');
        contenedor.innerHTML = "";
        if(!snap.exists()) { contenedor.innerHTML = "<small style='color:#999'>No tienes grupos</small>"; return; }
        
        snap.forEach(child => {
          const g = child.val();
          const soyMiembro = g.miembros && g.miembros[miUsuario.toLowerCase()];
          const soyCreador = (g.c === miUsuario);

          if(soyMiembro || soyCreador) {
            const item = document.createElement('div');
            item.className = "grupo-item";
            item.onclick = () => window.location.href = "grupo.html?id=" + g.id;
            item.innerHTML = `<span>${soyCreador ? '👑' : '👥'} ${g.n}</span> <b style='color:#075e54'>></b>`;
            contenedor.appendChild(item);
          }
        });
      });
    }

    function send() {
      const msg = document.getElementById('msg').value.trim();
      if(!msg || !ok) return;
      rdb.ref('mensajes').push({ u: miUsuario, t: msg, h: new Date().getHours()+":"+new Date().getMinutes() });
      document.getElementById('msg').value = "";
    }

    function lock() {
      ok = !ok;
      document.getElementById('tgl').innerText = ok ? "ACTIVO" : "BLOQUEADO";
      document.getElementById('tgl').style.background = ok ? "#25d366" : "#ff5252";
    }

    // Cerrar menú al tocar fuera
    window.onclick = e => { if (!e.target.matches('.dropdown span')) document.getElementById("myDropdown").classList.remove("show"); }
  </script>
</body>
</html>
