<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sincro Chat PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { margin:0; font-family:sans-serif; background:#111; }

#chat {
  display:flex;
  flex-direction:column;
  height:100vh;
  max-width:500px;
  margin:auto;
  background:#0b141a;
}

#top {
  background:#202c33;
  color:white;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

#m-box {
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.msg {
  padding:8px 12px;
  border-radius:10px;
  max-width:75%;
  font-size:14px;
}

.yo {
  background:#005c4b;
  align-self:flex-end;
  color:white;
}

.otro {
  background:#202c33;
  align-self:flex-start;
  color:white;
}

#input {
  display:flex;
  padding:10px;
  background:#202c33;
}

input {
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
  outline:none;
}

button {
  margin-left:5px;
  border:none;
  border-radius:50%;
  width:40px;
  height:40px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="chat">

<div id="top">
  <b id="nombre-chat">Chat</b>
  <div>
    <button onclick="crearGrupo()">➕</button>
    <button onclick="unirseGrupo()">🔗</button>
    <button onclick="abrirGrupoSettings()">⚙️</button>
  </div>
</div>

<div id="m-box"></div>

<div style="color:#ccc; font-size:12px; padding-left:10px;" id="typing"></div>

<div id="input">
  <input id="msg" placeholder="Escribe..." oninput="escribiendo()" onkeypress="if(event.key==='Enter')send()">
  <button onclick="send()">➤</button>
</div>

</div>

<!-- SETTINGS -->
<div id="grupo-settings" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6);">
  <div style="background:#202c33; color:white; padding:20px; width:300px; margin:50px auto; border-radius:10px;">
    
    <h3>Ajustes</h3>

    📝 Nombre:
    <input id="g-nombre" style="width:100%; margin-bottom:10px;">

    🔗 Link:
    <div id="g-link" style="font-size:12px; margin-bottom:10px;"></div>

    <button onclick="resetearLink()">🔄 Reset</button>

    <h4>👥 Miembros</h4>
    <div id="g-miembros"></div>

    <button onclick="cerrarGrupoSettings()">Cerrar</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  databaseURL: "https://micanalmaestro-default-rtdb.firebaseio.com/"
};
firebase.initializeApp(firebaseConfig);
const rdb = firebase.database();

/* USUARIO */
let miUsuario = localStorage.getItem("user") || prompt("Tu nombre:");
localStorage.setItem("user", miUsuario);

/* VARIABLES */
let grupoActual = "";
let soyCreador = false;
let typingTimeout;
let audio = new Audio("https://cdn.pixabay.com/audio/2022/03/24/audio_7839176318.mp3");

/* CREAR */
function crearGrupo(){
  let nombre = prompt("Nombre:");
  if(!nombre) return;

  let id="grp_"+Date.now();
  let token="Sincro-"+Math.random().toString(36).substr(2,6);

  rdb.ref("grupos/"+id).set({
    nombre, creador:miUsuario, token
  });

  rdb.ref("grupos/"+id+"/miembros/"+miUsuario).set(true);

  grupoActual=id;
  soyCreador=true;

  abrirGrupo(id);
}

/* UNIR */
function unirseGrupo(){
  let token=prompt("Token:");
  if(!token) return;

  rdb.ref("grupos").once("value", snap=>{
    snap.forEach(g=>{
      if(g.val().token===token){
        grupoActual=g.key;
        soyCreador=(g.val().creador===miUsuario);
        rdb.ref("grupos/"+g.key+"/miembros/"+miUsuario).set(true);
        abrirGrupo(g.key);
      }
    });
  });
}

/* ABRIR */
function abrirGrupo(id){
  rdb.ref("grupos/"+id+"/nombre").on("value", s=>{
    document.getElementById("nombre-chat").innerText=s.val();
  });

  rdb.ref("grupos/"+id+"/mensajes").on("value", snap=>{
    let box=document.getElementById("m-box");
    box.innerHTML="";

    snap.forEach(c=>{
      let m=c.val();

      let div=document.createElement("div");
      div.className="msg "+(m.u===miUsuario?"yo":"otro");

      div.innerHTML=
        "<b>"+m.u+"</b><br>"+escapeHTML(m.t)+
        "<div style='font-size:10px;text-align:right;'>"+(m.visto?"✔✔":"✔")+"</div>";

      box.appendChild(div);
    });

    box.scrollTop=box.scrollHeight;
  });

  /* VISTO */
  rdb.ref("grupos/"+id+"/mensajes").once("value", snap=>{
    snap.forEach(c=>{
      rdb.ref("grupos/"+id+"/mensajes/"+c.key+"/visto").set(true);
    });
  });

  /* TYPING */
  rdb.ref("typing/"+id).on("value", s=>{
    let data=s.val()||{};
    let otros=Object.keys(data).filter(u=>u!==miUsuario);
    document.getElementById("typing").innerText=
      otros.length?otros.join(", ")+" escribiendo...":"";
  });
}

/* ENVIAR */
function send(){
  let texto=document.getElementById("msg").value.trim();
  if(!texto) return;

  rdb.ref("grupos/"+grupoActual+"/mensajes").push({
    u:miUsuario,
    t:texto,
    visto:false
  });

  document.getElementById("msg").value="";
  rdb.ref("typing/"+grupoActual+"/"+miUsuario).remove();
  audio.play().catch(()=>{});
}

/* ESCAPAR HTML */
function escapeHTML(str){
  return str.replace(/</g,"&lt;");
}

/* TYPING */
function escribiendo(){
  rdb.ref("typing/"+grupoActual+"/"+miUsuario).set(true);

  clearTimeout(typingTimeout);
  typingTimeout=setTimeout(()=>{
    rdb.ref("typing/"+grupoActual+"/"+miUsuario).remove();
  },2000);
}

/* SETTINGS */
function abrirGrupoSettings(){
  document.getElementById("grupo-settings").style.display="block";

  rdb.ref("grupos/"+grupoActual).once("value", snap=>{
    let g=snap.val();

    document.getElementById("g-nombre").value=g.nombre;
    document.getElementById("g-link").innerText="sincro.com/unirse?t="+g.token;

    let cont=document.getElementById("g-miembros");
    cont.innerHTML="";

    Object.keys(g.miembros||{}).forEach(u=>{
      let div=document.createElement("div");
      div.innerHTML=u+(soyCreador?` <button onclick="expulsar('${u}')">❌</button>`:"");
      cont.appendChild(div);
    });
  });
}

document.addEventListener("input", e=>{
  if(e.target.id==="g-nombre" && soyCreador){
    rdb.ref("grupos/"+grupoActual+"/nombre").set(e.target.value);
  }
});

/* RESET */
function resetearLink(){
  if(!soyCreador) return;
  let nuevo="Sincro-"+Math.random().toString(36).substr(2,6);
  rdb.ref("grupos/"+grupoActual+"/token").set(nuevo);
}

/* EXPULSAR */
function expulsar(u){
  rdb.ref("grupos/"+grupoActual+"/miembros/"+u).remove();
}

/* CERRAR */
function cerrarGrupoSettings(){
  document.getElementById("grupo-settings").style.display="none";
}
</script>

</body>
</html>
