<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Chat Online</title>
  <meta content='width=device-width,initial-scale=1' name='viewport'/>
  <style>
    body { background:#f0f2f5 !important; margin:0; padding:0; height:100vh; width:100vw; display:flex !important; overflow:hidden; }
    #content, .section, .widget { display: block !important; width: 100%; height: 100%; }
    .navbar, .header-outer, .footer-outer { display: none !important; }
    .dropdown { position: relative; display: inline-block; }
    .dropdown-content { display: none; position: absolute; right: 0; background-color: #f9f9f9; min-width: 150px; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2); z-index: 1000000; border-radius: 5px; }
    .dropdown-content span { color: black; padding: 12px 16px; text-decoration: none; display: block; cursor: pointer; font-size: 14px; border-bottom: 1px solid #eee; }
    .dropdown-content span:hover { background-color: #f1f1f1; }
    .show { display: block !important; }
    #modal-reglas, #modal-online { display: none; position: fixed; z-index: 1000001; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); justify-content: center; align-items: center; font-family: sans-serif; }
    .modal-box { background: white; padding: 20px; border-radius: 10px; width: 85%; max-width: 400px; position: relative; }
    .chat-link { color: #075e54; text-decoration: underline; font-weight: bold; }
    
    /* Estilos Multimedia */
    .chat-media { max-width: 100%; border-radius: 8px; margin-top: 5px; display: block; border: 1px solid #ddd; cursor: pointer; }
    .btn-adjuntar { background: #ccc; color: #333; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; justify-content: center; align-items: center; flex-shrink: 0; position: relative; font-weight: bold; }
    .btn-disabled { opacity: 0.4; cursor: not-allowed !important; filter: grayscale(1); }
    .status-off { position: absolute; top: -5px; right: -5px; background: red; color: white; font-size: 8px; padding: 2px 4px; border-radius: 4px; display: none; }

    /* Estilos de Grupo */
    #grupo-config { 
        position: fixed; 
        top: 0; left: 0; width: 100%; height: 100%; 
        background: rgba(0,0,0,0.7); 
        z-index: 1000005; 
        display: none; 
        justify-content: center; 
        align-items: center; 
        font-family: sans-serif;
    }
    #grupo-config .modal-box {
        background: white; 
        padding: 20px; 
        border-radius: 10px; 
        width: 90%; 
        max-width: 450px; 
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }
    #grupo-config h3 { margin-top: 0; color: #075e54; }
    #grupo-config .input-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
    #grupo-config .input-group input[type="text"], 
    #grupo-config .input-group input[type="password"] {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 8px;
        box-sizing: border-box;
    }
    #grupo-config .btn {
        padding: 10px 15px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        font-size: 14px;
    }
    .btn-restablecer { background: #ffc107; color: #333; }
    .btn-expulsar { background: #dc3545; color: white; }
    .btn-cerrar { background: #6c757d; color: white; }
    .btn-crear-grupo { background: #28a745; color: white; }
    .lista-miembros { max-height: 150px; overflow-y: auto; border: 1px solid #eee; padding: 10px; border-radius: 5px; }
    .lista-miembros div { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid #f0f0f0; }
    .lista-miembros div:last-child { border-bottom: none; }
    .lista-miembros span { font-size: 13px; color: #555; }
    .lista-miembros button { padding: 3px 8px; font-size: 11px; }

    #menu-grupos { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000004; justify-content: center; align-items: center; font-family: sans-serif; }
    #menu-grupos .modal-box {
        background: white; 
        padding: 20px; 
        border-radius: 10px; 
        width: 90%; 
        max-width: 400px; 
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }
    #menu-grupos h3 { margin-top: 0; color: #075e54; }
    #menu-grupos .grupo-item { 
        padding: 10px; 
        background: #f9f9f9; 
        border-radius: 5px; 
        border: 1px solid #eee; 
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    #menu-grupos .grupo-item:hover { background: #f1f1f1; }
    #menu-grupos .grupo-item span { font-weight: bold; color: #075e54; }
    #menu-grupos .grupo-item small { font-size: 10px; color: #888; }
    .btn-config-grupo { background: #007bff; color: white; padding: 4px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; }
  </style>
</head>
<body>

  <div id='app' style='position:fixed; top:0; left:0; width:100%; height:100%; background:#f0f2f5; z-index:999999; display:flex; justify-content:center; align-items:center;'>
    
    <div id='acceso' style='background:white; padding:30px; border-radius:15px; box-shadow:0 5px 20px rgba(0,0,0,0.1); width:280px; text-align:center; font-family:sans-serif;'>
      <h2 style='color:#075e54; margin:0 0 20px 0;'>Registrarte o Inicia sesión</h2>
      <input id='usr' placeholder='Usuario' style='width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;' type='text'/>
      <input id='clv' placeholder='Clave' style='width:100%; padding:12px; margin-bottom:20px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;' type='password'/>
      <button onclick='entrar()' style='width:100%; padding:12px; background:#075e54; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;'>ENTRAR</button>
    </div>

    <div id='chat' style='width:100%; max-width:500px; height:100%; background:#e5ddd5; display:none; flex-direction:column; font-family:sans-serif;'>
      <div style='background:#075e54; color:white; padding:15px; display:flex; justify-content:space-between; align-items:center;'>
        <div onclick='verQuienesEstanOnline()' style='display:flex; flex-direction:column; cursor:pointer;'>
          <span id="chat-title"><b>Chat Online</b></span>
          <small id='online-count' style='font-size:10px; color:#25d366; font-weight:bold;'>Conectados: 0 &#9660;</small>
        </div>
        <div class='dropdown'>
          <span onclick='toggleMenu()' style='cursor:pointer; font-size:12px; background:#054d44; padding:5px 10px; border-radius:5px; font-weight:bold;'>OPCIONES &#9660;</span>
          <div class='dropdown-content' id='myDropdown'>
            <span onclick='abrirMenuGrupos()'>Mis Grupos</span>
            <span onclick='abrirReglas()'>Reglas</span>
            <div id="admin-limpieza-media" style="display:none;">
                <span id="btn-lock-media" onclick='toggleMediaPublico()' style='color:#E91E63; font-weight:bold;'>Bloquear Multimedia</span>
                <span onclick='limpiarMultimedia("privado")' style='color:#2196F3;'>Limpiar Fotos Privadas</span>
                <span onclick='limpiarMultimedia("publico")' style='color:#4CAF50;'>Limpiar Fotos Públicas</span>
                <span onclick='limpiarMultimedia("total")' style='color:red; font-weight:bold;'>LIMPIEZA TOTAL FOTOS</span>
            </div>
            <span id='btn-borrar-todo' onclick='borrarTodoElChat()' style='color:orange; display:none;'>Borrar Chat Texto</span>
            <span onclick='location.reload()' style='color:red;'>Salir</span>
          </div>
        </div>
      </div>
      <div style='background:#054d44; color:white; padding:10px; font-size:12px; display:flex; justify-content:space-between;'>
        <span id="current-chat-mode">CHAT GLOBAL:</span>
        <button id='tgl' onclick='lock()' style='background:#25d366; border:none; padding:3px 10px; border-radius:5px; cursor:pointer; font-weight:bold;'>ACTIVO</button>
      </div>
      <div id='m-box' style='flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:10px;'></div>
      
      <div style='background:#f0f0f0; padding:15px; display:flex; gap:10px; align-items:center;'>
        <button id="btn-adjuntar-global" onclick="document.getElementById('file-global').click()" class="btn-adjuntar">
            + <span id="label-off" class="status-off">OFF</span>
        </button>
        <input type="file" id="file-global" style="display:none" accept="image/*,video/*" onchange="subirMultimedia(this, 'global')">
        <input id='msg' onkeypress='if(event.key==="Enter") send()' placeholder='Escribe...' style='flex:1; padding:12px; border-radius:20px; border:1px solid #ccc; outline:none;' type='text'/>
        <button id="btn-send-global" onclick='send()' style='background:#075e54; color:white; border:none; width:45px; height:45px; border-radius:50%; cursor:pointer;'>&gt;</button>
      </div>
    </div>

    <div id='p-chat' style='display:none; position:fixed; bottom:0; right:15px; width:270px; background:white; border-radius:10px 10px 0 0; box-shadow:0 -5px 20px rgba(0,0,0,0.3); z-index:1000005; font-family:sans-serif; flex-direction:column; border:1px solid #075e54;'>
      <div style='background:#075e54; color:white; padding:10px 12px; border-radius:10px 10px 0 0; display:flex; flex-direction:column;'>
        <div style='display:flex; justify-content:space-between; align-items:center;'>
          <span id='p-nombre' style='font-size:13px; font-weight:bold;'>Privado</span>
          <span onclick='cerrarPrivado()' style='cursor:pointer; font-size:20px; font-weight:bold;'>X</span>
        </div>
        <small id='p-status' style='font-size:10px; color:#25d366; font-weight:bold; height:12px;'></small>
      </div>
      <div id='p-box' style='height:250px; overflow-y:auto; padding:10px; font-size:12px; background:#e5ddd5; display:flex; flex-direction:column; gap:8px;'></div>
      <div style='padding:10px; background:#f0f0f0; display:flex; gap:5px; border-top:1px solid #ddd; align-items:center;'>
        <button onclick="document.getElementById('file-privado').click()" style="background:#ccc; border:none; width:32px; height:32px; border-radius:50%; cursor:pointer;">+</button>
        <input type="file" id="file-privado" style="display:none" accept="image/*,video/*" onchange="subirMultimedia(this, 'privado')">
        <input id='p-msg' oninput='notificarEscribiendo()' onkeypress='if(event.key==="Enter") enviarPrivado()' placeholder='Privado...' style='flex:1; border:1px solid #ccc; border-radius:15px; padding:8px 12px; outline:none; font-size:12px;' type='text'/>
        <button id="btn-send-privado" onclick='enviarPrivado()' style='background:#075e54; color:white; border:none; border-radius:50%; width:32px; height:32px; cursor:pointer;'>&gt;</button>
      </div>
    </div>
  </div>

  <!-- Ventana Modal de Configuración de Grupo -->
  <div id='grupo-config'>
    <div class='modal-box'>
        <h3 id="grupo-config-titulo">Configuración del Grupo</h3>
        <div class="input-group">
            <label for="grupo-nombre">Nombre:</label>
            <input type="text" id="grupo-nombre" placeholder="Nombre del grupo">
        </div>
        <div class="input-group">
            <label for="grupo-link">Link Actual:</label>
            <input type="text" id="grupo-link" readonly>
            <button class="btn btn-restablecer" onclick="restablecerLinkGrupo()">Restablecer enlace</button>
        </div>
        <div class="input-group">
            <label>Miembros:</label>
            <div class="lista-miembros" id="grupo-miembros">
                <!-- Aquí se listarán los miembros -->
            </div>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-cerrar" onclick="cerrarConfigGrupo()">Cerrar</button>
            <button class="btn btn-crear-grupo" id="btn-guardar-grupo" onclick="guardarConfigGrupo()" style="display: none;">Guardar Cambios</button>
            <button class="btn btn-crear-grupo" id="btn-crear-grupo-modal" onclick="crearNuevoGrupo()" style="display: none;">Crear Grupo</button>
        </div>
    </div>
  </div>

  <!-- Ventana Modal para mostrar Grupos del Usuario -->
  <div id='menu-grupos'>
      <div class='modal-box'>
          <h3>Mis Grupos</h3>
          <div id="lista-mis-grupos">
              <!-- Aquí se listarán los grupos creados por el usuario -->
          </div>
          <button class="btn btn-crear-grupo" onclick="mostrarCrearGrupo()">Crear Nuevo Grupo</button>
          <button class="btn btn-cerrar" onclick="cerrarMenuGrupos()">Cerrar</button>
      </div>
  </div>

  <div id='modal-reglas'>
    <div class='modal-box'>
      <h3 style='color:#075e54; margin-top:0;'>Chat En Linea</h3>
      <div id='reglas-texto' style='font-size:14px; margin-bottom:15px; white-space:pre-wrap; max-height:200px; overflow-y:auto; padding:10px; background:#f9f9f9;'></div>
      <div id='admin-editor' style='display:none; border-top:1px solid #eee; padding-top:10px;'>
        <textarea id='edit-reglas' placeholder='Nuevas reglas...' style='width:100%; height:60px; font-size:12px;'></textarea>
        <button onclick='guardarReglas()' style='width:100%; background:#075e54; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer; margin-top:5px;'>ACTUALIZAR</button>
      </div>
      <button onclick='cerrarReglas()' style='width:100%; background:#777; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer; margin-top:10px;'>CERRAR</button>
    </div>
  </div>

  <div id='modal-online'>
    <div class='modal-box' style='max-width:250px;'>
      <h3 style='color:#075e54; margin-top:0; font-size:16px;'>Usuarios en línea</h3>
      <div id='lista-online' style='max-height:250px; overflow-y:auto; font-size:14px; color:#333; line-height:2;'></div>
      <div id='admin-limpiar' style='display:none;'>
          <button onclick='limpiarPresencia()' style='width:100%; background:orange; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer; margin-top:10px; font-size:11px; font-weight:bold;'>LIMPIAR FANTASMAS</button>
      </div>
      <button onclick='document.getElementById("modal-online").style.display="none"' style='width:100%; background:#075e54; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer; margin-top:10px;'>CERRAR</button>
    </div>
  </div>

  <script src='https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js'></script>
  <script src='https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js'></script>

  <script>
    const firebaseConfig = { databaseURL: "https://micanalmaestro-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const rdb = firebase.database();

    const CLOUD_NAME = "dhtyepcjg";
    const UPLOAD_PRESET = "Historial"; 

    var ok = true; // Estado del chat global (activo/bloqueado)
    var miUsuario = "";
    var usuarioDestino = ""; // Para chat privado
    var escribiendoTimeout;
    var multimediaBloqueado = false;
    var audioNotif = new Audio("https://cdn.pixabay.com/audio/2022/03/24/audio_7839176318.mp3");
    const EMOJIS = ['❤️', '🥲', '🤣', '🥰'];
    
    // Variables de Grupo
    var gruposUsuario = {}; // Almacena los grupos creados por el usuario
    var grupoActual = null; // El grupo que se está configurando o viendo

    // --- Funciones de Interfaz y Navegación ---
    function toggleMenu() { document.getElementById("myDropdown").classList.toggle("show"); }
    function abrirReglas() { document.getElementById("modal-reglas").style.display = "flex"; }
    function cerrarReglas() { document.getElementById("modal-reglas").style.display = "none"; }
    function verQuienesEstanOnline() { document.getElementById('modal-online').style.display = 'flex'; if(miUsuario === "Chat") document.getElementById('admin-limpiar').style.display = 'block'; }
    function limpiarPresencia() { if(confirm("¿Eliminar usuarios fantasmas?")) { rdb.ref('presencia').remove().then(() => { location.reload(); }); } }

    // --- Funciones de Chat ---
    function linkify(text) {
      if(!text) return "";
      // Detectar si es una URL de media alojada
      if(text.includes("res.cloudinary.com")) {
          if(text.match(/\.(jpeg|jpg|gif|png|webp)$/i)) return `<img src="${text}" class="chat-media" onclick="window.open(this.src)">`;
          if(text.match(/\.(mp4|mov|avi|webm)$/i)) return `<video src="${text}" class="chat-media" controls></video>`;
      }
      // Detectar URLs normales
      var urlPattern = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
      return text.replace(urlPattern, function
