<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sincro - Feed</title>
  <meta content='width=device-width,initial-scale=1' name='viewport'/>
  <style>
    /* Mantenemos tu base y añadimos el estilo de MURO */
    body { background:#f0f2f5 !important; margin:0; padding:0; height:100vh; width:100vw; display:flex !important; overflow:hidden; transition: background 0.3s; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    #content, .section, .widget { display: block !important; width: 100%; height: 100%; }
    .navbar, .header-outer, .footer-outer { display: none !important; }
    
    /* ESTILO TIPO FACEBOOK (NOTICIAS) */
    .post-card { 
      background: white; 
      border-radius: 10px; 
      box-shadow: 0 1px 2px rgba(0,0,0,0.1); 
      margin-bottom: 15px; 
      padding: 12px; 
      width: 92%; 
      align-self: center;
      border: 1px solid #ddd;
    }
    .post-header { display: flex; align-items: center; margin-bottom: 10px; border-bottom: 1px solid #f0f2f5; padding-bottom: 8px; }
    .post-user { color: #1c1e21; font-weight: bold; font-size: 15px; cursor: pointer; text-decoration: none; flex: 1; }
    .post-user:hover { text-decoration: underline; }
    .post-time { color: #65676b; font-size: 12px; }
    .post-content { font-size: 15px; color: #050505; line-height: 1.4; word-break: break-all; margin: 10px 0; }
    .post-footer { display: flex; gap: 8px; border-top: 1px solid #f0f2f5; padding-top: 10px; flex-wrap: wrap; }
    
    /* Multimedia en el Muro */
    .chat-media { width: 100%; border-radius: 8px; margin-top: 5px; display: block; cursor: pointer; object-fit: cover; max-height: 400px; }
    
    .dropdown { position: relative; display: inline-block; }
    .dropdown-content { display: none; position: absolute; right: 0; background-color: #f9f9f9; min-width: 150px; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2); z-index: 1000000; border-radius: 5px; }
    .dropdown-content span { color: black; padding: 12px 16px; text-decoration: none; display: block; cursor: pointer; font-size: 14px; border-bottom: 1px solid #eee; }
    .show { display: block !important; }

    #modal-reglas, #modal-online { display: none; position: fixed; z-index: 1000001; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
    .modal-box { background: white; padding: 20px; border-radius: 10px; width: 85%; max-width: 400px; position: relative; }
    
    .btn-adjuntar { background: #e4e6eb; color: #333; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
    .status-off { position: absolute; top: -5px; right: -5px; background: red; color: white; font-size: 8px; padding: 2px 4px; border-radius: 4px; display: none; }

    /* Pestañas Sincro */
    .tab-sincro { cursor: pointer; font-size: 14px; padding: 8px 15px; transition: all 0.3s; color: #b0b3b8; font-weight: 600; }
    .tab-active { color: #2e89ff; border-bottom: 3px solid #2e89ff; }
  </style>
</head>
<body>

  <div id='app' style='position:fixed; top:0; left:0; width:100%; height:100%; background:#f0f2f5; z-index:999999; display:flex; justify-content:center; align-items:center;'>
    
    <div id='acceso' style='background:white; padding:30px; border-radius:15px; box-shadow:0 5px 20px rgba(0,0,0,0.1); width:300px; text-align:center;'>
      <h1 style='color:#1877f2; margin:0 0 10px 0; font-family:sans-serif;'>Sincro</h1>
      <p style="color:#606770; font-size:14px; margin-bottom:20px;">Conecta con tus amigos y el mundo.</p>
      <input id='usr' placeholder='Nombre de usuario' style='width:100%; padding:14px; margin-bottom:10px; border:1px solid #dddfe2; border-radius:6px; box-sizing:border-box;' type='text'/>
      <input id='clv' placeholder='Contraseña' style='width:100%; padding:14px; margin-bottom:20px; border:1px solid #dddfe2; border-radius:6px; box-sizing:border-box;' type='password'/>
      <button onclick='entrar()' style='width:100%; padding:12px; background:#1877f2; color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold; font-size:16px;'>Iniciar Sesión</button>
    </div>

    <div id='chat' style='width:100%; max-width:550px; height:100%; background:#f0f2f5; display:none; flex-direction:column;'>
      
      <div style='background:white; padding:10px 15px; display:flex; flex-direction:column; border-bottom: 1px solid #ddd;'>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <h2 style="color:#1877f2; margin:0; font-size:24px;">Sincro</h2>
            <div class='dropdown'>
                <span onclick='toggleMenu()' style='cursor:pointer; background:#e4e6eb; padding:8px 12px; border-radius:20px; font-size:14px; font-weight:600;'>Menú ▼</span>
                <div class='dropdown-content' id='myDropdown'>
                    <span onclick='abrirReglas()'>Reglas</span>
                    <div id="admin-limpieza-media" style="display:none;">
                        <span onclick='limpiarMultimedia("total")' style='color:red;'>Limpiar Multimedia</span>
                        <span id='btn-borrar-todo' onclick='borrarTodoElChat()' style='color:orange;'>Vaciar Texto</span>
                    </div>
                    <span onclick='location.reload()' style='color:red;'>Cerrar Sesión</span>
                </div>
            </div>
        </div>
        <div style="display:flex; justify-content:space-around; border-top: 1px solid #f0f2f5;">
            <div id="t-pub" onclick="filtrarAudiencia('publico')" class="tab-sincro tab-active">Noticias</div>
            <div id="t-ami" onclick="filtrarAudiencia('amigos')" class="tab-sincro">Amigos</div>
        </div>
      </div>

      <div id='m-box' style='flex:1; padding:10px 0; overflow-y:auto; display:flex; flex-direction:column; background:#f0f2f5;'></div>
      
      <div style='background:white; padding:15px; border-top:1px solid #ddd; display:flex; gap:10px; align-items:center;'>
        <button id="btn-plus-publico" onclick="document.getElementById('file-global').click()" class="btn-adjuntar">📸</button>
        <input type="file" id="file-global" style="display:none" accept="image/*,video/*" onchange="subirMultimedia(this, 'global')">
        <input id='msg' onkeypress='if(event.key==="Enter") send()' placeholder='¿Qué estás pensando?' style='flex:1; padding:12px; border-radius:25px; border:none; background:#f0f2f5; outline:none; font-size:15px;' type='text'/>
        <button onclick='send()' style='background:#1877f2; color:white; border:none; padding:10px 18px; border-radius:20px; cursor:pointer; font-weight:bold;'>Publicar</button>
      </div>
    </div>

    <div id='p-chat' style='display:none; position:fixed; bottom:0; right:15px; width:280px; background:white; border-radius:8px 8px 0 0; box-shadow:0 -5px 15px rgba(0,0,0,0.2); z-index:1000005; flex-direction:column; border:1px solid #ddd;'>
      <div style='background:#1877f2; color:white; padding:10px; border-radius:8px 8px 0 0; display:flex; justify-content:space-between; align-items:center;'>
        <span id='p-nombre' style='font-size:13px; font-weight:bold;'>Chat</span>
        <span onclick='cerrarPrivado()' style='cursor:pointer; font-weight:bold;'>X</span>
      </div>
      <div id='p-box' style='height:250px; overflow-y:auto; padding:10px; font-size:12px; background:#f0f2f5; display:flex; flex-direction:column; gap:8px;'></div>
      <div style='padding:10px; display:flex; gap:5px; border-top:1px solid #ddd;'>
        <input id='p-msg' onkeypress='if(event.key==="Enter") enviarPrivado()' placeholder='Mensaje...' style='flex:1; border:1px solid #ddd; border-radius:15px; padding:6px 12px; font-size:12px;' type='text'/>
        <button onclick='enviarPrivado()' style='background:#1877f2; color:white; border:none; border-radius:50%; width:30px; height:30px;'>></button>
      </div>
    </div>
  </div>

  <script src='https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js'></script>
  <script src='https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js'></script>

  <script>
    const firebaseConfig = { databaseURL: "https://micanalmaestro-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const rdb = firebase.database();
    const CLOUD_NAME = "dhtyepcjg";
    const UPLOAD_PRESET = "Historial"; 

    var miUsuario = "";
    var usuarioDestino = "";
    var vistaActual = "publico";
    const EMOJIS = ['❤️', '🤣', '😮', '🥲'];

    function filtrarAudiencia(tipo) {
        vistaActual = tipo;
        document.getElementById('t-pub').classList.toggle('tab-active', tipo === 'publico');
        document.getElementById('t-ami').classList.toggle('tab-active', tipo === 'amigos');
        rdb.ref('mensajes').once('value', () => {}); 
    }

    function linkify(text) {
      if(!text) return "";
      if(text.includes("res.cloudinary.com")) {
          if(text.match(/\.(jpeg|jpg|gif|png|webp)$/i)) return '<img src="'+text+'" class="chat-media" onclick="window.open(this.src)">';
          if(text.match(/\.(mp4|mov|avi|webm)$/i)) return '<video src="'+text+'" class="chat-media" controls></video>';
      }
      return text.replace(/(\b(https?):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig, function(url) {
        return '<a href="' + url + '" target="_blank" style="color:#1877f2; font-weight:bold;">' + url + '</a>';
      });
    }

    // --- ENTRADA Y LECTURA TIPO MURO ---
    function entrar() {
      var uO = document.getElementById('usr').value.trim();
      var p = document.getElementById('clv').value.trim();
      if(!uO || !p) return;
      rdb.ref('usuarios/' + uO.toLowerCase()).once('value', (s) => {
        if(s.exists() && s.val().toString() === p.toString()) { miUsuario = uO; iniciar(); }
        else if(!s.exists()) { rdb.ref('usuarios/' + uO.toLowerCase()).set(p); miUsuario = uO; iniciar(); }
        else { alert("Error"); }
      });
    }

    function iniciar() {
      document.getElementById('acceso').style.display = 'none';
      document.getElementById('chat').style.display = 'flex';
      
      if(miUsuario.toLowerCase() === "chat") { 
         document.getElementById('admin-limpieza-media').style.display = 'block'; 
         document.getElementById('btn-borrar-todo').style.display = 'block';
      }

      rdb.ref('mensajes').on('value', (snapshot) => {
        var box = document.getElementById('m-box'); box.innerHTML = ""; 
        if(snapshot.exists()){
          snapshot.forEach((child) => {
            var m = child.val(), id = child.key;
            if((m.p || 'publico') !== vistaActual) return;

            var d = document.createElement('div');
            d.className = "post-card";
            
            var html = `
                <div class="post-header">
                    <div class="post-user" onclick="abrirPrivado('${m.u}')">${m.u}</div>
                    <div class="post-time">${m.h || ""}</div>
                    ${miUsuario.toLowerCase() === "chat" ? `<span onclick="borrarM('${id}')" style="color:red; margin-left:10px; cursor:pointer;">×</span>` : ""}
                </div>
                <div class="post-content">${linkify(m.t || "")}</div>
                <div class="post-footer">`;
            
            EMOJIS.forEach(emoji => {
              var count = (m.reacciones && m.reacciones[emoji]) ? Object.keys(m.reacciones[emoji]).length : 0;
              var activo = (m.reacciones && m.reacciones[emoji] && m.reacciones[emoji][miUsuario]);
              html += `<span onclick="reaccionar('${id}','${emoji}')" style="cursor:pointer; font-size:13px; background:${activo?'#e7f3ff':'#f0f2f5'}; padding:5px 10px; border-radius:15px; color:${activo?'#1877f2':'#65676b'}; font-weight:600;">${emoji} ${count > 0 ? count : ""}</span>`;
            });
            
            html += `</div>`;
            d.innerHTML = html; box.appendChild(d);
          });
          box.scrollTop = box.scrollHeight;
        }
      });
    }

    function send() {
      var i = document.getElementById('msg'), t = i.value.trim();
      if(!t) return;
      var h = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      rdb.ref('mensajes').push({ u: miUsuario, t: t.replace(/</g, "&lt;"), h: h, p: vistaActual });
      i.value = '';
    }

    async function subirMultimedia(input, tipo) {
      const file = input.files[0]; if(!file) return;
      const formData = new FormData();
      formData.append("file", file); formData.append("upload_preset", UPLOAD_PRESET);
      try {
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, { method: "POST", body: formData });
        const data = await res.json();
        document.getElementById('msg').value = data.secure_url; send();
      } catch (err) { alert("Error"); }
    }

    // REACCIONES Y OTROS MANTENIDOS
    function reaccionar(id, emoji) {
      rdb.ref('mensajes/'+id+'/reacciones').once('value', (s) => {
        var d = s.val() || {};
        EMOJIS.forEach(e => { if(d[e] && d[e][miUsuario]) rdb.ref('mensajes/'+id+'/reacciones/'+e+'/'+miUsuario).remove(); });
        if(!d[emoji] || !d[emoji][miUsuario]) rdb.ref('mensajes/'+id+'/reacciones/'+emoji+'/'+miUsuario).set(true);
      });
    }

    function abrirPrivado(n) { if (n === miUsuario) return; usuarioDestino = n; document.getElementById("p-nombre").innerText = "Chat con " + n; document.getElementById("p-chat").style.display = "flex"; }
    function cerrarPrivado() { document.getElementById("p-chat").style.display = "none"; }
    function toggleMenu() { document.getElementById("myDropdown").classList.toggle("show"); }
    function borrarM(id) { if(confirm("¿Borrar?")) rdb.ref('mensajes/' + id).remove(); }
  </script>
</body>
</html>
