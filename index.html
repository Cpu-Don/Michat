<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sincro - Red Social Completa</title>
  <meta content='width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no' name='viewport'/>
  <style>
    /* BASE */
    body { background:#f0f2f5 !important; margin:0; padding:0; height:100vh; width:100vw; display:flex !important; overflow:hidden; font-family: -apple-system, sans-serif; }
    #content, .section, .widget { display: block !important; width: 100%; height: 100%; }
    .navbar, .header-outer, .footer-outer { display: none !important; }

    /* POSTS */
    .post-card { background: white; border-radius: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); margin-bottom: 12px; padding: 12px; width: 92%; align-self: center; border: 1px solid #dddfe2; position: relative; }
    .post-header { display: flex; align-items: center; margin-bottom: 8px; justify-content: space-between; }
    .post-user { color: #1c1e21; font-weight: bold; font-size: 15px; cursor: pointer; }
    .post-badge { font-size: 10px; background: #e4e6eb; padding: 2px 6px; border-radius: 4px; color: #65676b; margin-left: 5px; }
    .post-content { font-size: 15px; color: #050505; line-height: 1.4; word-break: break-word; margin: 8px 0; }
    .chat-media { width: 100%; border-radius: 8px; margin-top: 5px; display: block; max-height: 400px; object-fit: cover; }
    
    /* MENÚS Y DROPDOWNS */
    .dropdown { position: relative; }
    .drop-btn { cursor: pointer; padding: 5px 10px; font-weight: bold; font-size: 18px; color: #65676b; }
    .dropdown-content { display: none; position: absolute; right: 0; background-color: white; min-width: 150px; box-shadow: 0px 4px 12px rgba(0,0,0,0.2); z-index: 10000; border-radius: 8px; border: 1px solid #ddd; }
    .dropdown-content span { color: black; padding: 12px; display: block; cursor: pointer; font-size: 14px; border-bottom: 1px solid #eee; }
    .show { display: block !important; }

    /* MODALES */
    #modal-sincro { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:3000000; justify-content:center; align-items:center; }
    .modal-box { background:white; padding:20px; border-radius:12px; width:85%; max-width:350px; text-align:center; }
    .modal-input { width: 90%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin: 15px 0; }

    /* PERFIL Y FOTOS */
    #perfil-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f0f2f5; z-index: 1000002; overflow-y: auto; flex-direction: column; align-items: center; }
    .perfil-header { width: 100%; max-width: 500px; background: white; position: relative; padding-bottom: 15px; border-bottom: 1px solid #ddd; text-align: center; }
    .portada-wrap { width: 100%; height: 180px; background: #ccd0d5; position: relative; cursor: pointer; overflow: hidden; }
    .avatar-wrap { width: 120px; height: 120px; margin-top: -60px; border-radius: 50%; border: 4px solid white; background: #eee; position: relative; cursor: pointer; overflow: hidden; z-index: 2; display: inline-block; }
    .perfil-portada, .perfil-avatar { width: 100%; height: 100%; object-fit: cover; }
    .cam-icon { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.6); color: white; border-radius: 50%; width: 25px; height: 25px; line-height: 25px; font-size: 12px; }

    /* BOTONES */
    .btn-pub { background:#1877f2; color:white; border:none; padding:12px; border-radius:20px; font-weight:bold; cursor:pointer; width: 92%; align-self: center; }
    .sel-priv { background: #f0f2f5; border: 1px solid #ddd; border-radius: 15px; padding: 5px 10px; font-size: 12px; }
    .tab-sincro { cursor: pointer; font-size: 13px; padding: 12px 5px; color: #65676b; font-weight: 600; flex: 1; text-align: center; }
    .tab-active { color: #1877f2; border-bottom: 3px solid #1877f2; }
    
    /* PERSONAS */
    .user-row { display: flex; align-items: center; justify-content: space-between; padding: 10px; background: white; margin: 5px 10px; border-radius: 8px; border: 1px solid #ddd; }
  </style>
</head>
<body>

  <div id='app'>
    <div id='acceso' style='position:fixed; top:0; left:0; width:100%; height:100%; z-index:999999; display:flex; justify-content:center; align-items:center; background:#f0f2f5;'>
      <div style='background:white; padding:40px 30px; border-radius:15px; width:320px; text-align:center;'>
        <h1 style='color:#1877f2; margin:0;'>Sincro</h1>
        <input id='usr' placeholder='Usuario' style='width:100%; padding:14px; margin:10px 0; border:1px solid #dddfe2; border-radius:8px;' type='text'/>
        <input id='clv' placeholder='Contraseña' style='width:100%; padding:14px; margin-bottom:20px; border:1px solid #dddfe2; border-radius:8px;' type='password'/>
        <button onclick='entrar()' style='width:100%; padding:12px; background:#1877f2; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;'>ENTRAR</button>
      </div>
    </div>

    <div id='chat' style='width:100%; max-width:500px; height:100vh; background:#f0f2f5; display:none; flex-direction:column; margin: 0 auto;'>
      <div style='background:white; padding:10px 15px; border-bottom: 1px solid #ddd;'>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="color:#1877f2; margin:0;">Sincro</h2>
            <div id="notif-badge" onclick="verSolicitudes()" style="display:none; background:red; color:white; border-radius:50%; padding:2px 8px; font-size:12px; cursor:pointer;">!</div>
            <div class='dropdown'>
                <span onclick='toggleDrop("menu-top")' style='cursor:pointer; background:#f0f2f5; padding:8px 15px; border-radius:20px; font-size:13px; font-weight:bold;'>MENÚ ▼</span>
                <div class='dropdown-content' id='menu-top'>
                    <span onclick='abrirPerfil(miUsuario)'>👤 Mi Perfil</span>
                    <span onclick='verPersonas()'>👥 Personas</span>
                    <span onclick='location.reload()' style='color:red;'>🚪 Salir</span>
                </div>
            </div>
        </div>
        <div style="display:flex; margin-top:10px;">
            <div id="t-pub" onclick="filtrarAudiencia('publico')" class="tab-sincro tab-active">Noticias</div>
            <div id="t-ami" onclick="filtrarAudiencia('amigos')" class="tab-sincro">Amigos</div>
        </div>
      </div>
      <div id='m-box' style='flex:1; padding:15px 0; overflow-y:auto; display:flex; flex-direction:column;'></div>
      
      <div style='background:white; padding:12px; border-top:1px solid #ddd; display:flex; flex-direction:column; gap:8px;'>
        <div style="display:flex; gap:10px; align-items:center;">
            <select id="priv-global" class="sel-priv"><option value="publico">🌍</option><option value="amigos">👥</option></select>
            <button onclick="document.getElementById('file-global').click()" style="border:none; background:#e4e6eb; width:35px; height:35px; border-radius:50%;">📷</button>
            <input type="file" id="file-global" style="display:none" onchange="subirMultimedia(this, 'msg', 'msg')">
            <input id='msg' placeholder='¿Qué piensas?' style='flex:1; border:none; background:#f0f2f5; padding:12px; border-radius:20px;' type='text'/>
        </div>
        <button onclick='send("msg", "priv-global")' class="btn-pub">Publicar</button>
      </div>
    </div>

    <div id='perfil-view'>
        <div class="perfil-header">
            <button onclick="cerrarPerfil()" style="position:absolute; top:10px; left:10px; z-index:10; background:rgba(0,0,0,0.6); color:#fff; border-radius:50%; border:none; width:35px; height:35px;">←</button>
            <div class="portada-wrap" onclick="if(pUsuarioActual === miUsuario) document.getElementById('file-portada').click()">
                <img id="p-portada" class="perfil-portada" src=""><div class="cam-icon">📷</div>
            </div>
            <input type="file" id="file-portada" style="display:none" onchange="subirMultimedia(this, 'portada')">
            <div class="avatar-wrap" onclick="if(pUsuarioActual === miUsuario) document.getElementById('file-avatar').click()">
                <img id="p-avatar" class="perfil-avatar" src=""><div class="cam-icon">📷</div>
            </div>
            <input type="file" id="file-avatar" style="display:none" onchange="subirMultimedia(this, 'avatar')">
            <div id="p-nombre" style="font-size:22px; font-weight:bold; margin-top:10px;"></div>
            <div id="p-bio" style="font-size:14px; color:#65676b; margin:5px 20px;"></div>
            <div id="p-acciones" style="margin-bottom:15px; display:flex; justify-content:center; gap:10px;"></div>
            <div id="p-input-perfil" style="display:none; padding:15px; border-top:1px solid #f0f2f5; background:#fff; flex-direction:column; gap:8px;">
                <div style="display:flex; gap:10px; align-items:center;">
                    <select id="priv-perfil" class="sel-priv"><option value="publico">🌍</option><option value="amigos">👥</option></select>
                    <input id='msg-perfil' placeholder='Escribe en tu muro...' style='flex:1; border:none; background:#f0f2f5; padding:12px; border-radius:20px;' type='text'/>
                </div>
                <button onclick='send("msg-perfil", "priv-perfil")' class="btn-pub">Postear</button>
            </div>
        </div>
        <div id="perfil-muro" style="width:100%; max-width:500px; padding-bottom:50px;"></div>
    </div>
  </div>

  <div id='modal-sincro'><div class="modal-box" id="modal-box-content"></div></div>

  <script src='https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js'></script>
  <script src='https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js'></script>

  <script>
    const firebaseConfig = { databaseURL: "https://micanalmaestro-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const rdb = firebase.database();
    const CLOUD_NAME = "dhtyepcjg", UPLOAD_PRESET = "Historial"; 

    var miUsuario = "", vistaActual = "publico", pUsuarioActual = "";
    const EMOJIS = ['❤️', '🤣', '😮', '🥲'];

    function toggleDrop(id) { event.stopPropagation(); const el = document.getElementById(id); const isShow = el.classList.contains("show"); document.querySelectorAll('.dropdown-content').forEach(d => d.classList.remove('show')); if(!isShow) el.classList.add("show"); }
    window.onclick = function() { document.querySelectorAll('.dropdown-content').forEach(d => d.classList.remove('show')); };
    function showModal(html) { document.getElementById('modal-box-content').innerHTML = html; document.getElementById('modal-sincro').style.display = 'flex'; }
    function hideModal() { document.getElementById('modal-sincro').style.display = 'none'; }
    window.onpopstate = function() { if (document.getElementById('perfil-view').style.display === 'flex') cerrarPerfilSilent(); };

    function entrar() {
        var u = document.getElementById('usr').value.trim();
        var c = document.getElementById('clv').value.trim();
        if(!u || !c) return;
        rdb.ref('usuarios/'+u.toLowerCase()).once('value', (s) => {
            if(s.exists() && s.val().toString() === c.toString()) { miUsuario = u; iniciar(); }
            else if(!s.exists()) { rdb.ref('usuarios/'+u.toLowerCase()).set(c); miUsuario = u; iniciar(); }
        });
    }

    function iniciar() {
        document.getElementById('acceso').style.display = 'none';
        document.getElementById('chat').style.display = 'flex';
        escucharMensajes();
        escucharSolicitudes();
    }

    function escucharMensajes() {
        rdb.ref('mensajes').on('value', (snapshot) => {
            var box = document.getElementById('m-box'); box.innerHTML = "";
            snapshot.forEach((child) => {
                var m = child.val(), id = child.key;
                if(vistaActual === 'publico' && m.p === 'amigos') return;
                box.prepend(crearPostHTML(m, id));
            });
        });
    }

    function escucharSolicitudes() {
        rdb.ref('solicitudes/'+miUsuario.toLowerCase()).on('value', s => {
            const badge = document.getElementById('notif-badge');
            badge.style.display = s.exists() ? 'block' : 'none';
        });
    }

    function crearPostHTML(m, id) {
        var d = document.createElement('div'); d.className = "post-card";
        var opt = (m.u === miUsuario) ? `<div class='dropdown'><span class='drop-btn' onclick='toggleDrop("opt-${id}")'>⋮</span>
            <div class='dropdown-content' id='opt-${id}'><span onclick="editarPost('${id}','${m.t.replace(/'/g, "\\'")}')">✏️ Editar</span><span onclick='borrarPost("${id}")' style='color:red;'>🗑️ Borrar</span></div></div>` : "";
        d.innerHTML = `<div class="post-header"><div><span class="post-user" onclick="abrirPerfil('${m.u}')">${m.u}</span><span class="post-badge">${m.p==='amigos'?'👥':'🌍'}</span></div>${opt}</div>
            <div class="post-content">${linkify(m.t)}</div><div id="reac-${id}" style="display:flex; margin-top:8px; border-top:1px solid #eee;"></div>`;
        setTimeout(() => { let f = document.getElementById("reac-"+id); if(f) EMOJIS.forEach(e => { f.innerHTML += `<span onclick="reaccionar('${id}','${e}')" style="cursor:pointer; padding:5px 8px;">${e}</span>`; }); }, 0);
        return d;
    }

    function linkify(t) {
        if(t.includes("cloudinary.com")) return t.match(/\.(jpeg|jpg|png|gif|webp)$/i) ? `<img src="${t}" class="chat-media">` : `<video src="${t}" class="chat-media" controls></video>`;
        return t.replace(/(\bhttps?:\/\/\S+)/ig, '<a href="$1" target="_blank" style="color:#1877f2; text-decoration:none;">$1</a>');
    }

    function abrirPerfil(user) {
        pUsuarioActual = user;
        document.getElementById('perfil-view').style.display = 'flex';
        window.history.pushState({view: 'perfil'}, "");
        document.getElementById('p-nombre').innerText = user;
        document.getElementById('p-input-perfil').style.display = (user === miUsuario) ? 'flex' : 'none';
        
        let acciones = document.getElementById('p-acciones');
        if(user === miUsuario) {
            acciones.innerHTML = `<button onclick="editarBio()" style="padding:8px 15px; border-radius:8px; border:none; background:#e4e6eb; font-weight:bold; cursor:pointer;">Editar Bio</button>`;
        } else {
            acciones.innerHTML = `<button onclick="enviarSolicitud('${user}')" style="padding:8px 15px; border-radius:8px; border:none; background:#1877f2; color:white; font-weight:bold; cursor:pointer;">Añadir Amigo</button>`;
        }

        rdb.ref('perfiles/' + user.toLowerCase()).on('value', (s) => {
            const data = s.val() || {};
            document.getElementById('p-avatar').src = data.avatar || "https://via.placeholder.com/120?text=Sincro";
            document.getElementById('p-portada').src = data.portada || "https://via.placeholder.com/500x180?text=Sincro";
            document.getElementById('p-bio').innerText = data.bio || "Hola, estoy en Sincro.";
        });
        cargarMuroPerfil(user);
    }

    function cargarMuroPerfil(user) {
        rdb.ref('mensajes').once('value', (snapshot) => {
            var box = document.getElementById('perfil-muro'); box.innerHTML = "";
            snapshot.forEach((child) => {
                var m = child.val(); if(m.u.toLowerCase() === user.toLowerCase()) box.prepend(crearPostHTML(m, child.key));
            });
        });
    }

    function verPersonas() {
        rdb.ref('usuarios').once('value', s => {
            let h = "<h3>Descubrir Personas</h3><div style='max-height:300px; overflow-y:auto;'>";
            s.forEach(u => {
                if(u.key !== miUsuario.toLowerCase()) h += `<div class="user-row"><b>${u.key}</b><button onclick="abrirPerfil('${u.key}'); hideModal();" style="border:none; background:#1877f2; color:white; padding:5px 10px; border-radius:5px;">Ver</button></div>`;
            });
            h += "</div><br><button onclick='hideModal()'>Cerrar</button>";
            showModal(h);
        });
    }

    function enviarSolicitud(user) {
        rdb.ref('solicitudes/'+user.toLowerCase()+'/'+miUsuario).set(true);
        alert("Solicitud enviada a " + user);
    }

    function verSolicitudes() {
        rdb.ref('solicitudes/'+miUsuario.toLowerCase()).once('value', s => {
            let h = "<h3>Solicitudes de Amistad</h3>";
            if(!s.exists()) h += "<p>No tienes solicitudes nuevas.</p>";
            s.forEach(c => {
                h += `<div class="user-row"><span>${c.key}</span><button onclick="aceptar('${c.key}')" style="background:green; color:white; border:none; padding:5px; border-radius:5px;">Aceptar</button></div>`;
            });
            h += "<br><button onclick='hideModal()'>Cerrar</button>";
            showModal(h);
        });
    }

    function aceptar(quien) {
        rdb.ref('amistades/'+miUsuario.toLowerCase()+'/'+quien.toLowerCase()).set(true);
        rdb.ref('amistades/'+quien.toLowerCase()+'/'+miUsuario.toLowerCase()).set(true);
        rdb.ref('solicitudes/'+miUsuario.toLowerCase()+'/'+quien).remove();
        alert("¡Ahora eres amigo de " + quien + "!");
        hideModal();
    }

    function send(inputId, privId) {
        var msg = document.getElementById(inputId); if(!msg.value.trim()) return;
        rdb.ref('mensajes').push({ u: miUsuario, t: msg.value, p: document.getElementById(privId).value });
        msg.value = ""; if(inputId === 'msg-perfil') cargarMuroPerfil(miUsuario);
    }

    async function subirMultimedia(input, tipo, target) {
        const file = input.files[0]; if(!file) return;
        const formData = new FormData(); formData.append("file", file); formData.append("upload_preset", UPLOAD_PRESET);
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, { method: "POST", body: formData });
        const data = await res.json();
        if(tipo === 'msg') { document.getElementById(target).value = data.secure_url; send(target, (target==='msg'?'priv-global':'priv-perfil')); }
        else { rdb.ref('perfiles/'+miUsuario.toLowerCase()+'/'+tipo).set(data.secure_url); }
    }

    function cerrarPerfil() { if (window.history.state && window.history.state.view === 'perfil') window.history.back(); cerrarPerfilSilent(); }
    function cerrarPerfilSilent() { document.getElementById('perfil-view').style.display = 'none'; }
    function editarBio() { showModal(`<h3>Editar Biografía</h3><textarea id="new-bio" class="modal-input" rows="3">${document.getElementById('p-bio').innerText}</textarea><div class="modal-btns"><button onclick="hideModal()">Cerrar</button><button onclick="rdb.ref('perfiles/'+miUsuario.toLowerCase()+'/bio').set(document.getElementById('new-bio').value); hideModal();" style="background:#1877f2; color:white; border:none; padding:10px 15px; border-radius:8px;">Guardar</button></div>`); }
    function editarPost(id, texto) { showModal(`<h3>Editar Post</h3><textarea id="edit-txt" class="modal-input" rows="3">${texto}</textarea><div class="modal-btns"><button onclick="hideModal()">Cerrar</button><button onclick="rdb.ref('mensajes/'+'${id}').update({t: document.getElementById('edit-txt').value}); hideModal(); if(pUsuarioActual) cargarMuroPerfil(pUsuarioActual);" style="background:#1877f2; color:white; border:none; padding:10px 15px; border-radius:8px;">Actualizar</button></div>`); }
    function borrarPost(id) { showModal(`<h3>¿Borrar?</h3><div class="modal-btns"><button onclick="hideModal()">No</button><button onclick="rdb.ref('mensajes/'+'${id}').remove(); hideModal(); if(pUsuarioActual) cargarMuroPerfil(pUsuarioActual);" style="background:red; color:white; border:none; padding:10px 15px; border-radius:8px;">Borrar</button></div>`); }
    function reaccionar(id, emoji) { rdb.ref('mensajes/'+id+'/reacciones/'+emoji+'/'+miUsuario).set(true); }
    function filtrarAudiencia(t) { vistaActual = t; document.getElementById('t-pub').className = (t==='publico')?'tab-sincro tab-active':'tab-sincro'; document.getElementById('t-ami').className = (t==='amigos')?'tab-sincro tab-active':'tab-sincro'; escucharMensajes(); }
  </script>
</body>
</html>
