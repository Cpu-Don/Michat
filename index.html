<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Chat Online</title>
  <meta content='width=device-width,initial-scale=1' name='viewport'/>
  <style>
    body { background:#f0f2f5 !important; margin:0; padding:0; height:100vh; width:100vw; display:flex !important; overflow:hidden; }
    #content, .section, .widget { display: block !important; width: 100%; height: 100%; }
    .navbar, .header-outer, .footer-outer { display: none !important; }
    .dropdown { position: relative; display: inline-block; }
    .dropdown-content { display: none; position: absolute; right: 0; background-color: #f9f9f9; min-width: 150px; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2); z-index: 1000000; border-radius: 5px; }
    .dropdown-content span { color: black; padding: 12px 16px; text-decoration: none; display: block; cursor: pointer; font-size: 14px; border-bottom: 1px solid #eee; }
    .dropdown-content span:hover { background-color: #f1f1f1; }
    .show { display: block !important; }
    #modal-reglas, #modal-online, #modal-grupos, #modal-crear-g { display: none; position: fixed; z-index: 1000001; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); justify-content: center; align-items: center; font-family: sans-serif; }
    .modal-box { background: white; padding: 20px; border-radius: 10px; width: 85%; max-width: 400px; position: relative; }
    .chat-link { color: #075e54; text-decoration: underline; font-weight: bold; }
    
    /* Estilos Multimedia */
    .chat-media { max-width: 100%; border-radius: 8px; margin-top: 5px; display: block; border: 1px solid #ddd; cursor: pointer; }
    .btn-adjuntar { background: #ccc; color: #333; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; justify-content: center; align-items: center; flex-shrink: 0; position: relative; font-weight: bold; }
    .btn-disabled { opacity: 0.4; cursor: not-allowed !important; filter: grayscale(1); }
    .status-off { position: absolute; top: -5px; right: -5px; background: red; color: white; font-size: 8px; padding: 2px 4px; border-radius: 4px; display: none; }

    /* Estilos Nuevos: Grupos y Buscador */
    .search-input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    .user-item { display: flex; align-items: center; gap: 10px; padding: 8px; border-bottom: 1px solid #eee; }
    .g-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; }
    .btn-g { padding: 5px 10px; border-radius: 5px; border: none; cursor: pointer; font-size: 12px; font-weight: bold; }
  </style>
</head>
<body>

  <div id='app' style='position:fixed; top:0; left:0; width:100%; height:100%; background:#f0f2f5; z-index:999999; display:flex; justify-content:center; align-items:center;'>
    
    <div id='acceso' style='background:white; padding:30px; border-radius:15px; box-shadow:0 5px 20px rgba(0,0,0,0.1); width:280px; text-align:center; font-family:sans-serif;'>
      <h2 style='color:#075e54; margin:0 0 20px 0;'>Registrarte o Inicia sesión</h2>
      <input id='usr' placeholder='Usuario' style='width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;' type='text'/>
      <input id='clv' placeholder='Clave' style='width:100%; padding:12px; margin-bottom:20px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;' type='password'/>
      <button onclick='entrar()' style='width:100%; padding:12px; background:#075e54; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;'>ENTRAR</button>
    </div>

    <div id='chat' style='width:100%; max-width:500px; height:100%; background:#e5ddd5; display:none; flex-direction:column; font-family:sans-serif;'>
      <div style='background:#075e54; color:white; padding:15px; display:flex; justify-content:space-between; align-items:center;'>
        <div onclick='verQuienesEstanOnline()' style='display:flex; flex-direction:column; cursor:pointer;'>
          <span><b>Chat Online</b></span>
          <small id='online-count' style='font-size:10px; color:#25d366; font-weight:bold;'>Conectados: 0 &#9660;</small>
        </div>
        <div class='dropdown'>
          <span onclick='toggleMenu()' style='cursor:pointer; font-size:12px; background:#054d44; padding:5px 10px; border-radius:5px; font-weight:bold;'>OPCIONES &#9660;</span>
          <div class='dropdown-content' id='myDropdown'>
            <span onclick='abrirReglas()'>Reglas</span>
            <span onclick='abrirModalGrupos()'>Mis Grupos</span>
            <span onclick='abrirModalCrearG()'>Crear Grupo</span>
            <div id="admin-limpieza-media" style="display:none;">
                <span id="btn-lock-media" onclick='toggleMediaPublico()' style='color:#E91E63; font-weight:bold;'>Bloquear Multimedia</span>
                <span onclick='limpiarMultimedia("privado")' style='color:#2196F3;'>Limpiar Fotos Privadas</span>
                <span onclick='limpiarMultimedia("publico")' style='color:#4CAF50;'>Limpiar Fotos Públicas</span>
                <span onclick='limpiarMultimedia("total")' style='color:red; font-weight:bold;'>LIMPIEZA TOTAL FOTOS</span>
            </div>
            <span id='btn-borrar-todo' onclick='borrarTodoElChat()' style='color:orange; display:none;'>Borrar Chat Texto</span>
            <span onclick='location.reload()' style='color:red;'>Salir</span>
          </div>
        </div>
      </div>
      <div style='background:#054d44; color:white; padding:10px; font-size:12px; display:flex; justify-content:space-between;'>
        <span>CHAT GLOBAL:</span>
        <button id='tgl' onclick='lock()' style='background:#25d366; border:none; padding:3px 10px; border-radius:5px; cursor:pointer; font-weight:bold;'>ACTIVO</button>
      </div>
      <div id='m-box' style='flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:10px;'></div>
      
      <div style='background:#f0f0f0; padding:15px; display:flex; gap:10px; align-items:center;'>
        <button id="btn-plus-publico" onclick="document.getElementById('file-global').click()" class="btn-adjuntar">
            + <span id="label-off" class="status-off">OFF</span>
        </button>
        <input type="file" id="file-global" style="display:none" accept="image/*,video/*" onchange="subirMultimedia(this, 'global')">
        <input id='msg' onkeypress='if(event.key==="Enter") send()' placeholder='Escribe...' style='flex:1; padding:12px; border-radius:20px; border:1px solid #ccc; outline:none;' type='text'/>
        <button id="btn-send-global" onclick='send()' style='background:#075e54; color:white; border:none; width:45px; height:45px; border-radius:50%; cursor:pointer;'>&gt;</button>
      </div>
    </div>

    <div id='p-chat' style='display:none; position:fixed; bottom:0; right:15px; width:270px; background:white; border-radius:10px 10px 0 0; box-shadow:0 -5px 20px rgba(0,0,0,0.3); z-index:1000005; font-family:sans-serif; flex-direction:column; border:1px solid #075e54;'>
      <div style='background:#075e54; color:white; padding:10px 12px; border-radius:10px 10px 0 0; display:flex; justify-content:space-between; align-items:center;'>
        <div style="display:flex; flex-direction:column;">
            <span id='p-nombre' style='font-size:13px; font-weight:bold;'>Privado</span>
            <small id='p-status' style='font-size:10px; color:#25d366;'></small>
        </div>
        <div style="display:flex; gap:10px;">
            <span onclick='minimizarPrivado()' style='cursor:pointer; font-size:18px; font-weight:bold;'>—</span>
            <span onclick='cerrarPrivado()' style='cursor:pointer; font-size:18px; font-weight:bold;'>X</span>
        </div>
      </div>
      <div id='p-cuerpo' style="display:flex; flex-direction:column;">
          <div id='p-box' style='height:250px; overflow-y:auto; padding:10px; font-size:12px; background:#e5ddd5; display:flex; flex-direction:column; gap:8px;'></div>
          <div id='btn-admin-grupo' style="display:none; padding:5px; background:#f9f9f9; border-top:1px solid #eee; text-align:center;">
             <button onclick="abrirModalMiembros()" style="font-size:10px; background:#075e54; color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer;">GESTIONAR MIEMBROS</button>
          </div>
          <div style='padding:10px; background:#f0f0f0; display:flex; gap:5px; border-top:1px solid #ddd; align-items:center;'>
            <button onclick="document.getElementById('file-privado').click()" style="background:#ccc; border:none; width:32px; height:32px; border-radius:50%; cursor:pointer;">+</button>
            <input type="file" id="file-privado" style="display:none" accept="image/*,video/*" onchange="subirMultimedia(this, 'privado')">
            <input id='p-msg' oninput='notificarEscribiendo()' onkeypress='if(event.key==="Enter") enviarPrivado()' placeholder='Escribe...' style='flex:1; border:1px solid #ccc; border-radius:15px; padding:8px 12px; outline:none; font-size:12px;' type='text'/>
            <button id="btn-send-privado" onclick='enviarPrivado()' style='background:#075e54; color:white; border:none; border-radius:50%; width:32px; height:32px; cursor:pointer;'>&gt;</button>
          </div>
      </div>
    </div>
  </div>

  <div id='modal-grupos'>
    <div class='modal-box'>
      <h3 style='color:#075e54; margin-top:0;'>Lista de Grupos</h3>
      <div id="lista-mis-grupos" style="max-height:300px; overflow-y:auto;"></div>
      <button onclick='document.getElementById("modal-grupos").style.display="none"' style='width:100%; background:#777; color:white; border:none; padding:8px; border-radius:8px; cursor:pointer; margin-top:10px;'>CERRAR</button>
    </div>
  </div>

  <div id='modal-crear-g'>
    <div class='modal-box'>
      <h3 style='color:#075e54; margin-top:0;'>Nuevo Grupo</h3>
      <input id="nom-grupo" placeholder="Nombre del grupo..." class="search-input">
      <input id="busc-u" placeholder="Buscar personas para invitar..." class="search-input" onkeyup="filtrarParaInvitar()">
      <div id="invitar-box" style="max-height:150px; overflow-y:auto; border:1px solid #eee; padding:5px;"></div>
      <button onclick="crearGrupo()" style="width:100%; background:#075e54; color:white; border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer; margin-top:10px;">CREAR GRUPO</button>
      <button onclick='document.getElementById("modal-crear-g").style.display="none"' style='width:100%; background:#777; color:white; border:none; padding:8px; border-radius:8px; cursor:pointer; margin-top:5px;'>CANCELAR</button>
    </div>
  </div>

  <div id='modal-reglas'><div class='modal-box'><h3 style='color:#075e54;'>Chat En Linea</h3><div id='reglas-texto' style='font-size:14px; margin-bottom:15px; white-space:pre-wrap; max-height:200px; overflow-y:auto; padding:10px; background:#f9f9f9;'></div><div id='admin-editor' style='display:none;'><textarea id='edit-reglas' style='width:100%; height:60px;'></textarea><button onclick='guardarReglas()' style='width:100%; background:#075e54; color:white; border:none; padding:8px; border-radius:5px; margin-top:5px;'>ACTUALIZAR</button></div><button onclick='cerrarReglas()' style='width:100%; background:#777; color:white; border:none; padding:8px; border-radius:5px; margin-top:10px;'>CERRAR</button></div></div>
  <div id='modal-online'><div class='modal-box' style='max-width:250px;'><h3>En línea</h3><div id='lista-online'></div><div id='admin-limpiar' style='display:none;'><button onclick='limpiarPresencia()' style='width:100%; background:orange; color:white; border:none; padding:8px; margin-top:10px;'>LIMPIAR FANTASMAS</button></div><button onclick='document.getElementById("modal-online").style.display="none"'>CERRAR</button></div></div>

  <script src='https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js'></script>
  <script src='https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js'></script>

  <script>
    const firebaseConfig = { databaseURL: "https://micanalmaestro-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const rdb = firebase.database();
    const CLOUD_NAME = "dhtyepcjg";
    const UPLOAD_PRESET = "Historial"; 

    var ok = true, miUsuario = "", usuarioDestino = "", escribiendoTimeout;
    var multimediaBloqueado = false;
    const EMOJIS = ['❤️', '🥲', '🤣', '🥰'];

    function toggleMenu() { document.getElementById("myDropdown").classList.toggle("show"); }
    function abrirReglas() { document.getElementById("modal-reglas").style.display = "flex"; }
    function cerrarReglas() { document.getElementById("modal-reglas").style.display = "none"; }

    // --- LÓGICA DE GRUPOS Y ADMINISTRACIÓN ---
    function abrirModalCrearG() {
        document.getElementById('modal-crear-g').style.display = 'flex';
        cargarParaInvitar();
    }

    function cargarParaInvitar() {
        rdb.ref('usuarios').once('value', (s) => {
            const box = document.getElementById('invitar-box'); box.innerHTML = "";
            s.forEach((c) => {
                if(c.key !== miUsuario.toLowerCase()) {
                    box.innerHTML += `<div class="user-item" data-u="${c.key}">
                        <input type="checkbox" class="chk-inv" value="${c.key}"> <span>${c.key}</span>
                    </div>`;
                }
            });
        });
    }

    function filtrarParaInvitar() {
        let val = document.getElementById('busc-u').value.toLowerCase();
        document.querySelectorAll('.user-item').forEach(i => {
            i.style.display = i.getAttribute('data-u').includes(val) ? "flex" : "none";
        });
    }

    function crearGrupo() {
        let nom = document.getElementById('nom-grupo').value.trim();
        let checks = document.querySelectorAll('.chk-inv:checked');
        if(!nom || checks.length === 0) return alert("Pon nombre e invita a alguien");
        let idG = "grupo_" + Date.now();
        let m = {}; m[miUsuario.toLowerCase()] = true;
        checks.forEach(c => m[c.value] = true);
        rdb.ref('grupos/' + idG).set({ nombre: nom, creador: miUsuario, miembros: m }).then(() => {
            alert("Grupo creado"); document.getElementById('modal-crear-g').style.display = 'none';
        });
    }

    function abrirModalGrupos() {
        document.getElementById('modal-grupos').style.display = 'flex';
        rdb.ref('grupos').once('value', (s) => {
            const box = document.getElementById('lista-mis-grupos'); box.innerHTML = "";
            s.forEach((c) => {
                let g = c.val(), id = c.key;
                let soyAdmin = (miUsuario === "Chat");
                if(soyAdmin || (g.miembros && g.miembros[miUsuario.toLowerCase()])) {
                    box.innerHTML += `<div class="g-item">
                        <span>👥 ${g.nombre} ${soyAdmin ? '<small style="color:red">(Super)</small>' : ''}</span>
                        <div>
                            <button class="btn-g" style="background:#075e54; color:white;" onclick="entrarAlGrupo('${id}','${g.nombre}','${g.creador}')">ENTRAR</button>
                            ${(g.creador === miUsuario || soyAdmin) ? `<button class="btn-g" style="background:red; color:white;" onclick="borrarGrupo('${id}')">X</button>` : ''}
                        </div>
                    </div>`;
                }
            });
        });
    }

    function entrarAlGrupo(id, nom, creador) {
        usuarioDestino = id;
        document.getElementById('p-nombre').innerText = "Grupo: " + nom;
        document.getElementById('p-chat').style.display = "flex";
        document.getElementById('p-cuerpo').style.display = "flex";
        document.getElementById('modal-grupos').style.display = 'none';
        document.getElementById('btn-admin-grupo').style.display = (creador === miUsuario || miUsuario === "Chat") ? "block" : "none";
        escucharPrivados();
    }

    function borrarGrupo(id) { if(confirm("¿Eliminar grupo y mensajes?")) { rdb.ref('grupos/'+id).remove(); rdb.ref('privados/'+id).remove(); abrirModalGrupos(); } }

    function abrirModalMiembros() {
        let idG = usuarioDestino;
        let nuevoMiembro = prompt("Escribe el nombre del usuario exacto a agregar:");
        if(nuevoMiembro) {
            rdb.ref('grupos/'+idG+'/miembros/'+nuevoMiembro.toLowerCase()).set(true).then(()=>alert("Agregado"));
        }
    }

    function minimizarPrivado() {
        let cuerpo = document.getElementById('p-cuerpo');
        cuerpo.style.display = cuerpo.style.display === "none" ? "flex" : "none";
    }

    // --- REUTILIZACIÓN DE TUS FUNCIONES CORE (SIN CAMBIOS) ---
    function linkify(text) {
      if(!text) return "";
      if(text.includes("res.cloudinary.com")) {
          if(text.match(/\.(jpeg|jpg|gif|png|webp)$/i)) return '<img src="'+text+'" class="chat-media" onclick="window.open(this.src)">';
          if(text.match(/\.(mp4|mov|avi|webm)$/i)) return '<video src="'+text+'" class="chat-media" controls></video>';
      }
      var urlPattern = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
      return text.replace(urlPattern, url => '<a href="' + url + '" target="_blank" class="chat-link">' + url + '</a>');
    }

    function generarIdSala(u1, u2) {
      if(u2.startsWith("grupo_")) return u2;
      var comb = [u1.toLowerCase(), u2.toLowerCase()].sort().join("_");
      var hash = 0; for (var i = 0; i < comb.length; i++) { hash = ((hash << 5) - hash) + comb.charCodeAt(i); hash |= 0; }
      return "sala_" + Math.abs(hash);
    }

    function entrar() {
      var uO = document.getElementById('usr').value.trim(), p = document.getElementById('clv').value.trim(), uM = uO.toLowerCase();
      if(!uO || !p) return;
      rdb.ref('usuarios/' + uM).once('value', (s) => {
        if(s.exists() && s.val().toString() === p.toString()) { miUsuario = (uM === "chat") ? "Chat" : uO; iniciar(); }
        else if(!s.exists()) { rdb.ref('usuarios/' + uM).set(p).then(() => { miUsuario = (uM === "chat") ? "Chat" : uO; iniciar(); }); }
        else alert("Clave incorrecta");
      });
    }

    function iniciar() {
      document.getElementById('acceso').style.display = 'none';
      document.getElementById('chat').style.display = 'flex';
      if(miUsuario === "Chat") { 
          document.getElementById('admin-editor').style.display = 'block'; document.getElementById('btn-borrar-todo').style.display = 'block';
          document.getElementById('admin-limpieza-media').style.display = 'block';
          setInterval(() => { limpiarMultimedia("total"); }, 4 * 60 * 60 * 1000);
      }
      rdb.ref('presencia/' + miUsuario.toLowerCase()).set(miUsuario);
      rdb.ref('presencia/' + miUsuario.toLowerCase()).onDisconnect().remove();

      rdb.ref('mensajes').on('value', (snapshot) => {
        var box = document.getElementById('m-box'); box.innerHTML = "";
        snapshot.forEach((child) => {
            var m = child.val(), id = child.key, esMio = (m.u === miUsuario);
            var d = document.createElement('div');
            d.style = "padding:10px; border-radius:8px; font-size:14px; max-width:80%; margin-bottom:5px; word-break:break-all;" + (esMio ? "background:#dcf8c6; align-self:flex-end;" : "background:white; align-self:flex-start;");
            d.innerHTML = (miUsuario === "Chat" ? "<span onclick='borrarMensaje(\""+id+"\")' style='color:red; cursor:pointer; float:right;'>x</span>" : "") + 
                          "<small onclick='abrirPrivado(\""+m.u+"\")' style='color:#128c7e; font-weight:bold; cursor:pointer; text-decoration:underline;'>"+m.u+"</small><br/>" + linkify(m.t);
            box.appendChild(d);
        });
        box.scrollTop = box.scrollHeight;
      });
    }

    function escucharPrivados() {
      var idS = generarIdSala(miUsuario, usuarioDestino);
      rdb.ref("privados/" + idS).on("value", (s) => {
        var pBox = document.getElementById("p-box"); pBox.innerHTML = "";
        s.forEach((child) => {
            var m = child.val(), esMio = (m.u === miUsuario);
            var d = document.createElement("div");
            d.style = "padding:8px; border-radius:8px; max-width:85%; font-size:12px; margin-bottom:5px; word-break:break-all;" + (esMio ? "background:#dcf8c6; align-self:flex-end;" : "background:white; align-self:flex-start; border:1px solid #ddd;");
            d.innerHTML = "<b>"+m.u+"</b><br/>" + linkify(m.t);
            pBox.appendChild(d);
        });
        pBox.scrollTop = pBox.scrollHeight;
      });
    }

    function abrirPrivado(n) { if (n === miUsuario) return; usuarioDestino = n; document.getElementById("p-nombre").innerText = n; document.getElementById("p-chat").style.display = "flex"; document.getElementById('p-cuerpo').style.display = "flex"; document.getElementById('btn-admin-grupo').style.display = "none"; escucharPrivados(); }
    function cerrarPrivado() { if(usuarioDestino) rdb.ref("privados/"+generarIdSala(miUsuario, usuarioDestino)).off(); document.getElementById("p-chat").style.display = "none"; usuarioDestino = ""; }
    
    function enviarPrivado() {
      var i = document.getElementById("p-msg"), v = i.value.trim(); if (!v) return;
      rdb.ref("privados/" + generarIdSala(miUsuario, usuarioDestino)).push({ u: miUsuario, t: v.replace(/</g, "&lt;"), h: new Date().getHours() + ":" + new Date().getMinutes() });
      i.value = "";
    }

    function send() {
      var i = document.getElementById('msg'), t = i.value.trim(); if(!t || !ok) return;
      rdb.ref('mensajes').push({ u: miUsuario, t: t.replace(/</g, "&lt;"), h: new Date().getHours() + ":" + new Date().getMinutes() });
      i.value = '';
    }

    // Funciones de utilidad mantenidas
    function toggleMediaPublico() { rdb.ref('config/multimedia_bloqueado').set(!multimediaBloqueado); }
    rdb.ref('config/multimedia_bloqueado').on('value', (s) => { multimediaBloqueado = s.val() || false; });
    async function subirMultimedia(input, tipo) { /* Tu lógica de cloudinary intacta */ }
    function limpiarMultimedia(tipo) { /* Tu lógica de limpieza intacta */ }
    function lock() { ok = !ok; document.getElementById('tgl').innerText = ok?"ACTIVO":"BLOQUEADO"; }
    function borrarMensaje(id) { rdb.ref('mensajes/'+id).remove(); }
    function borrarTodoElChat() { if(confirm("Vaciado?")) rdb.ref('mensajes').remove(); }
    function verQuienesEstanOnline() { document.getElementById('modal-online').style.display='flex'; if(miUsuario==="Chat")document.getElementById('admin-limpiar').style.display='block'; }
  </script>
</body>
</html>
