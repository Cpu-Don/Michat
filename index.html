<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Chat Online</title>
  <meta content='width=device-width,initial-scale=1' name='viewport'/>
  <style>
    body { background:#f0f2f5 !important; margin:0; padding:0; height:100vh; width:100vw; display:flex !important; overflow:hidden; }
    .navbar, .header-outer, .footer-outer { display: none !important; }
    .dropdown { position: relative; display: inline-block; }
    .dropdown-content { display: none; position: absolute; right: 0; background-color: #f9f9f9; min-width: 150px; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2); z-index: 1000000; border-radius: 5px; }
    .dropdown-content span { color: black; padding: 12px 16px; text-decoration: none; display: block; cursor: pointer; font-size: 14px; border-bottom: 1px solid #eee; }
    .show { display: block !important; }
    #modal-reglas, #modal-online, #modal-grupos { display: none; position: fixed; z-index: 1000001; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); justify-content: center; align-items: center; font-family: sans-serif; }
    .modal-box { background: white; padding: 20px; border-radius: 10px; width: 85%; max-width: 400px; position: relative; }
    .chat-link { color: #075e54; text-decoration: underline; font-weight: bold; word-break: break-all; }
    .chat-media { max-width: 100%; border-radius: 8px; margin-top: 5px; display: block; border: 1px solid #ddd; cursor: pointer; }
    .btn-adjuntar { background: #ccc; color: #333; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; justify-content: center; align-items: center; flex-shrink: 0; font-weight: bold; }
    .search-user { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #075e54; border-radius: 8px; box-sizing: border-box; outline: none; }
    .user-row-inv { display: flex; align-items: center; gap: 10px; padding: 8px; border-bottom: 1px solid #f0f0f0; }
    .item-grupo { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
  </style>
</head>
<body>

  <div id='app' style='position:fixed; top:0; left:0; width:100%; height:100%; background:#f0f2f5; z-index:999999; display:flex; justify-content:center; align-items:center;'>
    
    <div id='acceso' style='background:white; padding:30px; border-radius:15px; box-shadow:0 5px 20px rgba(0,0,0,0.1); width:280px; text-align:center; font-family:sans-serif;'>
      <h2 style='color:#075e54; margin:0 0 20px 0;'>Acceso</h2>
      <input id='usr' placeholder='Usuario' style='width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;' type='text'/>
      <input id='clv' placeholder='Clave' style='width:100%; padding:12px; margin-bottom:20px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;' type='password'/>
      <button onclick='entrar()' style='width:100%; padding:12px; background:#075e54; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;'>ENTRAR</button>
    </div>

    <div id='chat' style='width:100%; max-width:500px; height:100%; background:#e5ddd5; display:none; flex-direction:column; font-family:sans-serif;'>
      <div style='background:#075e54; color:white; padding:15px; display:flex; justify-content:space-between; align-items:center;'>
        <div onclick='verQuienesEstanOnline()' style='display:flex; flex-direction:column; cursor:pointer;'>
          <span><b>Chat Online</b></span>
          <small id='online-count' style='font-size:10px; color:#25d366; font-weight:bold;'>Conectados: 0 &#9660;</small>
        </div>
        <div class='dropdown'>
          <span onclick='toggleMenu()' style='cursor:pointer; font-size:12px; background:#054d44; padding:5px 10px; border-radius:5px; font-weight:bold;'>OPCIONES &#9660;</span>
          <div class='dropdown-content' id='myDropdown'>
            <span onclick='abrirReglas()'>Reglas</span>
            <span onclick='abrirModalGrupos()'>Mis Grupos</span>
            <div id="admin-limpieza-media" style="display:none;">
                <span onclick='limpiarMultimedia("privado")' style='color:#2196F3;'>Limpiar Privadas</span>
                <span onclick='limpiarMultimedia("publico")' style='color:#4CAF50;'>Limpiar Públicas</span>
                <span onclick='limpiarMultimedia("total")' style='color:red;'>LIMPIEZA TOTAL</span>
            </div>
            <span id='btn-borrar-todo' onclick='borrarTodoElChat()' style='color:orange; display:none;'>Borrar Chat Texto</span>
            <span onclick='location.reload()' style='color:red;'>Salir</span>
          </div>
        </div>
      </div>
      <div id='m-box' style='flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:10px;'></div>
      <div style='background:#f0f0f0; padding:15px; display:flex; gap:10px; align-items:center;'>
        <button onclick="document.getElementById('file-global').click()" class="btn-adjuntar">+</button>
        <input type="file" id="file-global" style="display:none" accept="image/*,video/*" onchange="subirMultimedia(this, 'global')">
        <input id='msg' onkeypress='if(event.key==="Enter") send()' placeholder='Escribe...' style='flex:1; padding:12px; border-radius:20px; border:1px solid #ccc; outline:none;' type='text'/>
        <button onclick='send()' style='background:#075e54; color:white; border:none; width:45px; height:45px; border-radius:50%;'>&gt;</button>
      </div>
    </div>

    <div id='p-chat' style='display:none; position:fixed; bottom:0; right:15px; width:270px; background:white; border-radius:10px 10px 0 0; box-shadow:0 -5px 20px rgba(0,0,0,0.3); z-index:1000005; font-family:sans-serif; flex-direction:column; border:1px solid #075e54;'>
      <div style='background:#075e54; color:white; padding:10px; border-radius:10px 10px 0 0; display:flex; justify-content:space-between; align-items:center;'>
        <span id='p-nombre' style='font-size:13px; font-weight:bold;'>Privado</span>
        <span onclick='cerrarPrivado()' style='cursor:pointer; font-weight:bold;'>X</span>
      </div>
      <div id='p-box' style='height:250px; overflow-y:auto; padding:10px; font-size:12px; background:#e5ddd5; display:flex; flex-direction:column; gap:8px;'></div>
      <div style='padding:10px; background:#f0f0f0; display:flex; gap:5px;'>
        <input id='p-msg' onkeypress='if(event.key==="Enter") enviarPrivado()' placeholder='Escribe...' style='flex:1; border:1px solid #ccc; border-radius:15px; padding:8px; outline:none;' type='text'/>
        <button onclick='enviarPrivado()' style='background:#075e54; color:white; border:none; border-radius:50%; width:32px; height:32px;'>&gt;</button>
      </div>
    </div>
  </div>

  <div id='modal-grupos'>
    <div class='modal-box'>
      <h3 style='color:#075e54; margin-top:0;'>Panel de Grupos</h3>
      <div id="lista-mis-grupos" style="max-height:120px; overflow-y:auto; margin-bottom:10px; border-bottom:1px solid #eee;"></div>
      <input id="nom-grupo-crear" placeholder="Nombre del grupo..." style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
      <input type="text" id="busc-user" class="search-user" placeholder="🔍 Buscar usuario..." onkeyup="filtrarUsuarios()">
      <div id="lista-invitar-usuarios" style="max-height:150px; overflow-y:auto; border:1px solid #eee; padding:10px; border-radius:8px;"></div>
      <button onclick="crearGrupoNuevo()" style="width:100%; background:#075e54; color:white; border:none; padding:12px; border-radius:8px; font-weight:bold; margin-top:10px;">CREAR GRUPO</button>
      <button onclick='document.getElementById("modal-grupos").style.display="none"' style='width:100%; background:#777; color:white; border:none; padding:8px; border-radius:8px; margin-top:5px;'>CERRAR</button>
    </div>
  </div>

  <div id='modal-online'><div class='modal-box' style='max-width:250px;'><h3>Línea</h3><div id='lista-online'></div><div id='admin-limpiar' style='display:none;'><button onclick='limpiarPresencia()'>LIMPIAR FANTASMAS</button></div><button onclick='document.getElementById("modal-online").style.display="none"'>CERRAR</button></div></div>

  <script src='https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js'></script>
  <script src='https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js'></script>

  <script>
    const firebaseConfig = { databaseURL: "https://micanalmaestro-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const rdb = firebase.database();
    var miUsuario = "";
    var usuarioDestino = "";

    function toggleMenu() { document.getElementById("myDropdown").classList.toggle("show"); }

    // --- LÓGICA DE GRUPOS (CON MODO ADMIN) ---
    function cargarMisGrupos() {
        rdb.ref('grupos').once('value', (s) => {
            const box = document.getElementById('lista-mis-grupos'); box.innerHTML = "";
            s.forEach((child) => {
                let g = child.val();
                // AQUÍ LA CLAVE: Si eres "Chat", ves todos. Si no, solo donde eres miembro.
                if(miUsuario === "Chat" || (g.miembros && g.miembros[miUsuario.toLowerCase()])) {
                    box.innerHTML += `<div class="item-grupo">
                        <span>👥 ${g.nombre} ${miUsuario === "Chat" ? '<small style="color:red">(Admin)</small>' : ''}</span> 
                        <button onclick="entrarAlGrupo('${child.key}', '${g.nombre}')" style="background:#075e54; color:white; border:none; padding:5px; border-radius:5px;">VER</button>
                    </div>`;
                }
            });
        });
    }

    function entrarAlGrupo(idG, nombre) {
        usuarioDestino = idG;
        document.getElementById("p-nombre").innerText = "👥 " + nombre;
        document.getElementById("p-chat").style.display = "flex";
        document.getElementById('modal-grupos').style.display = 'none';
        escucharPrivados(true);
    }

    function filtrarUsuarios() {
        let f = document.getElementById('busc-user').value.toLowerCase();
        let rows = document.querySelectorAll('.user-row-inv');
        rows.forEach(r => { r.style.display = r.getAttribute('data-u').includes(f) ? "flex" : "none"; });
    }

    function cargarListaInvitables() {
        rdb.ref('usuarios').once('value', (s) => {
            const box = document.getElementById('lista-invitar-usuarios'); box.innerHTML = "";
            s.forEach((c) => {
                if(c.key !== miUsuario.toLowerCase()) {
                    box.innerHTML += `<div class="user-row-inv" data-u="${c.key}">
                        <input type="checkbox" class="chk-invitar" value="${c.key}"> <span>${c.key}</span>
                    </div>`;
                }
            });
        });
    }

    function crearGrupoNuevo() {
        let nom = document.getElementById('nom-grupo-crear').value.trim();
        let checks = document.querySelectorAll('.chk-invitar:checked');
        if(!nom || checks.length === 0) return alert("Faltan datos");
        let inv = {}; inv[miUsuario.toLowerCase()] = true;
        checks.forEach(c => { inv[c.value] = true; });
        rdb.ref('grupos/grupo_' + Date.now()).set({ nombre: nom, creador: miUsuario, miembros: inv }).then(() => {
            alert("Grupo creado"); cargarMisGrupos();
        });
    }

    // --- FUNCIONES CORE ---
    function entrar() {
      var uO = document.getElementById('usr').value.trim(), p = document.getElementById('clv').value.trim(), uM = uO.toLowerCase();
      rdb.ref('usuarios/' + uM).once('value', (s) => {
        if(s.exists() && s.val().toString() === p.toString()) { miUsuario = (uM === "chat") ? "Chat" : uO; iniciar(); }
        else if(!s.exists()) { rdb.ref('usuarios/' + uM).set(p).then(() => { miUsuario = (uM === "chat") ? "Chat" : uO; iniciar(); }); }
      });
    }

    function iniciar() {
      document.getElementById('acceso').style.display = 'none';
      document.getElementById('chat').style.display = 'flex';
      if(miUsuario === "Chat") {
          document.getElementById('admin-limpieza-media').style.display = 'block';
          document.getElementById('btn-borrar-todo').style.display = 'block';
          setInterval(() => { limpiarMultimedia("total"); }, 4 * 60 * 60 * 1000);
      }
      rdb.ref('presencia/' + miUsuario.toLowerCase()).set(miUsuario);
      rdb.ref('mensajes').on('value', snap => {
          var b = document.getElementById('m-box'); b.innerHTML = "";
          snap.forEach(c => {
              let m = c.val(), esMio = (m.u === miUsuario);
              b.innerHTML += `<div style="padding:10px; border-radius:8px; max-width:80%; word-wrap:break-word; margin-bottom:5px; ${esMio?'background:#dcf8c6; align-self:flex-end;':'background:white; align-self:flex-start;'}">
                  <small onclick="abrirPrivado('${m.u}')" style="color:#075e54; font-weight:bold; cursor:pointer;">${m.u}</small><br>${linkify(m.t)}
              </div>`;
          });
          b.scrollTop = b.scrollHeight;
      });
    }

    function escucharPrivados(esGrupo) {
        let ruta = esGrupo ? "mensajes_grupos/" + usuarioDestino : "privados/" + generarIdSala(miUsuario, usuarioDestino);
        rdb.ref(ruta).on("value", snap => {
            var pb = document.getElementById('p-box'); pb.innerHTML = "";
            snap.forEach(c => {
                let m = c.val(), esMio = (m.u === miUsuario);
                pb.innerHTML += `<div style="padding:8px; border-radius:8px; max-width:85%; word-wrap:break-word; ${esMio?'background:#dcf8c6; align-self:flex-end;':'background:white; align-self:flex-start; border:1px solid #ddd;'}"><b>${m.u}</b><br>${linkify(m.t)}</div>`;
            });
            pb.scrollTop = pb.scrollHeight;
        });
    }

    function enviarPrivado() {
        let i = document.getElementById('p-msg'), v = i.value.trim(); if(!v) return;
        let ruta = usuarioDestino.startsWith("grupo_") ? "mensajes_grupos/" + usuarioDestino : "privados/" + generarIdSala(miUsuario, usuarioDestino);
        rdb.ref(ruta).push({ u: miUsuario, t: v.replace(/</g, "&lt;") }); i.value = "";
    }

    function send() {
        let i = document.getElementById('msg'), t = i.value.trim(); if(!t) return;
        rdb.ref('mensajes').push({ u: miUsuario, t: t.replace(/</g, "&lt;") }); i.value = "";
    }

    function linkify(t) {
        if(!t) return "";
        if(t.includes("res.cloudinary.com")) {
            if(t.match(/\.(jpeg|jpg|gif|png|webp)$/i)) return `<img src="${t}" class="chat-media">`;
            if(t.match(/\.(mp4|mov|avi|webm)$/i)) return `<video src="${t}" class="chat-media" controls></video>`;
        }
        var urlPattern = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
        return t.replace(urlPattern, url => `<a href="${url}" target="_blank" class="chat-link">${url}</a>`);
    }

    function abrirPrivado(n) { if(n === miUsuario) return; usuarioDestino = n; document.getElementById("p-nombre").innerText = n; document.getElementById("p-chat").style.display = "flex"; escucharPrivados(false); }
    function cerrarPrivado() { document.getElementById("p-chat").style.display = "none"; }
    function generarIdSala(u1, u2) { return "sala_" + [u1.toLowerCase(), u2.toLowerCase()].sort().join("_"); }
    function abrirModalGrupos() { document.getElementById('modal-grupos').style.display = 'flex'; cargarMisGrupos(); cargarListaInvitables(); }
    function verQuienesEstanOnline() { document.getElementById('modal-online').style.display = 'flex'; if(miUsuario === "Chat") document.getElementById('admin-limpiar').style.display = 'block'; }
    function limpiarMultimedia(tipo) { rdb.ref('mensajes').once('value', s => { s.forEach(c => { if(c.val().t.includes("cloudinary")) c.ref.remove(); }); }); alert("Limpieza OK"); }
  </script>
</body>
</html>
