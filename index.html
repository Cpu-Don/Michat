<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Chat Online</title>
  <meta content='width=device-width,initial-scale=1' name='viewport'/>
  <style>
    body { background:#f0f2f5 !important; margin:0; padding:0; height:100vh; width:100vw; display:flex !important; overflow:hidden; }
    #content, .section, .widget { display: block !important; width: 100%; height: 100%; }
    .navbar, .header-outer, .footer-outer { display: none !important; }
    .dropdown { position: relative; display: inline-block; }
    .dropdown-content { display: none; position: absolute; right: 0; background-color: #f9f9f9; min-width: 150px; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2); z-index: 1000000; border-radius: 5px; }
    .dropdown-content span { color: black; padding: 12px 16px; text-decoration: none; display: block; cursor: pointer; font-size: 14px; border-bottom: 1px solid #eee; }
    .dropdown-content span:hover { background-color: #f1f1f1; }
    .show { display: block !important; }
    #modal-reglas, #modal-online, #modal-grupos, #modal-admin-grupos { display: none; position: fixed; z-index: 1000001; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); justify-content: center; align-items: center; font-family: sans-serif; }
    .modal-box { background: white; padding: 20px; border-radius: 10px; width: 85%; max-width: 400px; position: relative; }
    .chat-link { color: #075e54; text-decoration: underline; font-weight: bold; }
    .chat-media { max-width: 100%; border-radius: 8px; margin-top: 5px; display: block; border: 1px solid #ddd; cursor: pointer; }
    .btn-adjuntar { background: #ccc; color: #333; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; justify-content: center; align-items: center; flex-shrink: 0; font-weight: bold; }
    .item-grupo { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
    .msg-burbuja { padding:8px; border-radius:8px; max-width:85%; font-size:12px; line-height:1.4; position: relative; word-wrap: break-word; }
    .search-user { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #075e54; border-radius: 8px; box-sizing: border-box; font-size: 14px; outline: none; }
  </style>
</head>
<body>

  <div id='app' style='position:fixed; top:0; left:0; width:100%; height:100%; background:#f0f2f5; z-index:999999; display:flex; justify-content:center; align-items:center;'>
    
    <div id='acceso' style='background:white; padding:30px; border-radius:15px; box-shadow:0 5px 20px rgba(0,0,0,0.1); width:280px; text-align:center; font-family:sans-serif;'>
      <h2 style='color:#075e54; margin:0 0 20px 0;'>Chat Sincro</h2>
      <input id='usr' placeholder='Usuario' style='width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;' type='text'/>
      <input id='clv' placeholder='Clave' style='width:100%; padding:12px; margin-bottom:20px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;' type='password'/>
      <button onclick='entrar()' style='width:100%; padding:12px; background:#075e54; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;'>ENTRAR</button>
    </div>

    <div id='chat' style='width:100%; max-width:500px; height:100%; background:#e5ddd5; display:none; flex-direction:column; font-family:sans-serif;'>
      <div style='background:#075e54; color:white; padding:15px; display:flex; justify-content:space-between; align-items:center;'>
        <div onclick='verQuienesEstanOnline()' style='display:flex; flex-direction:column; cursor:pointer;'>
          <span><b>Chat Online</b></span>
          <small id='online-count' style='font-size:10px; color:#25d366; font-weight:bold;'>Conectados: 0 &#9660;</small>
        </div>
        <div class='dropdown'>
          <span onclick='toggleMenu()' style='cursor:pointer; font-size:12px; background:#054d44; padding:5px 10px; border-radius:5px; font-weight:bold;'>OPCIONES &#9660;</span>
          <div class='dropdown-content' id='myDropdown'>
            <span onclick='abrirReglas()'>Reglas</span>
            <span onclick='abrirModalGrupos()'>Mis Grupos</span>
            <div id="admin-limpieza-media" style="display:none;">
                <span onclick='verCarpetasGrupos()' style='color:#673AB7; font-weight:bold;'>📂 CARPETA GRUPOS</span>
                <span onclick='limpiarMultimedia("total")' style='color:red;'>Limpieza Multimedia</span>
            </div>
            <span onclick='location.reload()' style='color:red;'>Salir</span>
          </div>
        </div>
      </div>
      <div id='m-box' style='flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:10px;'></div>
      <div style='background:#f0f0f0; padding:15px; display:flex; gap:10px;'>
        <input id='msg' onkeypress='if(event.key==="Enter") send()' placeholder='Escribe...' style='flex:1; padding:12px; border-radius:20px; border:1px solid #ccc; outline:none;' type='text'/>
        <button onclick='send()' style='background:#075e54; color:white; border:none; width:45px; height:45px; border-radius:50%; cursor:pointer;'>&gt;</button>
      </div>
    </div>

    <div id='p-chat' style='display:none; position:fixed; bottom:0; right:15px; width:280px; background:white; border-radius:10px 10px 0 0; box-shadow:0 -5px 20px rgba(0,0,0,0.3); z-index:1000005; flex-direction:column; border:1px solid #075e54; font-family:sans-serif;'>
      <div style='background:#075e54; color:white; padding:10px; border-radius:10px 10px 0 0; display:flex; justify-content:space-between; align-items:center;'>
        <span id='p-nombre' style='font-size:11px; font-weight:bold;'>Chat</span>
        <div style="display:flex; gap:5px; align-items:center;">
           <button id="btn-borrar-este-grupo" style="display:none; background:red; color:white; border:none; font-size:9px; border-radius:3px;" onclick="borrarGrupoActual()">BORRAR</button>
           <span onclick='cerrarPrivado()' style='cursor:pointer; font-weight:bold;'>X</span>
        </div>
      </div>
      <div id='p-box' style='height:250px; overflow-y:auto; padding:10px; background:#e5ddd5; display:flex; flex-direction:column; gap:8px;'></div>
      <div style='padding:10px; display:flex; gap:5px; background:#f0f0f0;'>
        <input id='p-msg' onkeypress='if(event.key==="Enter") enviarPrivado()' placeholder='Escribe...' style='flex:1; border-radius:15px; padding:8px; border:1px solid #ccc; outline:none;' type='text'/>
        <button onclick='enviarPrivado()' style='background:#075e54; color:white; border:none; border-radius:50%; width:32px; height:32px;'>&gt;</button>
      </div>
    </div>
  </div>

  <div id='modal-grupos'>
    <div class='modal-box'>
      <h3 style='color:#075e54; margin-top:0;'>Mis Grupos</h3>
      <div id="lista-mis-grupos" style="max-height:100px; overflow-y:auto; margin-bottom:10px;"></div>
      <hr>
      <input id="nom-grupo-crear" placeholder="Nombre del grupo nuevo" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;">
      <input type="text" id="busc-user" class="search-user" placeholder="🔍 Escribe para buscar persona..." onkeyup="filtrarUsuarios()">
      <div id="lista-invitar-usuarios" style="max-height:150px; overflow-y:auto; border:1px solid #eee; padding:10px; border-radius:8px; background:#fafafa;"></div>
      <button onclick="crearGrupoNuevo()" style="width:100%; background:#075e54; color:white; border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer; margin-top:10px;">CREAR GRUPO</button>
      <button onclick='document.getElementById("modal-grupos").style.display="none"' style='width:100%; background:#777; color:white; border:none; padding:8px; border-radius:8px; cursor:pointer; margin-top:5px;'>CERRAR</button>
    </div>
  </div>

  <div id='modal-admin-grupos'>
    <div class='modal-box'>
      <h3 style='color:#673AB7; margin:0 0 10px 0;'>📂 Carpeta de Grupos</h3>
      <div id="lista-admin-total-grupos" style="max-height:300px; overflow-y:auto; border:1px solid #ddd; padding:5px;"></div>
      <button onclick='document.getElementById("modal-admin-grupos").style.display="none"' style='width:100%; background:#777; color:white; border:none; padding:10px; border-radius:8px; cursor:pointer; margin-top:10px;'>VOLVER</button>
    </div>
  </div>

  <script src='https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js'></script>
  <script src='https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js'></script>

  <script>
    const firebaseConfig = { databaseURL: "https://micanalmaestro-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const rdb = firebase.database();
    var miUsuario = "";
    var usuarioDestino = "";
    var tipoChatActual = "privado";

    function toggleMenu() { document.getElementById("myDropdown").classList.toggle("show"); }
    function abrirReglas() { document.getElementById("modal-reglas").style.display = "flex"; }

    // --- LÓGICA DE BÚSQUEDA ---
    function filtrarUsuarios() {
      let filtro = document.getElementById('busc-user').value.toLowerCase();
      let filas = document.querySelectorAll('.user-row-inv');
      filas.forEach(f => {
        let nombre = f.getAttribute('data-u').toLowerCase();
        f.style.display = nombre.includes(filtro) ? "flex" : "none";
      });
    }

    // --- CARPETA DE GRUPOS (EXCLUSIVO ADMIN) ---
    function verCarpetasGrupos() {
        document.getElementById('modal-admin-grupos').style.display = 'flex';
        rdb.ref('grupos').once('value', (s) => {
            const box = document.getElementById('lista-admin-total-grupos'); 
            box.innerHTML = "";
            s.forEach((child) => {
                let g = child.val();
                box.innerHTML += `<div class="item-grupo">
                    <span><b>${g.nombre}</b> <br><small>Creado por: ${g.creador}</small></span>
                    <button onclick="entrarAlGrupo('${child.key}', '${g.nombre}')" style="background:#673AB7; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">ENTRAR</button>
                </div>`;
            });
        });
    }

    function abrirModalGrupos() {
      document.getElementById('modal-grupos').style.display = 'flex';
      cargarMisGrupos();
      cargarListaInvitables();
    }

    function cargarListaInvitables() {
      rdb.ref('usuarios').once('value', (s) => {
        const box = document.getElementById('lista-invitar-usuarios');
        box.innerHTML = "";
        s.forEach((child) => {
          let uName = child.key;
          if(uName !== miUsuario.toLowerCase()) {
            box.innerHTML += `<div class="user-row-inv" data-u="${uName}" style="display:flex; align-items:center; gap:10px; padding:5px; border-bottom:1px solid #eee;">
              <input type="checkbox" class="chk-invitar" value="${uName}"> <span>${uName}</span>
            </div>`;
          }
        });
      });
    }

    function crearGrupoNuevo() {
      let nom = document.getElementById('nom-grupo-crear').value.trim();
      if(!nom) return alert("Pon un nombre");
      let invitados = {}; invitados[miUsuario.toLowerCase()] = true; 
      let checks = document.querySelectorAll('.chk-invitar:checked');
      if(checks.length === 0) return alert("Elige a alguien");
      checks.forEach(c => { invitados[c.value] = true; });
      let idG = "grupo_" + Date.now();
      rdb.ref('grupos/' + idG).set({ nombre: nom, creador: miUsuario, miembros: invitados }).then(() => {
        alert("Grupo creado");
        cargarMisGrupos();
      });
    }

    function cargarMisGrupos() {
      rdb.ref('grupos').once('value', (s) => {
        const box = document.getElementById('lista-mis-grupos'); box.innerHTML = "";
        s.forEach((child) => {
          let g = child.val();
          if(g.miembros && g.miembros[miUsuario.toLowerCase()]) {
            box.innerHTML += `<div class="item-grupo"><span>👥 ${g.nombre}</span> <button onclick="entrarAlGrupo('${child.key}', '${g.nombre}')">ENTRAR</button></div>`;
          }
        });
      });
    }

    function entrarAlGrupo(idG, nombre) {
      usuarioDestino = idG; tipoChatActual = "grupal";
      document.getElementById("p-nombre").innerText = "👥 " + nombre;
      document.getElementById("p-chat").style.display = "flex";
      document.getElementById('modal-grupos').style.display = 'none';
      document.getElementById('modal-admin-grupos').style.display = 'none';
      rdb.ref('grupos/' + idG).once('value', s => {
        let soyCreador = (s.val().creador === miUsuario || miUsuario === "Chat");
        document.getElementById('btn-borrar-este-grupo').style.display = soyCreador ? "block" : "none";
      });
      escucharPrivados();
    }

    function entrar() {
      var uO = document.getElementById('usr').value.trim(), p = document.getElementById('clv').value.trim(), uM = uO.toLowerCase();
      if(!uO || !p) return;
      rdb.ref('usuarios/' + uM).once('value', snapshot => {
        if(snapshot.exists() && snapshot.val().toString() === p.toString()) { miUsuario = (uM === "chat") ? "Chat" : uO; iniciar(); }
        else if(!snapshot.exists()) { rdb.ref('usuarios/' + uM).set(p).then(() => { miUsuario = (uM === "chat") ? "Chat" : uO; iniciar(); }); }
        else alert("Clave mal");
      });
    }

    function iniciar() {
      document.getElementById('acceso').style.display = 'none';
      document.getElementById('chat').style.display = 'flex';
      if(miUsuario === "Chat") { document.getElementById('admin-limpieza-media').style.display = 'block'; }
      rdb.ref('mensajes').on('value', snap => {
        let box = document.getElementById('m-box'); box.innerHTML = "";
        snap.forEach(c => {
          let m = c.val(), esMio = (m.u === miUsuario);
          box.innerHTML += `<div style="padding:10px; border-radius:8px; max-width:80%; ${esMio?'background:#dcf8c6; align-self:flex-end;':'background:white; align-self:flex-start;'}">
            <small onclick="abrirPrivado('${m.u}')" style="color:#075e54; font-weight:bold; cursor:pointer;">${m.u}</small><br>${m.t}
          </div>`;
        });
        box.scrollTop = box.scrollHeight;
      });
    }

    function abrirPrivado(nombre) {
      if(nombre === miUsuario) return;
      usuarioDestino = nombre; tipoChatActual = "privado";
      document.getElementById("p-nombre").innerText = "Chat con " + nombre;
      document.getElementById("p-chat").style.display = "flex";
      escucharPrivados();
    }

    function escucharPrivados() {
      let ruta = (tipoChatActual === "grupal") ? "mensajes_grupos/" + usuarioDestino : "privados/" + generarIdSala(miUsuario, usuarioDestino);
      rdb.ref(ruta).off();
      rdb.ref(ruta).on("value", snap => {
        let pBox = document.getElementById("p-box"); pBox.innerHTML = "";
        snap.forEach(c => {
          let m = c.val(), esMio = (m.u === miUsuario);
          pBox.innerHTML += `<div class="msg-burbuja" style="${esMio?'background:#dcf8c6; align-self:flex-end;':'background:white; align-self:flex-start; border:1px solid #ddd;'}">
            <b>${m.u}</b><br>${m.t}
          </div>`;
        });
        pBox.scrollTop = pBox.scrollHeight;
      });
    }

    function enviarPrivado() {
      let i = document.getElementById('p-msg'), v = i.value.trim(); if(!v) return;
      let ruta = (tipoChatActual === "grupal") ? "mensajes_grupos/" + usuarioDestino : "privados/" + generarIdSala(miUsuario, usuarioDestino);
      rdb.ref(ruta).push({ u: miUsuario, t: v.replace(/</g, "&lt;") }); i.value = "";
    }

    function send() {
      let i = document.getElementById('msg'), t = i.value.trim(); if(!t) return;
      rdb.ref('mensajes').push({ u: miUsuario, t: t.replace(/</g, "&lt;") }); i.value = "";
    }

    function cerrarPrivado() { document.getElementById("p-chat").style.display = "none"; }
    function generarIdSala(u1, u2) { return "sala_" + [u1.toLowerCase(), u2.toLowerCase()].sort().join("_"); }
    window.onclick = e => { if (!e.target.matches('.dropdown span')) { let d = document.getElementById("myDropdown"); if(d) d.classList.remove('show'); } }
  </script>
</body>
</html>
