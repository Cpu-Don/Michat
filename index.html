<script>
/* ==========================================================================
   SINCRO: EL MÓDULO MAESTRO DEFINITIVO (PILARES 1 AL 5)
   ========================================================================== */

function activarFuncionesMaestras() {
    // 1. Identidad Maestro (Super Admin para usuario 'chat')
    if (miUsuario === 'chat') { inyectarSuperAdminSincro(); }
    
    // 2. Inicialización de Sistemas
    configurarMenuEngranajeSincro();
    iniciarObservadorPerfilesSincro();
    escucharSpamSincro();
    inyectarBotonCrearGrupoPro();

    // 5. REEMPLAZO TOTAL DE ALERTAS FEAS (Ventanas Emergentes Bonitas)
    window.alert = function(msg) { sincroAviso(msg, 'info'); };
    window.confirm = function(msg) { return sincroConfirmar(msg); };
    window.prompt = function(msg) { return sincroPedirTexto(msg); };
}

/* --- 1. SUPER ADMIN: CARPETAS, SCROLL Y BORRADO --- */
function inyectarSuperAdminSincro() {
    const menu = document.getElementById('menuPerfil');
    if (!menu || document.getElementById('btn-admin-pro')) return;
    
    const btn = document.createElement('div');
    btn.id = 'btn-admin-pro';
    btn.innerHTML = "📂 MAESTRO DE ARCHIVOS (ADMIN)";
    btn.style = "padding:12px; border-bottom:1px solid #ddd; font-weight:bold; color:#075e54; background:#f0f7f6; cursor:pointer;";
    btn.onclick = () => { document.getElementById('panel-admin-sincro').style.display = 'block'; };
    menu.prepend(btn);

    const panel = document.createElement('div');
    panel.id = 'panel-admin-sincro';
    panel.style = "display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:10000; overflow-y:auto; padding:20px; color:black;";
    panel.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:3px solid #075e54; padding-bottom:10px;">
            <h2 style="margin:0;">📁 Carpetas Firebase</h2>
            <button onclick="document.getElementById('panel-admin-sincro').style.display='none'" style="padding:10px; background:#eee; border:none; border-radius:10px;">Cerrar</button>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:20px;">
            <div onclick="adminListarCarpetas('msg_privados')" style="background:#075e54; color:white; padding:20px; border-radius:15px; text-align:center; cursor:pointer;">📂 PRIVADOS</div>
            <div onclick="adminListarCarpetas('grupos')" style="background:#128c7e; color:white; padding:20px; border-radius:15px; text-align:center; cursor:pointer;">📂 GRUPOS</div>
        </div>
        <div id="lista-carpetas-sincro" style="margin-top:20px;"></div>
        <div id="visor-scroll-admin" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:10001; overflow-y:auto; padding:20px;">
            <button onclick="document.getElementById('visor-scroll-admin').style.display='none'" style="width:100%; padding:15px; background:white; border-radius:10px; margin-bottom:20px;">CERRAR VISOR</button>
            <div id="contenedor-multimedia-admin"></div>
        </div>`;
    document.body.appendChild(panel);
}

function adminListarCarpetas(tipo) {
    const lista = document.getElementById('lista-carpetas-sincro');
    lista.innerHTML = "Cargando...";
    rdb.ref(tipo).once('value', s => {
        lista.innerHTML = "";
        s.forEach(h => {
            const item = document.createElement('div');
            item.style = "background:#f9f9f9; border:1px solid #ddd; padding:15px; margin-bottom:10px; border-radius:12px; display:flex; justify-content:space-between; align-items:center;";
            item.innerHTML = `
                <span onclick="adminVerScroll('${tipo}/${h.key}')" style="cursor:pointer; font-weight:bold;">📁 ${h.key}</span>
                <button onclick="confirm('¿BORRAR TODO?').then(r=>{if(r) rdb.ref('${tipo}/${h.key}').remove()})" style="background:red; color:white; border:none; padding:8px; border-radius:8px;">ELIMINAR</button>
            `;
            lista.appendChild(item);
        });
    });
}

function adminVerScroll(ruta) {
    const visor = document.getElementById('visor-scroll-admin');
    const contenedor = document.getElementById('contenedor-multimedia-admin');
    visor.style.display = 'block'; contenedor.innerHTML = "";
    rdb.ref(ruta).once('value', s => {
        s.forEach(msg => {
            const d = msg.val();
            if(d.img || d.video) {
                const card = document.createElement('div');
                card.style = "margin-bottom:20px; text-align:center; position:relative;";
                card.innerHTML = `
                    ${d.img ? `<img src="${d.img}" style="max-width:100%; border-radius:10px;">` : `<video src="${d.video}" controls style="max-width:100%;"></video>`}
                    <button onclick="rdb.ref('${ruta}/${msg.key}').remove(); this.parentElement.remove();" style="position:absolute; top:10px; right:10px; background:red; color:white; border:none; width:35px; height:35px; border-radius:50%;">✕</button>
                `;
                contenedor.appendChild(card);
            }
        });
    });
}

/* --- 2. LÓGICA DE GRUPOS (Acceso Directo e Invitaciones) --- */
function inyectarBotonCrearGrupoPro() {
    const layout = document.getElementById('main-layout');
    if(!layout || document.getElementById('btn-g-pro')) return;
    const btn = document.createElement('button');
    btn.id = 'btn-g-pro';
    btn.innerHTML = "➕ CREAR NUEVO GRUPO";
    btn.style = "background:#128c7e; color:white; border:none; padding:15px; width:90%; margin:10px 5%; border-radius:15px; font-weight:bold;";
    btn.onclick = () => {
        prompt("Nombre del grupo:").then(nom => {
            if(nom) {
                const idG = 'grupo_' + Date.now();
                rdb.ref('grupos/' + idG).set({ nombre: nom, creador: miUsuario, miembros: {[miUsuario]: true} });
                sincroAviso("Grupo creado", "info");
                abrirChatGrupo(idG, nom); // Abre directo
            }
        });
    };
    layout.prepend(btn);
}

/* --- 3. MENÚ ENGRANAJE (⚙️) - 4 FUNCIONES --- */
function configurarMenuEngranajeSincro() {
    setInterval(() => {
        const header = document.querySelector('.header') || document.querySelector('.chat-header');
        if (header && !document.getElementById('gear-sincro')) {
            const gear = document.createElement('span');
            gear.id = 'gear-sincro';
            gear.innerHTML = " ⚙️ ";
            gear.style = "cursor:pointer; font-size:20px; margin-left:10px;";
            gear.onclick = () => {
                confirm("OPCIONES: 1. Multimedia | 2. Mutear | 3. Bloquear | 4. Eliminar").then(r => {
                    if(r) sincroAviso("Opción seleccionada", "info");
                });
            };
            header.appendChild(gear);
        }
    }, 2000);
}

/* --- 4. PERFILES, SPAM Y BURBUJA ROJA --- */
function iniciarObservadorPerfilesSincro() {
    setInterval(() => {
        const h2 = document.getElementById('nom-perfil');
        const target = h2?.innerText.replace('@', '').trim().toLowerCase();
        const area = document.getElementById('area-botones-perfil');
        if (target && target !== miUsuario && area && !document.getElementById('btns-sincro-fix')) {
            const div = document.createElement('div');
            div.id = 'btns-sincro-fix';
            div.style = "display:flex; flex-direction:column; gap:10px; width:100%; margin-top:10px;";
            div.innerHTML = `
                <button onclick="verPerfil('${target}')" class="btn-main">📩 ENVIAR DM</button>
                <button onclick="enviarSolicitud('${target}')" class="btn-main" style="background:#128c7e;">👤 AGREGAR</button>
                <button onclick="sincroBloquear('${target}')" class="btn-main" style="background:#ff4d4d;">🚫 BLOQUEAR</button>
            `;
            area.prepend(div);
        }
    }, 1500);
}

function sincroBloquear(id) {
    confirm("¿Bloquear a " + id + "?").then(r => {
        if(r) { rdb.ref('bloqueados/'+miUsuario+'/'+id).set(true); sincroAviso("Bloqueado", "error"); }
    });
}

function escucharSpamSincro() {
    rdb.ref('spam/' + miUsuario).on('value', s => {
        const count = s.numChildren();
        if(count > 0) {
            sincroAviso("Tienes " + count + " mensajes en Spam 🔴", "error");
            document.getElementById('notif-badge').style.display = 'block';
            document.getElementById('notif-badge').style.background = 'red';
        }
    });
}

/* --- 5. VENTANAS BONITAS (SINCRO UI) --- */
function sincroAviso(txt, tipo) {
    const color = tipo === 'error' ? "#ff4d4d" : "#075e54";
    const el = document.createElement('div');
    el.style = `position:fixed; top:20px; left:50%; transform:translateX(-50%); background:${color}; color:white; padding:12px 25px; border-radius:30px; z-index:99999; font-weight:bold; box-shadow:0 4px 15px rgba(0,0,0,0.2);`;
    el.innerHTML = txt;
    document.body.appendChild(el);
    setTimeout(() => { el.style.opacity="0"; setTimeout(()=>el.remove(), 500); }, 3000);
}

function sincroConfirmar(msg) {
    return new Promise(resolve => {
        const d = document.createElement('div');
        d.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:100000; display:flex; align-items:center; justify-content:center; font-family:sans-serif;";
        d.innerHTML = `<div style="background:white; padding:25px; border-radius:20px; width:85%; max-width:320px; text-align:center; color:black;">
            <p style="font-weight:bold; color:#075e54;">Sincro</p><p style="font-size:14px; margin-bottom:20px;">${msg}</p>
            <div style="display:flex; gap:10px;"><button id="s-canc" style="flex:1; padding:12px; border-radius:12px; border:none; background:#eee;">Cancelar</button>
            <button id="s-ok" style="flex:1; padding:12px; border-radius:12px; border:none; background:#075e54; color:white; font-weight:bold;">Aceptar</button></div></div>`;
        document.body.appendChild(d);
        document.getElementById('s-ok').onclick = () => { d.remove(); resolve(true); };
        document.getElementById('s-canc').onclick = () => { d.remove(); resolve(false); };
    });
}

function sincroPedirTexto(titulo) {
    return new Promise(resolve => {
        const d = document.createElement('div');
        d.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:100000; display:flex; align-items:center; justify-content:center; font-family:sans-serif;";
        d.innerHTML = `<div style="background:white; padding:25px; border-radius:20px; width:85%; max-width:320px; text-align:center; color:black;">
            <p style="font-weight:bold; color:#075e54;">${titulo}</p><input type="text" id="sincro-in" style="width:90%; padding:12px; border-radius:12px; border:2px solid #075e54; margin-bottom:20px; outline:none;">
            <div style="display:flex; gap:10px;"><button id="sp-canc" style="flex:1; padding:12px; border-radius:12px; border:none; background:#eee;">Cancelar</button>
            <button id="sp-ok" style="flex:1; padding:12px; border-radius:12px; border:none; background:#075e54; color:white; font-weight:bold;">Confirmar</button></div></div>`;
        document.body.appendChild(d); document.getElementById('sincro-in').focus();
        document.getElementById('sp-ok').onclick = () => { const v = document.getElementById('sincro-in').value; d.remove(); resolve(v); };
        document.getElementById('sp-canc').onclick = () => { d.remove(); resolve(null); };
    });
}

// INYECTAR DISPARADOR AL INICIAR APP
const originalIniciarApp = iniciarApp;
iniciarApp = function() {
    originalIniciarApp();
    activarFuncionesMaestras();
}
</script>
