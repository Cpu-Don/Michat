<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sincro - Super Admin & Grupos</title>
    <meta content="width=device-width,initial-scale=1" name="viewport"/>
    <style>
        :root { --bg-body: #f0f2f5; --bg-card: white; --text-main: #1c1e21; --border: #ddd; --primary: #075e54; --admin: #dc3545; }
        body.tema-oscuro { --bg-body: #18191a; --bg-card: #242526; --text-main: #e4e6eb; --border: #3e4042; }
        body { background: var(--bg-body); color: var(--text-main); margin: 0; font-family: 'Segoe UI', sans-serif; transition: 0.3s; }
        
        /* Ventanas Sincro (Alertas Bonitas) */
        .sincro-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 9000; }
        .sincro-modal { background: var(--bg-card); width: 85%; max-width: 320px; border-radius: 20px; padding: 20px; text-align: center; border: 1px solid var(--border); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .menu-item { padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer; font-weight: 500; display: flex; align-items: center; gap: 10px; }
        .menu-item:last-child { border: none; }

        /* Carpetas Admin */
        .carpeta { background: var(--bg-card); border-radius: 12px; padding: 15px; margin-bottom: 10px; border-left: 5px solid var(--primary); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .carpeta.grupo { border-left-color: #ffc107; }
        
        /* Badges de Notificación (Spam) */
        .badge-spam { background: #ff4d4d; color: white; border-radius: 50%; padding: 2px 7px; font-size: 11px; margin-left: 5px; font-weight: bold; }

        /* Layout Chat */
        #ventana-chat { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-body); z-index: 4000; display: none; flex-direction: column; }
        .chat-header { background: var(--primary); color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
        .admin-header { background: var(--admin) !important; }

        /* Galería Scroll */
        .galeria-scroll { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; max-height: 300px; overflow-y: auto; margin-top: 10px; padding: 5px; }
        .galeria-item { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 5px; }

        .btn-main { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }
    </style>
</head>
<body>

<div id="app">
    <div id="acceso" style="width:300px; margin:100px auto; text-align:center; background:white; padding:30px; border-radius:20px; color:black;">
        <h1 style="color:var(--primary)">Sincro</h1>
        <input id="usr" placeholder="Usuario" style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px; border:1px solid #ccc;">
        <input id="clv" type="password" placeholder="Clave" style="width:100%; padding:10px; margin-bottom:20px; border-radius:5px; border:1px solid #ccc;">
        <button onclick="entrar()" class="btn-main">ENTRAR</button>
    </div>

    <div id="main-layout" style="display:none; padding-top:70px;">
        <div style="position:fixed; top:0; width:100%; background:var(--primary); color:white; padding:12px; display:flex; justify-content:space-between; align-items:center; z-index:1000; box-sizing:border-box;" id="top-bar">
            <h2 id="logo-sincro">Sincro</h2>
            <div style="display:flex; gap:15px; align-items:center;">
                <div onclick="abrirBandeja()" style="cursor:pointer; position:relative;">
                    DM ✉ <span id="spam-bubble" class="badge-spam" style="display:none;">0</span>
                </div>
                <div id="mi-avatar" style="width:35px; height:35px; background:#25d366; border-radius:50%; border:2px solid white; cursor:pointer;"></div>
            </div>
        </div>
        <div id="muro" style="padding:15px; max-width:600px; margin:auto;"></div>
    </div>

    <div id="bandeja-section" style="display:none; position:fixed; top:0; width:100%; height:100%; background:var(--bg-body); z-index:2000; padding-top:70px; overflow-y:auto;">
        <div style="padding:15px;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3>Mis Conversaciones</h3>
                <button onclick="document.getElementById('bandeja-section').style.display='none'" class="btn-main" style="width:auto; padding:5px 15px;">Volver</button>
            </div>
            
            <h4 style="color:var(--primary);">📁 Chats Privados</h4>
            <div id="folder-privados"></div>

            <h4 style="color:#ffc107; margin-top:20px;">📁 Grupos</h4>
            <div id="folder-grupos"></div>

            <h4 style="color:#ff4d4d; margin-top:20px;">📩 Spam (Desconocidos)</h4>
            <div id="folder-spam"></div>
        </div>
    </div>

    <div id="ventana-chat">
        <div class="chat-header" id="header-chat-color">
            <div style="display:flex; align-items:center; gap:10px;">
                <button onclick="cerrarChat()" style="background:none; border:none; color:white; font-size:22px;">←</button>
                <b id="nombre-chat-header">Chat</b>
            </div>
            <span onclick="abrirConfigChat()" style="cursor:pointer; font-size:24px;">⚙️</span>
        </div>
        <div id="lista-mensajes" style="flex:1; overflow-y:auto; padding:15px;"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = { databaseURL: "https://micanalmaestro-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const rdb = firebase.database();

    let miUsuario = "";
    let chatActivo = "";
    let esGrupoActivo = false;
    let misAmigos = [];

    function toast(m, t='exito') {
        const d = document.createElement('div');
        d.style = `position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:${t==='exito'?'#075e54':'#dc3545'}; color:white; padding:12px 25px; border-radius:30px; z-index:10000; font-weight:bold;`;
        d.innerText = m;
        document.body.appendChild(d);
        setTimeout(() => d.remove(), 3000);
    }

    function entrar() {
        const u = document.getElementById('usr').value.trim().toLowerCase();
        if(!u) return;
        miUsuario = u;
        document.getElementById('acceso').style.display = 'none';
        document.getElementById('main-layout').style.display = 'block';
        
        if(miUsuario === "chat") {
            document.getElementById('top-bar').classList.add('admin-header');
            document.getElementById('logo-sincro').innerText = "Super Admin Maestro";
        }

        // Escuchar Amigos y Spam
        rdb.ref('amigos/'+miUsuario).on('value', s => misAmigos = s.val() ? Object.keys(s.val()) : []);
        escucharSpam();
        actualizarCarpetas();
    }

    // --- CARPETAS Y SPAM ---
    function escucharSpam() {
        rdb.ref('mensajes_privados').on('value', s => {
            let spamCount = 0;
            s.forEach(chat => {
                if(!misAmigos.includes(chat.key) && chat.key !== miUsuario) {
                    spamCount++;
                }
            });
            const b = document.getElementById('spam-bubble');
            b.innerText = spamCount;
            b.style.display = spamCount > 0 ? 'inline-block' : 'none';
        });
    }

    function actualizarCarpetas() {
        rdb.ref('mensajes_privados').on('value', s => {
            const p = document.getElementById('folder-privados');
            const sp = document.getElementById('folder-spam');
            p.innerHTML = ""; sp.innerHTML = "";
            s.forEach(chat => {
                const html = `<div class="carpeta" onclick="abrirChat('${chat.key}', false)"><span>@${chat.key}</span> 📁</div>`;
                if(misAmigos.includes(chat.key)) p.innerHTML += html;
                else if(chat.key !== miUsuario) sp.innerHTML += html;
            });
        });
        rdb.ref('msg_grupos').on('value', s => {
            const g = document.getElementById('folder-grupos'); g.innerHTML = "";
            s.forEach(grupo => {
                g.innerHTML += `<div class="carpeta grupo" onclick="abrirChat('${grupo.key}', true)"><span>👥 ${grupo.key}</span> 📁</div>`;
            });
        });
    }

    // --- ENGRANAJE DE 4 FUNCIONES ---
    function abrirConfigChat() {
        const overlay = document.createElement('div');
        overlay.className = "sincro-overlay";
        overlay.onclick = (e) => { if(e.target === overlay) overlay.remove(); };
        overlay.innerHTML = `
            <div class="sincro-modal">
                <h3 style="color:var(--primary); margin-top:0;">Gestión de Chat</h3>
                <div class="menu-item" onclick="verMultimedia()">🖼️ Ver Contenido Multimedia</div>
                <div class="menu-item" onclick="toast('Notificaciones silenciadas')">🔇 Mutear</div>
                ${!esGrupoActivo ? `<div class="menu-item" onclick="bloquear()">🚫 Bloquear Usuario</div>` : ''}
                <div class="menu-item" onclick="borrarChatCompleto()" style="color:#ff4d4d; font-weight:bold;">🗑️ Eliminar (Todo)</div>
                <br>
                <button onclick="this.parentElement.parentElement.remove()" class="btn-main" style="background:#eee; color:black;">Cerrar</button>
            </div>`;
        document.body.appendChild(overlay);
    }

    function verMultimedia() {
        const overlay = document.createElement('div');
        overlay.className = "sincro-overlay";
        overlay.innerHTML = `
            <div class="sincro-modal" style="max-width:350px;">
                <h4>Galería de @${chatActivo}</h4>
                <div class="galeria-scroll" id="visor-media">Cargando fotos...</div>
                <button onclick="this.parentElement.parentElement.remove()" class="btn-main" style="margin-top:15px;">Cerrar</button>
            </div>`;
        document.body.appendChild(overlay);
        // Aquí cargarías las fotos reales de Firebase haciendo un loop
        document.getElementById('visor-media').innerHTML = `<p style="font-size:12px; color:gray;">No hay fotos recientes.</p>`;
    }

    function borrarChatCompleto() {
        if(miUsuario === "chat" || confirm("¿Eliminar toda la base de datos de este chat?")) {
            const path = esGrupoActivo ? 'msg_grupos/' : 'mensajes_privados/';
            rdb.ref(path + chatActivo).remove();
            toast("Borrado total ejecutado", "error");
            document.querySelectorAll('.sincro-overlay').forEach(el => el.remove());
            cerrarChat();
        }
    }

    // --- LOGICA DE GRUPOS ---
    function crearGrupo(nombre) {
        // Al crear un grupo, te inscribe y lo abre automático
        rdb.ref('msg_grupos/'+nombre).push({ texto: "Grupo creado por " + miUsuario, autor: "Sincro" });
        toast("Grupo creado con éxito");
        abrirChat(nombre, true);
    }

    function abrirChat(id, esGrupo) {
        chatActivo = id;
        esGrupoActivo = esGrupo;
        document.getElementById('ventana-chat').style.display = 'flex';
        document.getElementById('nombre-chat-header').innerText = (esGrupo ? "👥 " : "@") + id;
        if(miUsuario === "chat") document.getElementById('header-chat-color').classList.add('admin-header');
        else document.getElementById('header-chat-color').classList.remove('admin-header');
    }

    function cerrarChat() { document.getElementById('ventana-chat').style.display = 'none'; }
    function abrirBandeja() { document.getElementById('bandeja-section').style.display = 'block'; }
</script>
</body>
</html>
