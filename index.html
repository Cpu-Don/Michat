<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sincro - Versión Corregida</title>
  <meta content='width=device-width,initial-scale=1' name='viewport'/>
  <style>
    /* DISEÑO BASE */
    body { background:#f0f2f5 !important; margin:0; padding:0; height:100vh; width:100vw; display:flex !important; overflow:hidden; font-family: -apple-system, sans-serif; }
    #content, .section, .widget { display: block !important; width: 100%; height: 100%; }
    .navbar, .header-outer, .footer-outer { display: none !important; }

    /* POST CARDS */
    .post-card { background: white; border-radius: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); margin-bottom: 12px; padding: 12px; width: 92%; align-self: center; border: 1px solid #dddfe2; position: relative; }
    .post-header { display: flex; align-items: center; margin-bottom: 8px; justify-content: space-between; position: relative; }
    .post-user { color: #1c1e21; font-weight: bold; font-size: 15px; cursor: pointer; }
    .post-badge { font-size: 10px; background: #e4e6eb; padding: 2px 6px; border-radius: 4px; color: #65676b; margin-left: 5px; }
    .post-content { font-size: 15px; color: #050505; line-height: 1.4; word-break: break-word; margin: 8px 0; }
    .post-content a { color: #1877f2; text-decoration: none; }
    .chat-media { width: 100%; border-radius: 8px; margin-top: 5px; display: block; cursor: pointer; max-height: 400px; object-fit: cover; }

    /* DROPDOWN MENU (LOS 3 PUNTOS) */
    .dropdown { position: relative; display: inline-block; }
    .dropdown-content { display: none; position: absolute; right: 0; background-color: white; min-width: 120px; box-shadow: 0px 4px 12px rgba(0,0,0,0.15); z-index: 10000; border-radius: 8px; border: 1px solid #ddd; }
    .dropdown-content span { color: #1c1e21; padding: 10px 15px; display: block; cursor: pointer; font-size: 13px; font-weight: 500; border-bottom: 1px solid #f0f2f5; }
    .dropdown-content span:hover { background: #f0f2f5; }
    .show { display: block !important; }

    /* MODALES SINCRO */
    #modal-sincro { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:3000000; justify-content:center; align-items:center; }
    .modal-box { background:white; padding:20px; border-radius:12px; width:85%; max-width:350px; text-align:center; }
    .modal-input { width: 92%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin: 15px 0; font-family: inherit; font-size: 14px; }
    .modal-btns { display: flex; gap: 10px; justify-content: center; }

    /* PERFIL MEJORADO */
    #perfil-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f0f2f5; z-index: 1000002; overflow-y: auto; flex-direction: column; align-items: center; }
    .perfil-header { width: 100%; max-width: 500px; background: white; position: relative; padding-bottom: 15px; border-bottom: 1px solid #ddd; text-align: center; }
    
    /* Contenedores de fotos con icono de cámara */
    .img-edit-wrap { position: relative; cursor: pointer; display: inline-block; }
    .cam-icon { position: absolute; bottom: 5px; right: 5px; background: #e4e6eb; border-radius: 50%; padding: 5px; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; border: 2px solid white; font-size: 12px; }
    
    .perfil-portada { width: 100%; height: 180px; background: #ccd0d5; object-fit: cover; }
    .perfil-avatar { width: 120px; height: 120px; border-radius: 50%; border: 4px solid white; background: #eee; object-fit: cover; margin-top: -60px; }

    .btn-pub { background:#1877f2; color:white; border:none; padding:10px; border-radius:20px; font-weight:bold; cursor:pointer; width: 92%; align-self: center; }
    .tab-sincro { cursor: pointer; font-size: 14px; padding: 10px; color: #65676b; font-weight: 600; flex: 1; text-align: center; }
    .tab-active { color: #1877f2; border-bottom: 3px solid #1877f2; }
  </style>
</head>
<body>

  <div id='app' style='position:fixed; top:0; left:0; width:100%; height:100%; z-index:999999; display:flex; justify-content:center;'>
    
    <div id='acceso' style='background:white; padding:40px 30px; border-radius:15px; width:320px; text-align:center; align-self:center;'>
      <h1 style='color:#1877f2; margin:0;'>Sincro</h1>
      <input id='usr' placeholder='Usuario' style='width:100%; padding:14px; margin-bottom:10px; border:1px solid #dddfe2; border-radius:8px;' type='text'/>
      <input id='clv' placeholder='Contraseña' style='width:100%; padding:14px; margin-bottom:20px; border:1px solid #dddfe2; border-radius:8px;' type='password'/>
      <button onclick='entrar()' style='width:100%; padding:12px; background:#1877f2; color:white; border:none; border-radius:8px; cursor:pointer;'>ENTRAR</button>
    </div>

    <div id='chat' style='width:100%; max-width:500px; height:100%; background:#f0f2f5; display:none; flex-direction:column;'>
      <div style='background:white; padding:10px 15px; border-bottom: 1px solid #ddd;'>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="color:#1877f2; margin:0;">Sincro</h2>
            <div class='dropdown'>
                <span onclick='toggleDrop("menu-top")' style='cursor:pointer; background:#f0f2f5; padding:8px 15px; border-radius:20px; font-size:13px;'>MENÚ ▼</span>
                <div class='dropdown-content' id='menu-top'>
                    <span onclick='abrirPerfil(miUsuario)'>Mi Perfil</span>
                    <span onclick='location.reload()' style='color:red;'>Cerrar Sesión</span>
                </div>
            </div>
        </div>
        <div style="display:flex; margin-top:10px;">
            <div id="t-pub" onclick="filtrarAudiencia('publico')" class="tab-sincro tab-active">Noticias</div>
            <div id="t-ami" onclick="filtrarAudiencia('amigos')" class="tab-sincro">Amigos</div>
        </div>
      </div>
      <div id='m-box' style='flex:1; padding:15px 0; overflow-y:auto; display:flex; flex-direction:column;'></div>
      
      <div style='background:white; padding:12px; border-top:1px solid #ddd; display:flex; flex-direction:column; gap:8px;'>
        <div style="display:flex; gap:10px; align-items:center;">
            <button onclick="document.getElementById('file-global').click()" style="border:none; background:#e4e6eb; width:35px; height:35px; border-radius:50%;">📸</button>
            <input id='msg' placeholder='¿Qué piensas?' style='flex:1; border:none; background:#f0f2f5; padding:10px; border-radius:20px;' type='text'/>
        </div>
        <button onclick='send("msg", "priv-global")' class="btn-pub">Publicar</button>
        <input type="file" id="file-global" style="display:none" onchange="subirMultimedia(this, 'msg', 'msg')">
        <input type="hidden" id="priv-global" value="publico">
      </div>
    </div>

    <div id='perfil-view'>
        <div class="perfil-header">
            <button onclick="cerrarPerfil()" style="position:absolute; top:10px; left:10px; z-index:10; background:rgba(0,0,0,0.6); color:#fff; border-radius:50%; border:none; width:35px; height:35px;">←</button>
            
            <div class="img-edit-wrap" style="width:100%;" onclick="if(pUsuarioActual === miUsuario) document.getElementById('file-portada').click()">
                <img id="p-portada" class="perfil-portada" src="">
                <div class="cam-icon" id="cam-portada" style="display:none;">📷</div>
            </div>
            <input type="file" id="file-portada" style="display:none" onchange="subirMultimedia(this, 'portada')">

            <div style="display:flex; flex-direction:column; align-items:center;">
                <div class="img-edit-wrap" onclick="if(pUsuarioActual === miUsuario) document.getElementById('file-avatar').click()">
                    <img id="p-avatar" class="perfil-avatar" src="">
                    <div class="cam-icon" id="cam-avatar" style="display:none;">📷</div>
                </div>
                <input type="file" id="file-avatar" style="display:none" onchange="subirMultimedia(this, 'avatar')">
                
                <div id="p-nombre" style="font-size:24px; font-weight:bold; margin-top:10px;">Cargando...</div>
                <div id="p-bio" style="font-size:14px; color:#65676b; margin:10px; max-width:80%;">Bio...</div>
                <div id="p-acciones"></div>
            </div>
        </div>
        <div id="perfil-muro" style="width:100%; max-width:500px; padding-bottom:50px;"></div>
    </div>
  </div>

  <div id='modal-sincro'><div class="modal-box" id="modal-box-content"></div></div>

  <script src='https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js'></script>
  <script src='https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js'></script>

  <script>
    const firebaseConfig = { databaseURL: "https://micanalmaestro-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const rdb = firebase.database();
    const CLOUD_NAME = "dhtyepcjg", UPLOAD_PRESET = "Historial"; 
    var miUsuario = "", vistaActual = "publico", pUsuarioActual = "";

    function toggleDrop(id) {
        // Cerrar otros menús abiertos antes de abrir uno nuevo
        document.querySelectorAll('.dropdown-content').forEach(d => { if(d.id !== id) d.classList.remove('show'); });
        document.getElementById(id).classList.toggle("show");
    }

    // Cerrar menús si se toca fuera
    window.onclick = function(event) { if (!event.target.matches('.dropdown span')) { document.querySelectorAll('.dropdown-content').forEach(d => d.classList.remove('show')); } }

    function showModal(html) { document.getElementById('modal-box-content').innerHTML = html; document.getElementById('modal-sincro').style.display = 'flex'; }
    function hideModal() { document.getElementById('modal-sincro').style.display = 'none'; }

    function editarBio() {
        showModal(`
            <h3 style="color:#1877f2; margin:0;">¿Deseas Editar Tú Biografía!?</h3>
            <textarea id="new-bio" class="modal-input" rows="3">${document.getElementById('p-bio').innerText}</textarea>
            <div class="modal-btns">
                <button onclick="hideModal()" style="border:none; padding:10px; border-radius:8px;">Cancelar</button>
                <button onclick="rdb.ref('perfiles/'+miUsuario.toLowerCase()+'/bio').set(document.getElementById('new-bio').value); hideModal();" style="border:none; background:#1877f2; color:white; padding:10px; border-radius:8px;">Guardar</button>
            </div>
        `);
    }

    function editarPost(id, texto) {
        showModal(`
            <h3 style="color:#1877f2; margin:0;">¿Deseas modificar tu publicación?</h3>
            <textarea id="edit-txt" class="modal-input" rows="3">${texto}</textarea>
            <div class="modal-btns">
                <button onclick="hideModal()" style="border:none; padding:10px; border-radius:8px;">Cerrar</button>
                <button onclick="rdb.ref('mensajes/'+'${id}').update({t: document.getElementById('edit-txt').value}); hideModal();" style="border:none; background:#1877f2; color:white; padding:10px; border-radius:8px;">Actualizar</button>
            </div>
        `);
    }

    function borrarPost(id) {
        showModal(`
            <h3 style="color:red; margin:0;">¿Borrar Publicación?</h3>
            <p>Se eliminará de Sincro para siempre.</p>
            <div class="modal-btns">
                <button onclick="hideModal()" style="border:none; padding:10px; border-radius:8px;">No</button>
                <button onclick="rdb.ref('mensajes/'+'${id}').remove(); hideModal();" style="border:none; background:red; color:white; padding:10px; border-radius:8px;">Borrar</button>
            </div>
        `);
    }

    function entrar() {
        var u = document.getElementById('usr').value.trim();
        var c = document.getElementById('clv').value.trim();
        if(!u) return;
        rdb.ref('usuarios/'+u.toLowerCase()).once('value', (s) => {
            if(s.exists() && s.val().toString() === c.toString()) { miUsuario = u; iniciar(); }
            else if(!s.exists()) { rdb.ref('usuarios/'+u.toLowerCase()).set(c); miUsuario = u; iniciar(); }
        });
    }

    function iniciar() {
        document.getElementById('acceso').style.display = 'none';
        document.getElementById('chat').style.display = 'flex';
        rdb.ref('mensajes').on('value', (snap) => {
            var box = document.getElementById('m-box'); box.innerHTML = "";
            snap.forEach((c) => {
                var m = c.val(), id = c.key;
                if(vistaActual === 'publico' && m.p === 'amigos') return;
                box.prepend(crearPostHTML(m, id));
            });
        });
    }

    function crearPostHTML(m, id) {
        var d = document.createElement('div'); d.className = "post-card";
        var opt = (m.u === miUsuario) ? `<div class='dropdown'>
            <span onclick='event.stopPropagation(); toggleDrop("opt-${id}")' style='cursor:pointer; padding:5px 10px; font-weight:bold;'>⋮</span>
            <div class='dropdown-content' id='opt-${id}'>
                <span onclick="editarPost('${id}','${m.t.replace(/'/g,"\\'")}')">Editar</span>
                <span onclick="borrarPost('${id}')" style="color:red;">Borrar</span>
            </div>
        </div>` : "";

        d.innerHTML = `<div class="post-header">
            <div><span class="post-user" onclick="abrirPerfil('${m.u}')">${m.u}</span><span class="post-badge">${m.p==='amigos'?'👥':'🌍'}</span></div>
            ${opt}
        </div>
        <div class="post-content">${linkify(m.t)}</div>`;
        return d;
    }

    function linkify(t) {
        if(t.includes("cloudinary.com")) return t.match(/\.(jpeg|jpg|png|gif)$/i) ? `<img src="${t}" class="chat-media">` : `<video src="${t}" class="chat-media" controls></video>`;
        return t.replace(/(\bhttps?:\/\/\S+)/ig, '<a href="$1" target="_blank">$1</a>');
    }

    function abrirPerfil(user) {
        pUsuarioActual = user;
        document.getElementById('perfil-view').style.display = 'flex';
        document.getElementById('p-nombre').innerText = user;
        document.getElementById('cam-avatar').style.display = (user === miUsuario) ? 'flex' : 'none';
        document.getElementById('cam-portada').style.display = (user === miUsuario) ? 'flex' : 'none';
        document.getElementById('p-acciones').innerHTML = (user === miUsuario) ? `<button onclick="editarBio()" style="padding:8px 15px; border-radius:8px; border:none; background:#e4e6eb; font-weight:bold;">Editar Bio</button>` : "";

        rdb.ref('perfiles/' + user.toLowerCase()).on('value', (s) => {
            const data = s.val() || {};
            document.getElementById('p-avatar').src = data.avatar || "https://via.placeholder.com/120";
            document.getElementById('p-portada').src = data.portada || "https://via.placeholder.com/500x180";
            document.getElementById('p-bio').innerText = data.bio || "Hola, estoy en Sincro.";
        });
        cargarMuroPerfil(user);
    }

    function cargarMuroPerfil(user) {
        rdb.ref('mensajes').once('value', (snap) => {
            var box = document.getElementById('perfil-muro'); box.innerHTML = "";
            snap.forEach((c) => {
                var m = c.val(), id = c.key;
                if(m.u.toLowerCase() === user.toLowerCase()) box.prepend(crearPostHTML(m, id));
            });
        });
    }

    function send(idInput, idPriv) {
        var msg = document.getElementById(idInput);
        if(!msg.value.trim()) return;
        rdb.ref('mensajes').push({ u: miUsuario, t: msg.value, p: document.getElementById(idPriv).value });
        msg.value = "";
    }

    async function subirMultimedia(input, tipo, target) {
        const file = input.files[0]; if(!file) return;
        const formData = new FormData(); formData.append("file", file); formData.append("upload_preset", UPLOAD_PRESET);
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, { method: "POST", body: formData });
        const data = await res.json();
        if(tipo === 'msg') { document.getElementById(target).value = data.secure_url; send(target, 'priv-global'); }
        else { rdb.ref('perfiles/'+miUsuario.toLowerCase()+'/'+tipo).set(data.secure_url); }
    }

    function cerrarPerfil() { document.getElementById('perfil-view').style.display='none'; }
    function filtrarAudiencia(t) { vistaActual = t; document.getElementById('t-pub').className = (t==='publico')?'tab-sincro tab-active':'tab-sincro'; document.getElementById('t-ami').className = (t==='amigos')?'tab-sincro tab-active':'tab-sincro'; iniciar(); }
  </script>
</body>
</html>
