<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Chat Online</title>
  <meta content='width=device-width,initial-scale=1' name='viewport'/>
  <style>
    body { background:#f0f2f5 !important; margin:0; padding:0; height:100vh; width:100vw; display:flex !important; overflow:hidden; }
    #content, .section, .widget { display: block !important; width: 100%; height: 100%; }
    .navbar, .header-outer, .footer-outer { display: none !important; }
    .dropdown { position: relative; display: inline-block; }
    .dropdown-content { display: none; position: absolute; right: 0; background-color: #f9f9f9; min-width: 150px; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2); z-index: 1000000; border-radius: 5px; }
    .dropdown-content span { color: black; padding: 12px 16px; text-decoration: none; display: block; cursor: pointer; font-size: 14px; border-bottom: 1px solid #eee; }
    .dropdown-content span:hover { background-color: #f1f1f1; }
    .show { display: block !important; }
    #modal-reglas, #modal-online { display: none; position: fixed; z-index: 1000001; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); justify-content: center; align-items: center; font-family: sans-serif; }
    .modal-box { background: white; padding: 20px; border-radius: 10px; width: 85%; max-width: 400px; position: relative; }
    .chat-link { color: #075e54; text-decoration: underline; font-weight: bold; }
    
    /* Estilos Multimedia */
    .chat-media { max-width: 100%; border-radius: 8px; margin-top: 5px; display: block; border: 1px solid #ddd; cursor: pointer; }
    .btn-adjuntar { background: #ccc; color: #333; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; justify-content: center; align-items: center; flex-shrink: 0; position: relative; font-weight: bold; }
    .btn-disabled { opacity: 0.4; cursor: not-allowed !important; filter: grayscale(1); }
    .status-off { position: absolute; top: -5px; right: -5px; background: red; color: white; font-size: 8px; padding: 2px 4px; border-radius: 4px; display: none; }
    
    /* Estilos Lista de Grupos */
    #mis-grupos-lista { border-top: 1px solid #eee; margin-top: 5px; max-height: 200px; overflow-y: auto; background: #fff; }
    .grupo-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
    .grupo-item:hover { background: #f9f9f9; }
  </style>
</head>
<body>

  <div id='app' style='position:fixed; top:0; left:0; width:100%; height:100%; background:#f0f2f5; z-index:999999; display:flex; justify-content:center; align-items:center;'>
    
    <div id='acceso' style='background:white; padding:30px; border-radius:15px; box-shadow:0 5px 20px rgba(0,0,0,0.1); width:280px; text-align:center; font-family:sans-serif;'>
      <h2 style='color:#075e54; margin:0 0 20px 0;'>Registrarte o Inicia sesión</h2>
      <input id='usr' placeholder='Usuario' style='width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;' type='text'/>
      <input id='clv' placeholder='Clave' style='width:100%; padding:12px; margin-bottom:20px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;' type='password'/>
      <button onclick='entrar()' style='width:100%; padding:12px; background:#075e54; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;'>ENTRAR</button>
    </div>

    <div id='chat' style='width:100%; max-width:500px; height:100%; background:#e5ddd5; display:none; flex-direction:column; font-family:sans-serif;'>
      <div style='background:#075e54; color:white; padding:15px; display:flex; justify-content:space-between; align-items:center;'>
        <div onclick='verQuienesEstanOnline()' style='display:flex; flex-direction:column; cursor:pointer;'>
          <span><b>Chat Online</b></span>
          <small id='online-count' style='font-size:10px; color:#25d366; font-weight:bold;'>Conectados: 0 &#9660;</small>
        </div>
        <div class='dropdown'>
          <span onclick='toggleMenu()' style='cursor:pointer; font-size:12px; background:#054d44; padding:5px 10px; border-radius:5px; font-weight:bold;'>OPCIONES &#9660;</span>
          <div class='dropdown-content' id='myDropdown'>
            <span onclick='abrirReglas()'>Reglas</span>
            <span onclick='abrirModalGrupo()' style='color:#25d366; font-weight:bold;'>+ Crear Chat Grupal</span>
            
            <div id="mis-grupos-lista">
                <small style="padding:10px; color:#999; display:block; text-align:center;">Cargando tus grupos...</small>
            </div>

            <div id="admin-limpieza-media" style="display:none;">
                <span id="btn-lock-media" onclick='toggleMediaPublico()' style='color:#E91E63; font-weight:bold;'>Bloquear Multimedia</span>
                <span onclick='limpiarMultimedia("privado")' style='color:#2196F3;'>Limpiar Fotos Privadas</span>
                <span onclick='limpiarMultimedia("publico")' style='color:#4CAF50;'>Limpiar Fotos Públicas</span>
                <span onclick='limpiarMultimedia("total")' style='color:red; font-weight:bold;'>LIMPIEZA TOTAL FOTOS</span>
            </div>
            <span id='btn-borrar-todo' onclick='borrarTodoElChat()' style='color:orange; display:none;'>Borrar Chat Texto</span>
            <span onclick='location.reload()' style='color:red;'>Salir</span>
          </div>
        </div>
      </div>
      <div style='background:#054d44; color:white; padding:10px; font-size:12px; display:flex; justify-content:space-between;'>
        <span>CHAT GLOBAL:</span>
        <button id='tgl' onclick='lock()' style='background:#25d366; border:none; padding:3px 10px; border-radius:5px; cursor:pointer; font-weight:bold;'>ACTIVO</button>
      </div>
      <div id='m-box' style='flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:10px;'></div>
      
      <div style='background:#f0f0f0; padding:15px; display:flex; gap:10px; align-items:center;'>
        <button id="btn-plus-publico" onclick="document.getElementById('file-global').click()" class="btn-adjuntar">
            + <span id="label-off" class="status-off">OFF</span>
        </button>
        <input type="file" id="file-global" style="display:none" accept="image/*,video/*" onchange="subirMultimedia(this, 'global')">
        <input id='msg' onkeypress='if(event.key==="Enter") send()' placeholder='Escribe...' style='flex:1; padding:12px; border-radius:20px; border:1px solid #ccc; outline:none;' type='text'/>
        <button id="btn-send-global" onclick='send()' style='background:#075e54; color:white; border:none; width:45px; height:45px; border-radius:50%; cursor:pointer;'>&gt;</button>
      </div>
    </div>

    <div id='p-chat' style='display:none; position:fixed; bottom:0; right:15px; width:270px; background:white; border-radius:10px 10px 0 0; box-shadow:0 -5px 20px rgba(0,0,0,0.3); z-index:1000005; font-family:sans-serif; flex-direction:column; border:1px solid #075e54;'>
      <div style='background:#075e54; color:white; padding:10px 12px; border-radius:10px 10px 0 0; display:flex; flex-direction:column;'>
        <div style='display:flex; justify-content:space-between; align-items:center;'>
          <span id='p-nombre' style='font-size:13px; font-weight:bold;'>Privado</span>
          <span onclick='cerrarPrivado()' style='cursor:pointer; font-size:20px; font-weight:bold;'>X</span>
        </div>
        <small id='p-status' style='font-size:10px; color:#25d366; font-weight:bold; height:12px;'></small>
      </div>
      <div id='p-box' style='height:250px; overflow-y:auto; padding:10px; font-size:12px; background:#e5ddd5; display:flex; flex-direction:column; gap:8px;'></div>
      <div style='padding:10px; background:#f0f0f0; display:flex; gap:5px; border-top:1px solid #ddd; align-items:center;'>
        <button onclick="document.getElementById('file-privado').click()" style="background:#ccc; border:none; width:32px; height:32px; border-radius:50%; cursor:pointer;">+</button>
        <input type="file" id="file-privado" style="display:none" accept="image/*,video/*" onchange="subirMultimedia(this, 'privado')">
        <input id='p-msg' oninput='notificarEscribiendo()' onkeypress='if(event.key==="Enter") enviarPrivado()' placeholder='Privado...' style='flex:1; border:1px solid #ccc; border-radius:15px; padding:8px 12px; outline:none; font-size:12px;' type='text'/>
        <button id="btn-send-privado" onclick='enviarPrivado()' style='background:#075e54; color:white; border:none; border-radius:50%; width:32px; height:32px; cursor:pointer;'>&gt;</button>
      </div>
    </div>
  </div>

  <div id='modal-reglas'><div class='modal-box'><h3 style='color:#075e54; margin-top:0;'>Chat En Linea</h3><div id='reglas-texto' style='font-size:14px; margin-bottom:15px; white-space:pre-wrap; max-height:200px; overflow-y:auto; padding:10px; background:#f9f9f9;'></div><div id='admin-editor' style='display:none; border-top:1px solid #eee; padding-top:10px;'><textarea id='edit-reglas' style='width:100%; height:60px; font-size:12px;'></textarea><button onclick='guardarReglas()' style='width:100%; background:#075e54; color:white; border:none; padding:8px; border-radius:5px; margin-top:5px;'>ACTUALIZAR</button></div><button onclick='cerrarReglas()' style='width:100%; background:#777; color:white; border:none; padding:8px; border-radius:5px; margin-top:10px;'>CERRAR</button></div></div>
  <div id='modal-online'><div class='modal-box' style='max-width:250px;'><h3 style='color:#075e54; margin-top:0; font-size:16px;'>Usuarios en línea</h3><div id='lista-online' style='max-height:250px; overflow-y:auto; font-size:14px; color:#333;'></div><div id='admin-limpiar' style='display:none;'><button onclick='limpiarPresencia()' style='width:100%; background:orange; color:white; border:none; padding:8px; border-radius:5px; margin-top:10px; font-size:11px; font-weight:bold;'>LIMPIAR FANTASMAS</button></div><button onclick='document.getElementById("modal-online").style.display="none"' style='width:100%; background:#075e54; color:white; border:none; padding:8px; border-radius:5px; margin-top:10px;'>CERRAR</button></div></div>

  <script src='https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js'></script>
  <script src='https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js'></script>

  <script>
    const firebaseConfig = { databaseURL: "https://micanalmaestro-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const rdb = firebase.database();

    const CLOUD_NAME = "dhtyepcjg";
    const UPLOAD_PRESET = "Historial"; 

    var ok = true;
    var miUsuario = "";
    var usuarioDestino = "";
    var escribiendoTimeout;
    var multimediaBloqueado = false;
    var audioNotif = new Audio("https://cdn.pixabay.com/audio/2022/03/24/audio_7839176318.mp3");
    const EMOJIS = ['❤️', '🥲', '🤣', '🥰'];

    function toggleMenu() { document.getElementById("myDropdown").classList.toggle("show"); }
    function abrirReglas() { document.getElementById("modal-reglas").style.display = "flex"; }
    function cerrarReglas() { document.getElementById("modal-reglas").style.display = "none"; }

    function linkify(text) {
      if(!text) return "";
      if(text.includes("res.cloudinary.com")) {
          if(text.match(/\.(jpeg|jpg|gif|png|webp)$/i)) return '<img src="'+text+'" class="chat-media" onclick="window.open(this.src)">';
          if(text.match(/\.(mp4|mov|avi|webm)$/i)) return '<video src="'+text+'" class="chat-media" controls></video>';
      }
      var urlPattern = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
      return text.replace(urlPattern, function(url) { return '<a href="' + url + '" target="_blank" class="chat-link">' + url + '</a>'; });
    }

    function generarIdSala(u1, u2) {
      var comb = [u1.toLowerCase(), u2.toLowerCase()].sort().join("_");
      var hash = 0; for (var i = 0; i < comb.length; i++) { hash = ((hash << 5) - hash) + comb.charCodeAt(i); hash |= 0; }
      return "sala_" + Math.abs(hash);
    }

    function toggleMediaPublico() { rdb.ref('config/multimedia_bloqueado').set(!multimediaBloqueado); }
    rdb.ref('config/multimedia_bloqueado').on('value', (s) => {
        multimediaBloqueado = s.val() || false;
        const btnPlus = document.getElementById('btn-plus-publico');
        const labelOff = document.getElementById('label-off');
        if(multimediaBloqueado) { if(btnPlus) btnPlus.classList.add('btn-disabled'); if(labelOff) labelOff.style.display = "block"; } 
        else { if(btnPlus) btnPlus.classList.remove('btn-disabled'); if(labelOff) labelOff.style.display = "none"; }
    });

    async function subirMultimedia(input, tipo) {
      if(tipo === 'global' && multimediaBloqueado) { alert("Bloqueo activo."); input.value = ""; return; }
      const file = input.files[0]; if(!file) return;
      const btn = (tipo === 'global') ? document.getElementById('btn-send-global') : document.getElementById('btn-send-privado');
      btn.innerText = "...";
      const formData = new FormData(); formData.append("file", file); formData.append("upload_preset", UPLOAD_PRESET);
      try {
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, { method: "POST", body: formData });
        const data = await res.json();
        if(tipo === 'global') { document.getElementById('msg').value = data.secure_url; send(); } 
        else { document.getElementById('p-msg').value = data.secure_url; enviarPrivado(); }
      } catch (err) { alert("Error al subir"); } finally { btn.innerText = ">"; input.value = ""; }
    }

    function limpiarMultimedia(tipo) {
        const esMedia = (url) => url && url.includes("res.cloudinary.com");
        if(tipo === "publico" || tipo === "total") { rdb.ref('mensajes').once('value', (s) => { s.forEach((c) => { if(esMedia(c.val().t)) rdb.ref('mensajes/'+c.key).remove(); }); }); }
        if(tipo === "privado" || tipo === "total") { rdb.ref('privados').once('value', (s) => { s.forEach((sala) => { sala.forEach((msg) => { if(esMedia(msg.val().t)) rdb.ref('privados/'+sala.key+'/'+msg.key).remove(); }); }); }); }
    }

    function entrar() {
      var uO = document.getElementById('usr').value.trim(); var p = document.getElementById('clv').value.trim(); var uM = uO.toLowerCase();
      if(!uO || !p) { alert("Escribe usuario y clave"); return; }
      rdb.ref('usuarios/' + uM).once('value', (snapshot) => {
        if(snapshot.exists()) {
          if(snapshot.val().toString() === p.toString()) { miUsuario = (uM === "chat") ? "Chat" : uO; iniciar(); } 
          else { alert("Clave incorrecta."); }
        } else {
          rdb.ref('usuarios/' + uM).set(p).then(() => { miUsuario = (uM === "chat") ? "Chat" : uO; iniciar(); });
        }
      });
    }

    function iniciar() {
      document.getElementById('acceso').style.display = 'none';
      document.getElementById('chat').style.display = 'flex';
      if(miUsuario === "Chat") { 
         document.getElementById('admin-editor').style.display = 'block'; 
         document.getElementById('btn-borrar-todo').style.display = 'block';
         document.getElementById('admin-limpieza-media').style.display = 'block';
      }
      rdb.ref('presencia/' + miUsuario.toLowerCase()).set(miUsuario).onDisconnect().remove();
      rdb.ref('presencia').on('value', (s) => {
        var usuarios = s.val() || {};
        document.getElementById('online-count').innerText = "Conectados: " + Object.keys(usuarios).length + " ▼";
        var listaDiv = document.getElementById('lista-online'); listaDiv.innerHTML = "";
        Object.values(usuarios).forEach(n => { listaDiv.innerHTML += "• <b style='color:#075e54;'>" + n + "</b><br>"; });
      });
      rdb.ref('config/reglas').on('value', (s) => { document.getElementById('reglas-texto').innerText = s.val() || "Bienvenido."; });
      
      rdb.ref('mensajes').on('value', (snapshot) => {
        var box = document.getElementById('m-box'); box.innerHTML = "";
        snapshot.forEach((child) => {
          var m = child.val(), id = child.key, esMio = (m.u === miUsuario);
          var d = document.createElement('div');
          d.style = "padding:10px; border-radius:8px; font-size:14px; max-width:80%; margin-bottom:5px;" + (esMio ? "background:#dcf8c6; align-self:flex-end;" : "background:white; align-self:flex-start;");
          d.innerHTML = (miUsuario === "Chat" ? "<span onclick='borrarMensaje(\""+id+"\")' style='color:red; cursor:pointer; float:right;'>x</span>" : "") + 
                       "<small onclick='abrirPrivado(\""+m.u+"\")' style='color:#128c7e; font-weight:bold; cursor:pointer;'>"+m.u+"</small><br/>"+linkify(m.t);
          box.appendChild(d);
        });
        box.scrollTop = box.scrollHeight;
      });

      // CARGAR GRUPOS AL INICIAR
      cargarMisGrupos();
    }

    function cargarMisGrupos() {
        const listaDiv = document.getElementById('mis-grupos-lista');
        rdb.ref('lista_grupos').on('value', snapshot => {
            listaDiv.innerHTML = "";
            let count = 0;
            snapshot.forEach(child => {
                const g = child.val();
                if (g.creador === miUsuario) {
                    count++;
                    const item = document.createElement('div');
                    item.className = "grupo-item";
                    item.innerHTML = `
                        <span onclick="window.location.href='grupo.html?g=${child.key}'" style="font-size:13px;">📁 ${g.nombre}</span>
                        <span onclick="borrarGrupoCompleto('${child.key}', '${g.nombre}')" style="color:red; padding:5px;">🗑️</span>
                    `;
                    listaDiv.appendChild(item);
                }
            });
            if(count === 0) listaDiv.innerHTML = '<small style="padding:10px; color:#999; display:block; text-align:center;">No tienes grupos</small>';
        });
    }

    function borrarGrupoCompleto(id, nombre) {
        if(confirm(`¿Eliminar grupo "${nombre}"?`)) {
            rdb.ref('lista_grupos/' + id).remove();
            rdb.ref('chats_grupos/' + id).remove();
        }
    }

    function abrirModalGrupo() { document.getElementById('modal-crear-grupo').style.display = 'flex'; }
    async function crearGrupoProceso() {
        const n = document.getElementById('nuevo-nombre-grupo').value.trim();
        if(!n) return alert("Ponle nombre");
        const id = "g-" + Math.random().toString(36).substring(2, 10);
        await rdb.ref('lista_grupos/' + id).set({ nombre: n, creador: miUsuario, fecha: Date.now() });
        localStorage.setItem('g_user', miUsuario);
        window.location.href = "grupo.html?g=" + id;
    }

    function verQuienesEstanOnline() { document.getElementById('modal-online').style.display = 'flex'; if(miUsuario === "Chat") document.getElementById('admin-limpiar').style.display = 'block'; }
    function limpiarPresencia() { if(confirm("¿Limpiar?")) rdb.ref('presencia').remove().then(() => { location.reload(); }); }
    function abrirPrivado(n) { if (n === miUsuario) return; usuarioDestino = n; document.getElementById("p-nombre").innerText = n; document.getElementById("p-chat").style.display = "flex"; escucharPrivados(); }
    function cerrarPrivado() { document.getElementById("p-chat").style.display = "none"; usuarioDestino = ""; }

    function escucharPrivados() {
      var sala = generarIdSala(miUsuario, usuarioDestino);
      rdb.ref("privados/" + sala).on("value", (s) => {
        var b = document.getElementById("p-box"); b.innerHTML = "";
        s.forEach((c) => { 
          var m = c.val(), esMio = (m.u === miUsuario);
          b.innerHTML += `<div style="padding:5px; background:${esMio?'#dcf8c6':'white'}; align-self:${esMio?'flex-end':'flex-start'}; border-radius:5px;">${linkify(m.t)}</div>`;
        });
        b.scrollTop = b.scrollHeight;
      });
    }

    function enviarPrivado() {
      var i = document.getElementById("p-msg"), t = i.value.trim(); if (!t) return;
      rdb.ref("privados/" + generarIdSala(miUsuario, usuarioDestino)).push({ u: miUsuario, t: t }); i.value = "";
    }

    function send() {
      var i = document.getElementById('msg'), t = i.value.trim(); if(!t || !ok) return;
      rdb.ref('mensajes').push({ u: miUsuario, t: t, h: new Date().getHours()+":"+new Date().getMinutes() }); i.value = '';
    }
    function lock() { ok = !ok; document.getElementById('tgl').innerText = ok ? "ACTIVO" : "BLOQUEADO"; document.getElementById('tgl').style.background = ok ? "#25d366" : "#ff5252"; }
    function borrarMensaje(id) { rdb.ref('mensajes/' + id).remove(); }
    function borrarTodoElChat() { if(confirm("¿Borrar todo?")) rdb.ref('mensajes').remove(); }
    function guardarReglas() { rdb.ref('config/reglas').set(document.getElementById('edit-reglas').value); }
    
    window.onclick = function(e) { if (!e.target.matches('.dropdown span')) { var d = document.getElementById("myDropdown"); if (d && d.classList.contains('show')) d.classList.remove('show'); } };
  </script>

  <div id="modal-crear-grupo" style="display:none; position:fixed; z-index:1000005; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; font-family:sans-serif;">
    <div style="background:white; padding:25px; border-radius:15px; width:85%; max-width:320px;">
      <h3 style="color:#075e54; margin-top:0;">Nuevo Grupo</h3>
      <input type="text" id="nuevo-nombre-grupo" placeholder="Nombre..." style="width:100%; padding:12px; margin-bottom:15px; border-radius:8px; border:1px solid #ddd; box-sizing:border-box;">
      <button onclick="crearGrupoProceso()" style="width:100%; padding:14px; background:#075e54; color:white; border:none; border-radius:8px; font-weight:bold;">CREAR Y ENTRAR</button>
      <button onclick="document.getElementById('modal-crear-grupo').style.display='none'" style="width:100%; margin-top:10px; background:none; border:none; color:#999;">Cancelar</button>
    </div>
  </div>
</body>
</html>
