<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Chat Online</title>
  <meta content='width=device-width,initial-scale=1' name='viewport'/>
  <style>
    body { background:#f0f2f5 !important; margin:0; padding:0; height:100vh; width:100vw; display:flex !important; overflow:hidden; }
    #content, .section, .widget { display: block !important; width: 100%; height: 100%; }
    .navbar, .header-outer, .footer-outer { display: none !important; }
    .dropdown { position: relative; display: inline-block; }
    .dropdown-content { display: none; position: absolute; right: 0; background-color: #f9f9f9; min-width: 150px; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2); z-index: 1000000; border-radius: 5px; }
    .dropdown-content span { color: black; padding: 12px 16px; text-decoration: none; display: block; cursor: pointer; font-size: 14px; border-bottom: 1px solid #eee; }
    .dropdown-content span:hover { background-color: #f1f1f1; }
    .show { display: block !important; }
    #modal-reglas, #modal-online, #modal-grupos { display: none; position: fixed; z-index: 1000001; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); justify-content: center; align-items: center; font-family: sans-serif; }
    .modal-box { background: white; padding: 20px; border-radius: 10px; width: 85%; max-width: 400px; position: relative; }
    .chat-link { color: #075e54; text-decoration: underline; font-weight: bold; }
    
    /* Estilos Multimedia */
    .chat-media { max-width: 100%; border-radius: 8px; margin-top: 5px; display: block; border: 1px solid #ddd; cursor: pointer; }
    .btn-adjuntar { background: #ccc; color: #333; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; justify-content: center; align-items: center; flex-shrink: 0; position: relative; font-weight: bold; }
    .btn-disabled { opacity: 0.4; cursor: not-allowed !important; filter: grayscale(1); }
    .status-off { position: absolute; top: -5px; right: -5px; background: red; color: white; font-size: 8px; padding: 2px 4px; border-radius: 4px; display: none; }

    /* Estilos Grupos */
    .item-grupo { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
    .search-user { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #075e54; border-radius: 8px; box-sizing: border-box; font-size: 14px; outline: none; }
    .user-row-inv { display: flex; align-items: center; gap: 10px; padding: 8px; border-bottom: 1px solid #f0f0f0; }
  </style>
</head>
<body>

  <div id='app' style='position:fixed; top:0; left:0; width:100%; height:100%; background:#f0f2f5; z-index:999999; display:flex; justify-content:center; align-items:center;'>
    
    <div id='acceso' style='background:white; padding:30px; border-radius:15px; box-shadow:0 5px 20px rgba(0,0,0,0.1); width:280px; text-align:center; font-family:sans-serif;'>
      <h2 style='color:#075e54; margin:0 0 20px 0;'>Chat Online</h2>
      <input id='usr' placeholder='Usuario' style='width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;' type='text'/>
      <input id='clv' placeholder='Clave' style='width:100%; padding:12px; margin-bottom:20px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;' type='password'/>
      <button onclick='entrar()' style='width:100%; padding:12px; background:#075e54; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;'>ENTRAR</button>
    </div>

    <div id='chat' style='width:100%; max-width:500px; height:100%; background:#e5ddd5; display:none; flex-direction:column; font-family:sans-serif;'>
      <div style='background:#075e54; color:white; padding:15px; display:flex; justify-content:space-between; align-items:center;'>
        <div onclick='verQuienesEstanOnline()' style='display:flex; flex-direction:column; cursor:pointer;'>
          <span><b>Chat Online</b></span>
          <small id='online-count' style='font-size:10px; color:#25d366; font-weight:bold;'>Conectados: 0 &#9660;</small>
        </div>
        <div class='dropdown'>
          <span onclick='toggleMenu()' style='cursor:pointer; font-size:12px; background:#054d44; padding:5px 10px; border-radius:5px; font-weight:bold;'>OPCIONES &#9660;</span>
          <div class='dropdown-content' id='myDropdown'>
            <span onclick='abrirReglas()'>Reglas</span>
            <span onclick='abrirModalGrupos()'>Mis Grupos</span>
            <div id="admin-limpieza-media" style="display:none;">
                <span id="btn-lock-media" onclick='toggleMediaPublico()' style='color:#E91E63; font-weight:bold;'>Bloquear Multimedia</span>
                <span onclick='limpiarMultimedia("privado")' style='color:#2196F3;'>Limpiar Fotos Privadas</span>
                <span onclick='limpiarMultimedia("publico")' style='color:#4CAF50;'>Limpiar Fotos Públicas</span>
                <span onclick='limpiarMultimedia("total")' style='color:red; font-weight:bold;'>LIMPIEZA TOTAL FOTOS</span>
            </div>
            <span id='btn-borrar-todo' onclick='borrarTodoElChat()' style='color:orange; display:none;'>Borrar Chat Texto</span>
            <span onclick='location.reload()' style='color:red;'>Salir</span>
          </div>
        </div>
      </div>
      <div style='background:#054d44; color:white; padding:10px; font-size:12px; display:flex; justify-content:space-between;'>
        <span>CHAT GLOBAL:</span>
        <button id='tgl' onclick='lock()' style='background:#25d366; border:none; padding:3px 10px; border-radius:5px; cursor:pointer; font-weight:bold;'>ACTIVO</button>
      </div>
      <div id='m-box' style='flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:10px;'></div>
      
      <div style='background:#f0f0f0; padding:15px; display:flex; gap:10px; align-items:center;'>
        <button id="btn-plus-publico" onclick="document.getElementById('file-global').click()" class="btn-adjuntar">
            + <span id="label-off" class="status-off">OFF</span>
        </button>
        <input type="file" id="file-global" style="display:none" accept="image/*,video/*" onchange="subirMultimedia(this, 'global')">
        <input id='msg' onkeypress='if(event.key==="Enter") send()' placeholder='Escribe...' style='flex:1; padding:12px; border-radius:20px; border:1px solid #ccc; outline:none;' type='text'/>
        <button id="btn-send-global" onclick='send()' style='background:#075e54; color:white; border:none; width:45px; height:45px; border-radius:50%; cursor:pointer;'>&gt;</button>
      </div>
    </div>

    <div id='p-chat' style='display:none; position:fixed; bottom:0; right:15px; width:270px; background:white; border-radius:10px 10px 0 0; box-shadow:0 -5px 20px rgba(0,0,0,0.3); z-index:1000005; font-family:sans-serif; flex-direction:column; border:1px solid #075e54;'>
      <div style='background:#075e54; color:white; padding:10px 12px; border-radius:10px 10px 0 0; display:flex; flex-direction:column;'>
        <div style='display:flex; justify-content:space-between; align-items:center;'>
          <span id='p-nombre' style='font-size:13px; font-weight:bold;'>Privado</span>
          <span onclick='cerrarPrivado()' style='cursor:pointer; font-size:20px; font-weight:bold;'>X</span>
        </div>
        <small id='p-status' style='font-size:10px; color:#25d366; font-weight:bold; height:12px;'></small>
      </div>
      <div id='p-box' style='height:250px; overflow-y:auto; padding:10px; font-size:12px; background:#e5ddd5; display:flex; flex-direction:column; gap:8px;'></div>
      <div style='padding:10px; background:#f0f0f0; display:flex; gap:5px; border-top:1px solid #ddd; align-items:center;'>
        <button onclick="document.getElementById('file-privado').click()" style="background:#ccc; border:none; width:32px; height:32px; border-radius:50%; cursor:pointer;">+</button>
        <input type="file" id="file-privado" style="display:none" accept="image/*,video/*" onchange="subirMultimedia(this, 'privado')">
        <input id='p-msg' oninput='notificarEscribiendo()' onkeypress='if(event.key==="Enter") enviarPrivado()' placeholder='Privado...' style='flex:1; border:1px solid #ccc; border-radius:15px; padding:8px 12px; outline:none; font-size:12px;' type='text'/>
        <button id="btn-send-privado" onclick='enviarPrivado()' style='background:#075e54; color:white; border:none; border-radius:50%; width:32px; height:32px; cursor:pointer;'>&gt;</button>
      </div>
    </div>
  </div>

  <div id='modal-grupos'>
    <div class='modal-box'>
      <h3 style='color:#075e54; margin-top:0;'>Mis Grupos</h3>
      <div id="lista-mis-grupos" style="max-height:100px; overflow-y:auto; margin-bottom:10px; border-bottom:1px solid #eee;"></div>
      
      <p style="font-size:12px; color:#666; margin:10px 0 5px 0;">Crear nuevo grupo:</p>
      <input id="nom-grupo-crear" placeholder="Nombre del grupo..." style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;">
      
      <input type="text" id="busc-user" class="search-user" placeholder="🔍 Buscar persona..." onkeyup="filtrarUsuarios()">
      
      <div id="lista-invitar-usuarios" style="max-height:150px; overflow-y:auto; border:1px solid #eee; padding:10px; border-radius:8px; background:#fafafa;"></div>
      
      <button onclick="crearGrupoNuevo()" style="width:100%; background:#075e54; color:white; border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer; margin-top:10px;">CREAR GRUPO</button>
      <button onclick='document.getElementById("modal-grupos").style.display="none"' style='width:100%; background:#777; color:white; border:none; padding:8px; border-radius:8px; cursor:pointer; margin-top:5px;'>CERRAR</button>
    </div>
  </div>

  <div id='modal-reglas'><div class='modal-box'><h3 style='color:#075e54;'>Chat En Linea</h3><div id='reglas-texto'></div><div id='admin-editor' style='display:none;'><textarea id='edit-reglas'></textarea><button onclick='guardarReglas()'>ACTUALIZAR</button></div><button onclick='cerrarReglas()'>CERRAR</button></div></div>
  <div id='modal-online'><div class='modal-box' style='max-width:250px;'><h3>Línea</h3><div id='lista-online'></div><div id='admin-limpiar' style='display:none;'><button onclick='limpiarPresencia()'>LIMPIAR FANTASMAS</button></div><button onclick='document.getElementById("modal-online").style.display="none"'>CERRAR</button></div></div>

  <script src='https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js'></script>
  <script src='https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js'></script>

  <script>
    const firebaseConfig = { databaseURL: "https://micanalmaestro-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const rdb = firebase.database();
    const CLOUD_NAME = "dhtyepcjg";
    const UPLOAD_PRESET = "Historial"; 

    var ok = true;
    var miUsuario = "";
    var usuarioDestino = "";
    var multimediaBloqueado = false;
    const EMOJIS = ['❤️', '🥲', '🤣', '🥰'];

    function toggleMenu() { document.getElementById("myDropdown").classList.toggle("show"); }
    function abrirReglas() { document.getElementById("modal-reglas").style.display = "flex"; }
    function cerrarReglas() { document.getElementById("modal-reglas").style.display = "none"; }

    // --- LÓGICA DE GRUPOS Y BUSCADOR ---

    function abrirModalGrupos() {
        document.getElementById('modal-grupos').style.display = 'flex';
        cargarMisGrupos();
        cargarListaInvitables();
    }

    function filtrarUsuarios() {
        let filtro = document.getElementById('busc-user').value.toLowerCase();
        let filas = document.querySelectorAll('.user-row-inv');
        filas.forEach(f => {
            let nombre = f.getAttribute('data-u').toLowerCase();
            f.style.display = nombre.includes(filtro) ? "flex" : "none";
        });
    }

    function cargarListaInvitables() {
        rdb.ref('usuarios').once('value', (s) => {
            const box = document.getElementById('lista-invitar-usuarios');
            box.innerHTML = "";
            s.forEach((child) => {
                let uName = child.key;
                if(uName !== miUsuario.toLowerCase()) {
                    box.innerHTML += `<div class="user-row-inv" data-u="${uName}">
                        <input type="checkbox" class="chk-invitar" value="${uName}"> <span>${uName}</span>
                    </div>`;
                }
            });
        });
    }

    function crearGrupoNuevo() {
        let nom = document.getElementById('nom-grupo-crear').value.trim();
        if(!nom) return alert("Escribe un nombre para el grupo");
        
        let invitados = {};
        invitados[miUsuario.toLowerCase()] = true; 
        
        let checks = document.querySelectorAll('.chk-invitar:checked');
        if(checks.length === 0) return alert("Selecciona a quién invitar");

        checks.forEach(c => { invitados[c.value] = true; });
        
        let idG = "grupo_" + Date.now();
        rdb.ref('grupos/' + idG).set({
            nombre: nom,
            creador: miUsuario,
            miembros: invitados
        }).then(() => {
            alert("Grupo '" + nom + "' creado con éxito");
            document.getElementById('nom-grupo-crear').value = "";
            cargarMisGrupos();
        });
    }

    function cargarMisGrupos() {
        rdb.ref('grupos').once('value', (s) => {
            const box = document.getElementById('lista-mis-grupos');
            box.innerHTML = "";
            s.forEach((child) => {
                let g = child.val();
                if(g.miembros && g.miembros[miUsuario.toLowerCase()]) {
                    box.innerHTML += `<div class="item-grupo">
                        <span>👥 ${g.nombre}</span> 
                        <button onclick="entrarAlGrupo('${child.key}', '${g.nombre}')" style="background:#075e54; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">ENTRAR</button>
                    </div>`;
                }
            });
        });
    }

    function entrarAlGrupo(idG, nombre) {
        usuarioDestino = idG;
        document.getElementById("p-nombre").innerText = "Grupo: " + nombre;
        document.getElementById("p-chat").style.display = "flex";
        document.getElementById('modal-grupos').style.display = 'none';
        escucharGrupo(idG);
    }

    function escucharGrupo(idG) {
        rdb.ref("mensajes_grupos/" + idG).on("value", (snap) => {
            var pBox = document.getElementById("p-box"); pBox.innerHTML = "";
            snap.forEach((child) => {
                let m = child.val(), esMio = (m.u === miUsuario);
                pBox.innerHTML += `<div style="padding:8px; border-radius:8px; max-width:85%; font-size:12px; margin-bottom:5px; ${esMio?'background:#dcf8c6; align-self:flex-end;':'background:white; align-self:flex-start; border:1px solid #ddd;'}"><b>${m.u}</b><br>${linkify(m.t)}</div>`;
            });
            pBox.scrollTop = pBox.scrollHeight;
        });
    }

    // --- TUS FUNCIONES DE ADMINISTRACIÓN Y CORE ---

    function limpiarMultimedia(tipo) {
        const esMedia = (url) => url && url.includes("res.cloudinary.com");
        if(tipo === "publico" || tipo === "total") {
            rdb.ref('mensajes').once('value', (s) => { s.forEach((c) => { if(esMedia(c.val().t)) rdb.ref('mensajes/'+c.key).remove(); }); });
        }
        if(tipo === "privado" || tipo === "total") {
            rdb.ref('privados').once('value', (s) => { s.forEach((sala) => { sala.forEach((msg) => { if(esMedia(msg.val().t)) rdb.ref('privados/'+sala.key+'/'+msg.key).remove(); }); }); });
        }
        alert("Limpieza completada.");
    }

    function entrar() {
      var uO = document.getElementById('usr').value.trim(), p = document.getElementById('clv').value.trim(), uM = uO.toLowerCase();
      if(!uO || !p) return;
      rdb.ref('usuarios/' + uM).once('value', (snapshot) => {
        if(snapshot.exists()) {
          if(snapshot.val().toString() === p.toString()) { miUsuario = (uM === "chat") ? "Chat" : uO; iniciar(); } else { alert("Clave mal"); }
        } else {
          rdb.ref('usuarios/' + uM).set(p).then(() => { miUsuario = (uM === "chat") ? "Chat" : uO; iniciar(); });
        }
      });
    }

    function iniciar() {
      document.getElementById('acceso').style.display = 'none';
      document.getElementById('chat').style.display = 'flex';
      if(miUsuario === "Chat") { 
         document.getElementById('admin-limpieza-media').style.display = 'block';
         document.getElementById('btn-borrar-todo').style.display = 'block';
         setInterval(() => { limpiarMultimedia("total"); }, 4 * 60 * 60 * 1000);
      }
      rdb.ref('presencia/' + miUsuario.toLowerCase()).set(miUsuario);
      rdb.ref('presencia/' + miUsuario.toLowerCase()).onDisconnect().remove();
      
      rdb.ref('mensajes').on('value', (snapshot) => {
        var box = document.getElementById('m-box'); box.innerHTML = "";
        snapshot.forEach((child) => {
            let m = child.val(), esMio = (m.u === miUsuario);
            box.innerHTML += `<div style="padding:10px; border-radius:8px; max-width:80%; ${esMio?'background:#dcf8c6; align-self:flex-end;':'background:white; align-self:flex-start;'}">
                <small onclick="abrirPrivado('${m.u}')" style="color:#128c7e; font-weight:bold; cursor:pointer;">${m.u}</small><br>${linkify(m.t)}
            </div>`;
        });
        box.scrollTop = box.scrollHeight;
      });
    }

    function send() {
      let i = document.getElementById('msg'), t = i.value.trim();
      if(!t || !ok) return;
      rdb.ref('mensajes').push({ u: miUsuario, t: t.replace(/</g, "&lt;"), h: new Date().getHours()+":"+new Date().getMinutes() });
      i.value = "";
    }

    function abrirPrivado(nombre) {
        if(nombre === miUsuario) return;
        usuarioDestino = nombre;
        document.getElementById("p-nombre").innerText = "Privado con " + nombre;
        document.getElementById("p-chat").style.display = "flex";
        escucharPrivados();
    }

    function escucharPrivados() {
        var idSala = generarIdSala(miUsuario, usuarioDestino);
        rdb.ref("privados/" + idSala).on("value", snap => {
            var pBox = document.getElementById("p-box"); pBox.innerHTML = "";
            snap.forEach(c => {
                let m = c.val(), esMio = (m.u === miUsuario);
                pBox.innerHTML += `<div style="padding:8px; border-radius:8px; max-width:85%; ${esMio?'background:#dcf8c6; align-self:flex-end;':'background:white; align-self:flex-start; border:1px solid #ddd;'}"><b>${m.u}</b><br>${linkify(m.t)}</div>`;
            });
            pBox.scrollTop = pBox.scrollHeight;
        });
    }

    function enviarPrivado() {
        let i = document.getElementById('p-msg'), v = i.value.trim();
        if(!v || !usuarioDestino) return;
        if(usuarioDestino.startsWith("grupo_")) {
            rdb.ref("mensajes_grupos/" + usuarioDestino).push({ u: miUsuario, t: v.replace(/</g, "&lt;") });
        } else {
            rdb.ref("privados/" + generarIdSala(miUsuario, usuarioDestino)).push({ u: miUsuario, t: v.replace(/</g, "&lt;") });
        }
        i.value = "";
    }

    function linkify(t) { 
        if(!t) return ""; 
        if(t.includes("res.cloudinary.com")) {
            if(t.match(/\.(jpeg|jpg|gif|png|webp)$/i)) return `<img src="${t}" class="chat-media">`;
            if(t.match(/\.(mp4|mov|avi|webm)$/i)) return `<video src="${t}" class="chat-media" controls></video>`;
        }
        return t; 
    }

    function generarIdSala(u1, u2) { return "sala_" + [u1.toLowerCase(), u2.toLowerCase()].sort().join("_"); }
    function lock() { ok = !ok; document.getElementById('tgl').innerText = ok?"ACTIVO":"BLOQUEADO"; }
    function cerrarPrivado() { document.getElementById("p-chat").style.display = "none"; }
    function limpiarPresencia() { rdb.ref('presencia').remove(); }
  </script>
</body>
</html>
