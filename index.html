<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sincro - Telegram Style</title>
  <meta content='width=device-width,initial-scale=1' name='viewport'/>
  <style>
    body { background:#f0f2f5; margin:0; font-family: sans-serif; height: 100vh; display: flex; justify-content: center; }
    #app { width: 100%; max-width: 500px; background: #e5ddd5; display: flex; flex-direction: column; position: relative; }
    
    /* Pantallas */
    .screen { display: none; flex-direction: column; height: 100%; width: 100%; }
    .active { display: flex !important; }

    /* Cabecera */
    .header { background: #075e54; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    
    /* Mensajes */
    #m-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
    .msg { padding: 8px 12px; border-radius: 8px; font-size: 14px; max-width: 80%; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
    .msg.mio { background: #dcf8c6; align-self: flex-end; }
    .msg.otro { background: white; align-self: flex-start; }

    /* Inputs */
    .input-area { background: #f0f0f0; padding: 10px; display: flex; gap: 8px; }
    input[type="text"] { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
    button { cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
    .btn-main { background: #075e54; color: white; padding: 10px 15px; }

    /* Modales y Ajustes */
    .modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; padding: 20px; box-sizing: border-box; }
    .link-box { background: #f9f9f9; border: 1px dashed #075e54; padding: 10px; margin: 10px 0; border-radius: 5px; font-size: 13px; }
    .member-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; align-items: center; }
    .btn-kick { color: #ff5252; background: none; font-size: 18px; }
  </style>
</head>
<body>

<div id="app">
  
  <div id="view-login" class="screen active" style="justify-content: center; align-items: center; background: white;">
    <div style="width: 80%; text-align: center;">
      <h2 style="color:#075e54">Sincro</h2>
      <input id="user-name" type="text" placeholder="Tu nombre..." style="width: 100%; margin-bottom: 10px;"><br>
      <input id="invite-code" type="text" placeholder="Código de invitación (Ej: Sincro-xxx)" style="width: 100%; margin-bottom: 10px;">
      <button onclick="intentarUnirse()" class="btn-main" style="width: 100%;">UNIRSE AL GRUPO</button>
      <p style="font-size: 12px; color: #666; margin-top: 20px;">O bien:</p>
      <button onclick="pantallaCrear()" style="background:none; border: 1px solid #075e54; color: #075e54; width: 100%; padding: 8px;">CREAR NUEVO GRUPO</button>
    </div>
  </div>

  <div id="view-chat" class="screen">
    <div class="header">
      <div onclick="abrirAjustes()" style="cursor:pointer">
        <b id="chat-title">Cargando Grupo...</b><br>
        <small id="chat-count" style="font-size: 10px; color: #25d366;">0 miembros</small>
      </div>
      <button onclick="location.reload()" style="background:none; color:white; font-size: 12px;">SALIR</button>
    </div>
    <div id="m-box"></div>
    <div class="input-area">
      <input id="msg-input" type="text" placeholder="Escribe un mensaje..." onkeypress="if(event.key==='Enter') enviarMsg()">
      <button onclick="enviarMsg()" class="btn-main">➤</button>
    </div>
  </div>

  <div id="view-settings" class="modal" style="display:none">
    <div style="display:flex; justify-content: space-between; align-items: center;">
      <h3>⚙️ Ajustes del Grupo</h3>
      <button onclick="cerrarAjustes()" style="background:#eee; padding: 5px 10px;">X</button>
    </div>
    
    <label>📝 Nombre:</label><br>
    <input id="edit-name" type="text" style="width: 100%; margin: 8px 0;">
    <button onclick="actualizarNombre()" class="btn-main" style="font-size: 12px;">GUARDAR NOMBRE</button>

    <div class="link-box">
      <small>🔗 Link actual:</small><br>
      <b id="display-link">sincro.com/unirse?t=...</b><br><br>
      <button onclick="restablecerLink()" style="background:#2196F3; color:white; padding:5px 10px; font-size: 11px;">🔄 RESTABLECER ENLACE</button>
    </div>

    <label>👥 Lista de Miembros:</label>
    <div id="member-list" style="margin-top: 10px; border: 1px solid #eee; border-radius: 5px; max-height: 200px; overflow-y: auto;">
      </div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
  // --- CONFIGURACIÓN (REEMPLAZA CON TU DATA) ---
  const firebaseConfig = { databaseURL: "TU_URL_DE_FIREBASE_AQUI" };
  firebase.initializeApp(firebaseConfig);
  const rdb = firebase.database();

  let miUsuario = "";
  let grupoIdActual = "";
  let soyCreador = false;

  // 1. Lógica de Navegación
  function cambiarPantalla(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function pantallaCrear() {
    let nom = prompt("Nombre del nuevo grupo:");
    let user = document.getElementById('user-name').value.trim();
    if(!nom || !user) return alert("Falta nombre de grupo o tu usuario");
    
    miUsuario = user;
    const token = "Sincro-" + Math.random().toString(36).substr(2, 5);
    const ref = rdb.ref('grupos').push();
    grupoIdActual = ref.key;

    const data = {
      info: { nombre: nom, creador: user, token: token },
      miembros: { [user.toLowerCase()]: { n: user, r: 'admin' } },
      baneados: { "placeholder": true }
    };

    ref.set(data).then(() => {
      alert("Grupo creado. Código: " + token);
      iniciarChat();
    });
  }

  // 2. Unirse con Validación de Token y Baneo
  async function intentarUnirse() {
    const user = document.getElementById('user-name').value.trim();
    const tokenIn = document.getElementById('invite-code').value.trim();
    if(!user || !tokenIn) return alert("Completa los campos");

    miUsuario = user;
    const snapshot = await rdb.ref('grupos').once('value');
    let encontrado = false;

    snapshot.forEach(child => {
      const g = child.val();
      if(g.info.token === tokenIn) {
        encontrado = true;
        grupoIdActual = child.key;
        
        // Validar Baneo
        if(g.baneados && g.baneados[user.toLowerCase()]) {
          alert("❌ Estás expulsado de este grupo y no puedes volver a entrar.");
          return;
        }

        // Unirse
        rdb.ref('grupos/'+grupoIdActual+'/miembros/'+user.toLowerCase()).set({n: user, r: 'miembro'});
        iniciarChat();
      }
    });

    if(!encontrado) alert("Código inválido o expirado.");
  }

  // 3. Sistema de Chat en Tiempo Real
  function iniciarChat() {
    cambiarPantalla('view-chat');
    
    rdb.ref('grupos/' + grupoIdActual).on('value', (s) => {
      const data = s.val();
      if(!data) return;

      // Actualizar Header (Nombre en tiempo real)
      document.getElementById('chat-title').innerText = data.info.nombre;
      const cant = data.miembros ? Object.keys(data.miembros).length : 0;
      document.getElementById('chat-count').innerText = cant + " miembros";
      
      soyCreador = (data.info.creador === miUsuario);

      // Si el usuario ya no está en la lista de miembros (fue expulsado)
      if(!data.miembros[miUsuario.toLowerCase()]) {
        alert("Has sido expulsado del grupo.");
        location.reload();
      }

      // Render Mensajes
      const box = document.getElementById('m-box');
      box.innerHTML = "";
      if(data.mensajes) {
        Object.values(data.mensajes).forEach(m => {
          const div = document.createElement('div');
          div.className = "msg " + (m.u === miUsuario ? "mio" : "otro");
          div.innerHTML = `<small style="color:#075e54"><b>${m.u}</b></small><br>${m.t}`;
          box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
      }
    });
  }

  function enviarMsg() {
    const inp = document.getElementById('msg-input');
    const val = inp.value.trim();
    if(!val) return;
    rdb.ref('grupos/'+grupoIdActual+'/mensajes').push({ u: miUsuario, t: val });
    inp.value = "";
  }

  // 4. Lógica de Ajustes (Creador)
  function abrirAjustes() {
    if(!soyCreador) return alert("Solo el creador puede ver ajustes.");
    document.getElementById('view-settings').style.display = 'block';
    
    rdb.ref('grupos/'+grupoIdActual).once('value', s => {
      const d = s.val();
      document.getElementById('edit-name').value = d.info.nombre;
      document.getElementById('display-link').innerText = "sincro.com/unirse?t=" + d.info.token;
      
      const list = document.getElementById('member-list');
      list.innerHTML = "";
      Object.values(d.miembros).forEach(m => {
        list.innerHTML += `<div class="member-item">
          <span>${m.n} ${m.r==='admin'?'(Adm)':''}</span>
          ${m.n !== miUsuario ? `<button class="btn-kick" onclick="expulsar('${m.n}')">❌</button>` : ''}
        </div>`;
      });
    });
  }

  function cerrarAjustes() { document.getElementById('view-settings').style.display = 'none'; }

  function actualizarNombre() {
    const nuevo = document.getElementById('edit-name').value;
    rdb.ref('grupos/'+grupoIdActual+'/info/nombre').set(nuevo);
    alert("Nombre actualizado");
  }

  function restablecerLink() {
    const nuevoT = "Sincro-" + Math.random().toString(36).substr(2, 5);
    rdb.ref('grupos/'+grupoIdActual+'/info/token').set(nuevoT);
    document.getElementById('display-link').innerText = "sincro.com/unirse?t=" + nuevoT;
    alert("Token viejo invalidado. Nuevo código generado.");
  }

  function expulsar(nombre) {
    if(confirm("¿Expulsar y banear a "+nombre+"?")) {
      // Borrar de miembros y añadir a baneados
      rdb.ref('grupos/'+grupoIdActual+'/miembros/'+nombre.toLowerCase()).remove();
      rdb.ref('grupos/'+grupoIdActual+'/baneados/'+nombre.toLowerCase()).set(true);
      abrirAjustes(); // Refrescar lista
    }
  }
</script>

</body>
</html>
